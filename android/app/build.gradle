apply plugin: 'com.android.application'
import java.util.Properties

def releaseStoreFile = System.getenv("PLAYTALK_UPLOAD_STORE_FILE")
def releaseStorePassword = System.getenv("PLAYTALK_UPLOAD_STORE_PASSWORD")
def releaseKeyAlias = System.getenv("PLAYTALK_UPLOAD_KEY_ALIAS")
def releaseKeyPassword = System.getenv("PLAYTALK_UPLOAD_KEY_PASSWORD")
def hasReleaseKeystore = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

def versionPropsFile = rootProject.file("version.properties")
def versionProps = new Properties()
def defaultVersionCode = 1
def defaultVersionName = "1.0"

if (versionPropsFile.exists()) {
    versionPropsFile.withInputStream { stream -> versionProps.load(stream) }
}

def currentVersionCode = (versionProps.getProperty("VERSION_CODE") ?: defaultVersionCode.toString()).toInteger()
def currentVersionName = versionProps.getProperty("VERSION_NAME") ?: defaultVersionName

def requestedTasks = gradle.startParameter.taskNames.collect { it.toLowerCase() }
def isInstallTask = requestedTasks.any { task ->
    task.contains("installdebug") || task.contains("installrelease")
}
def isReleaseTask = requestedTasks.any { task ->
    task.contains("assemblerelease") || task.contains("bundlerelease") || task.contains("installrelease")
}
def releaseAutoBumpEnabled = (System.getenv("PLAYTALK_AUTO_BUMP_VERSION") ?: "false").toBoolean()
// Android Studio "Run" executes installDebug; bumping there prevents local install/update conflicts.
def shouldAutoBumpVersion = isInstallTask || (isReleaseTask && releaseAutoBumpEnabled)
def localLibDirs = [
    file('../capacitor-cordova-android-plugins/src/main/libs'),
    file('libs')
]
def hasFlatDirLibs = localLibDirs.any { dir ->
    dir.exists() && dir.isDirectory() && dir.listFiles()?.any { file ->
        file.name.toLowerCase().endsWith('.jar') || file.name.toLowerCase().endsWith('.aar')
    }
}

if (shouldAutoBumpVersion) {
    currentVersionCode += 1
    versionProps.setProperty("VERSION_CODE", currentVersionCode.toString())
    versionProps.setProperty("VERSION_NAME", currentVersionName)
    versionPropsFile.withOutputStream { stream ->
        versionProps.store(stream, "Managed by Gradle")
    }
}

android {
    namespace "com.playtalk.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.playtalk.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode currentVersionCode
        versionName "${currentVersionName}.${currentVersionCode}"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
                // Keep both signature schemes for broader install compatibility.
                v1SigningEnabled true
                v2SigningEnabled true
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // Release builds for Play Store require the production keystore.
            signingConfig hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
        }
    }
}

if (isReleaseTask && !hasReleaseKeystore) {
    throw new GradleException(
        "Release build blocked: configure PLAYTALK_UPLOAD_STORE_FILE, PLAYTALK_UPLOAD_STORE_PASSWORD, " +
        "PLAYTALK_UPLOAD_KEY_ALIAS and PLAYTALK_UPLOAD_KEY_PASSWORD."
    )
}

if (hasFlatDirLibs) {
    repositories {
        flatDir {
            dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}




