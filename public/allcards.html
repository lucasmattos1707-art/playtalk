<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>AllCards | PlayTalk</title>
  <meta name="description" content="Flashcards do usuario no PlayTalk.">
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <link rel="stylesheet" href="css/playtalk-shell.css">
  <style>
    @font-face {
      font-family: "Soopafre";
      src: url("soopafre.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("playtalk.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #041321;
      --playtalk-global-bg-desktop: url('/backgrounds/playtalk-global-desktop.webp');
      --playtalk-global-bg-mobile: url('/backgrounds/playtalk-global-mobile.webp');
      --playtalk-global-bg-image: var(--playtalk-global-bg-desktop);
      --playtalk-global-bg-overlay: linear-gradient(to top, rgba(4, 18, 38, 1) 0%, rgba(4, 18, 38, 0.58) 38%, rgba(4, 18, 38, 0) 100%);
      --muted: #b8d4ea;
      --blue: #38c9ff;
      --footer-height: max(62px, 8vh);
      --footer-safe-bottom: env(safe-area-inset-bottom, 0px);
      --footer-total-height: calc(var(--footer-height) + var(--footer-safe-bottom));
    }

    @media (max-width: 800px) {
      :root {
        --playtalk-global-bg-image: var(--playtalk-global-bg-mobile);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Soopafre", Arial, sans-serif;
      color: #fff;
      background: transparent;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #041226 var(--playtalk-global-bg-image) center/cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--playtalk-global-bg-overlay);
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .shell {
      width: min(1240px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 calc(var(--footer-total-height) + 24px);
    }

    .catalog {
      display: grid;
      gap: 16px;
    }

    .panel.section {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      backdrop-filter: blur(8px);
      padding: 18px 14px;
    }

    .section-head {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .section-copy {
      width: 100%;
      text-align: center;
    }

    #libraryTitle {
      width: 100%;
      margin: 0;
      text-align: center;
      font-size: clamp(34px, 5.4vw, 52px);
      letter-spacing: 0.03em;
      color: #fff;
    }

    #allSectionCopy {
      margin: 8px 0 0;
      font-family: "PlaytalkDisplay", "Soopafre", Arial, sans-serif;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1;
      letter-spacing: 0.03em;
      text-align: center;
      background: linear-gradient(180deg, #8ed8ff 0%, #3ea8ff 48%, #0b67ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 26px rgba(37, 125, 255, 0.16);
      transition: transform 220ms ease, opacity 220ms ease, filter 220ms ease;
    }

    #allSectionCopy.is-updating {
      transform: translateY(-2px) scale(1.04);
      filter: drop-shadow(0 10px 24px rgba(35, 137, 255, 0.26));
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-card {
      padding: 10px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.14);
      min-height: 100%;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(6px);
    }

    .mini-card__image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: visible;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.12);
      position: relative;
      isolation: isolate;
    }

    .mini-card__image > img:not(.mini-card__seal) {
      width: 100%;
      height: 100%;
      object-fit: cover;
      clip-path: inset(8% 8% 8% 8% round 14px);
      transition: filter 240ms ease, opacity 240ms ease;
    }

    .mini-card__fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 12px;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
      background:
        linear-gradient(135deg, rgba(83, 213, 255, 0.12), transparent),
        rgba(255, 255, 255, 0.02);
    }

    .mini-card__word {
      margin: 10px 0 0;
      font-weight: 700;
      font-size: 17px;
      text-align: center;
    }

    .mini-card__subword {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      min-height: 18px;
    }

    .mini-card__seal {
      position: absolute;
      right: -10px;
      bottom: -10px;
      top: auto;
      width: clamp(56px, 34%, 82px);
      height: clamp(56px, 34%, 82px);
      object-fit: contain;
      transform: none;
      filter: drop-shadow(0 10px 16px rgba(0, 0, 0, 0.28));
      pointer-events: none;
      z-index: 4;
    }

    .mini-card__progress {
      margin-top: 10px;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .mini-card__progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #5cff88, #1eba5f);
    }

    .mini-card__loader {
      position: absolute;
      inset: 50% auto auto 50%;
      width: 34px;
      height: 34px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: linear-gradient(#ee280e, #15a0f7, #6ed15a);
      animation: flashcardsMiniLoaderSpin 1.2s linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    .mini-card__loader span {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(#ee280e, #15a0f7, #5ad15a);
    }

    .mini-card__loader::after {
      content: "";
      position: absolute;
      inset: 7px;
      background: rgba(22, 28, 40, 0.96);
      border: solid rgba(22, 28, 40, 0.96) 7px;
      border-radius: 50%;
    }

    .mini-card__loader span:nth-child(1) { filter: blur(3px); }
    .mini-card__loader span:nth-child(2) { filter: blur(6px); }
    .mini-card__loader span:nth-child(3) { filter: blur(12px); }
    .mini-card__loader span:nth-child(4) { filter: blur(18px); }

    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      border-radius: 24px;
      color: var(--muted);
      border: 1px dashed rgba(125, 203, 255, 0.16);
      background: rgba(255, 255, 255, 0.02);
    }

    @keyframes flashcardsMiniLoaderSpin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .flashcards-footer-nav {
      position: fixed !important;
      left: 0;
      right: 0;
      bottom: var(--footer-safe-bottom);
      height: var(--footer-height);
      background: #157efb;
      display: grid !important;
      grid-template-columns: repeat(5, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
      fill: currentColor;
    }

    .flashcards-footer-nav__item svg path {
      fill: currentColor;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel.section {
        padding: 14px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>

  <main class="shell">
    <section class="catalog" id="catalog">
      <div class="panel section">
        <div class="section-head">
          <div class="section-copy">
            <h2 id="libraryTitle">FlashCards</h2>
            <p id="allSectionCopy">0 FlashCards</p>
          </div>
        </div>
        <div class="grid" id="allGrid"></div>
      </div>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.36a1 1 0 0 0 0-1.72l-10-6.36A1 1 0 0 0 8 5.14Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/allcards" aria-label="Flashcards">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.6 2.5c.33 2.34 2.12 3.25 3.48 4.86 1.34 1.59 2 3.22 2 5.35 0 4.3-2.96 8.79-7.58 8.79-3.36 0-5.58-2.4-5.58-5.34 0-2.21 1.12-3.85 2.97-5.78 1.38-1.44 2.94-3.14 4.71-7.88Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/users" aria-label="Usuarios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v2h2a2 2 0 0 1 2 2c0 3.32-2.47 6-5.57 6.4A5.99 5.99 0 0 1 13 17.83V20h4v2H7v-2h4v-2.17A5.99 5.99 0 0 1 8.57 13.4C5.47 13 3 10.32 3 7a2 2 0 0 1 2-2h2V3Zm-2 4c0 2.1 1.45 3.82 3.4 4.28A6 6 0 0 1 7 7V7H5Zm14 0h-2a6 6 0 0 1-1.4 4.28C17.55 10.82 19 9.1 19 7Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/books" aria-label="Books">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M5 4.5A2.5 2.5 0 0 1 7.5 2H20v15h-2V4H7.5a.5.5 0 0 0 0 1H16v12H7.5A2.5 2.5 0 0 1 5 14.5v-10Zm2.5 10.5H14V7H7.5a2.5 2.5 0 0 1-.5-.05v7.55a.5.5 0 0 0 .5.5Z"/></svg>
    </a>
  </nav>

  <script src="js/android-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/playtalk-shell.js"></script>
  <script src="js/android-shell.js"></script>
  <script src="js/allcards-page.js?v=20260410-1" defer></script>
</body>
</html>
