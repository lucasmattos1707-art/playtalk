<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>General Levels | Admin</title>
  <style>
    :root{
      --bg:#050607;
      --panel:#101419;
      --panel-strong:#171e26;
      --line:rgba(255,255,255,.12);
      --text:#f7fbff;
      --muted:rgba(247,251,255,.68);
      --green:#44f0a1;
      --blue:#5db7ff;
      --orange:#ff9d42;
      --danger:#ff7676;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 10% 0%,rgba(93,183,255,.18),transparent 30%),
        radial-gradient(circle at 90% 10%,rgba(255,157,66,.16),transparent 28%),
        linear-gradient(180deg,#050607,#0b0f14 52%,#050607);
      color:var(--text);
      font-family:Arial,sans-serif;
    }
    .page{width:min(1120px,100%);margin:0 auto;padding:26px 18px 44px}
    .hero{
      display:grid;
      gap:18px;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:end;
      padding:24px;
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(135deg,rgba(23,30,38,.96),rgba(8,11,15,.92));
      box-shadow:0 24px 80px rgba(0,0,0,.32);
    }
    .eyebrow{margin:0 0 8px;color:var(--green);font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:12px}
    h1{margin:0;font-size:clamp(32px,7vw,72px);line-height:.88;text-transform:uppercase;letter-spacing:-.06em}
    .lead{max-width:680px;margin:14px 0 0;color:var(--muted);font-size:15px;line-height:1.55}
    .actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end}
    button{
      appearance:none;
      border:0;
      border-radius:16px;
      padding:14px 18px;
      color:#06100b;
      background:linear-gradient(135deg,var(--green),#9bffd0);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.04em;
      cursor:pointer;
      box-shadow:0 16px 42px rgba(68,240,161,.24);
    }
    button.secondary{color:#fff;background:linear-gradient(135deg,#1a2532,#263748);box-shadow:none;border:1px solid var(--line)}
    button:disabled{opacity:.58;cursor:wait}
    .status{margin-top:14px;color:var(--muted);font-weight:800;min-height:22px}
    .status.is-error{color:var(--danger)}
    .status.is-success{color:var(--green)}
    .cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:16px}
    .card{border:1px solid var(--line);border-radius:20px;padding:16px;background:rgba(16,20,25,.82)}
    .card span{display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.12em}
    .card strong{display:block;margin-top:8px;font-size:26px}
    .table-wrap{margin-top:18px;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:rgba(16,20,25,.74)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:13px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px}
    th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.12em;background:rgba(255,255,255,.04)}
    tr:last-child td{border-bottom:0}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:rgba(93,183,255,.15);color:#bfe3ff}
    .empty{padding:34px;text-align:center;color:var(--muted);font-weight:800}
    @media(max-width:820px){
      .hero{grid-template-columns:1fr}
      .actions{justify-content:stretch}
      button{width:100%}
      .cards{grid-template-columns:repeat(2,minmax(0,1fr))}
      th:nth-child(4),td:nth-child(4){display:none}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">Admin PlayTalk</p>
        <h1>Niveis Globais</h1>
        <p class="lead" id="sourceLead">Carregando quantas cartas o sistema enxerga na pasta 1...</p>
        <p class="lead" id="trackedLead">Carregando em que nivel a Pax Romana trouxe paz ficou...</p>
        <p class="status" id="status">Carregando lista atual...</p>
      </div>
      <div class="actions">
        <button id="generateBtn" type="button">Gerar niveis</button>
        <button class="secondary" id="refreshBtn" type="button">Atualizar</button>
      </div>
    </section>

    <section class="cards" aria-label="Resumo">
      <div class="card"><span>Gerado em</span><strong id="generatedAt">--</strong></div>
      <div class="card"><span>Pares</span><strong id="pairCount">--</strong></div>
      <div class="card"><span>Cartas por nivel</span><strong id="countPerLevel">25</strong></div>
      <div class="card"><span>Total de niveis</span><strong id="totalLevels">--</strong></div>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Par</th>
            <th>Niveis</th>
            <th>Cartas candidatas</th>
            <th>Chave</th>
          </tr>
        </thead>
        <tbody id="summaryBody">
          <tr><td class="empty" colspan="4">Nenhuma lista carregada ainda.</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const els = {
      status: document.getElementById('status'),
      sourceLead: document.getElementById('sourceLead'),
      trackedLead: document.getElementById('trackedLead'),
      generateBtn: document.getElementById('generateBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
      generatedAt: document.getElementById('generatedAt'),
      pairCount: document.getElementById('pairCount'),
      countPerLevel: document.getElementById('countPerLevel'),
      totalLevels: document.getElementById('totalLevels'),
      summaryBody: document.getElementById('summaryBody')
    };

    function setStatus(message, tone = '') {
      els.status.textContent = message || '';
      els.status.className = 'status';
      if (tone) els.status.classList.add(`is-${tone}`);
    }

    function formatDate(value) {
      if (!value) return '--';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '--';
      return date.toLocaleString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderSourceLead(payload) {
      const summary = payload?.sourceSummary && typeof payload.sourceSummary === 'object' ? payload.sourceSummary : null;
      const count = Number(summary?.cardCount) || 0;
      const title = String(summary?.title || 'Pasta 1').trim() || 'Pasta 1';
      els.sourceLead.textContent = `O sistema do /generallevels esta vendo ${count} cartas na ${title}.`;
    }

    function renderTrackedLead(payload) {
      const tracked = payload?.trackedCards?.paxRomana && typeof payload.trackedCards.paxRomana === 'object'
        ? payload.trackedCards.paxRomana
        : null;
      const level = Number(tracked?.level) || 0;
      if (!tracked?.found || !level) {
        els.trackedLead.textContent = 'A carta Pax Romana trouxe paz nao apareceu na construcao atual do generallevels.';
        return;
      }
      const sourceLevel = Number(tracked?.sourceLevel) || 0;
      els.trackedLead.textContent = `Pax Romana trouxe paz foi parar no Nivel ${level} da lista global atual${sourceLevel ? `, vindo do slot ${sourceLevel}` : ''}.`;
    }

    function renderPayload(payload) {
      const summary = Array.isArray(payload?.summary) ? payload.summary : [];
      const totalLevels = summary.reduce((sum, item) => sum + (Number(item?.levelCount) || 0), 0);
      renderSourceLead(payload);
      renderTrackedLead(payload);
      els.generatedAt.textContent = formatDate(payload?.generatedAt);
      els.pairCount.textContent = String(Number(payload?.pairCount) || summary.length || 0);
      els.countPerLevel.textContent = String(Number(payload?.countPerLevel) || 25);
      els.totalLevels.textContent = String(totalLevels);
      els.summaryBody.innerHTML = '';
      if (!summary.length) {
        els.summaryBody.innerHTML = '<tr><td class="empty" colspan="4">Nenhuma lista gerada ainda.</td></tr>';
        return;
      }
      summary
        .slice()
        .sort((left, right) => String(left.key || '').localeCompare(String(right.key || '')))
        .forEach((item) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td><span class="pill">${item.targetLanguage || '--'} -> ${item.nativeLanguage || '--'}</span></td>
            <td>${Number(item.levelCount) || 0}</td>
            <td>${Number(item.candidateCount) || 0}</td>
            <td>${item.key || '--'}</td>
          `;
          els.summaryBody.appendChild(row);
        });
    }

    async function loadCurrent() {
      setStatus('Carregando lista atual...');
      try {
        const response = await fetch('/api/flashcards/general-levels', {
          credentials: 'include',
          cache: 'no-store'
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload?.success) {
          renderSourceLead(payload);
          renderTrackedLead(payload);
          throw new Error(payload?.message || 'Lista ainda nao gerada.');
        }
        renderPayload(payload);
        setStatus('Lista global carregada.', 'success');
      } catch (error) {
        renderPayload(null);
        setStatus(error?.message || 'Lista ainda nao gerada.', 'error');
      }
    }

    async function generate() {
      els.generateBtn.disabled = true;
      els.refreshBtn.disabled = true;
      setStatus('Gerando niveis globais com as cartas atuais...');
      try {
        const response = await fetch('/api/flashcards/general-levels/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ countPerLevel: 25 })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload?.success) {
          renderSourceLead(payload);
          renderTrackedLead(payload);
          throw new Error(payload?.message || 'Falha ao gerar niveis.');
        }
        renderPayload(payload);
        setStatus('Niveis globais regenerados com sucesso.', 'success');
      } catch (error) {
        setStatus(error?.message || 'Falha ao gerar niveis.', 'error');
      } finally {
        els.generateBtn.disabled = false;
        els.refreshBtn.disabled = false;
      }
    }

    els.generateBtn.addEventListener('click', generate);
    els.refreshBtn.addEventListener('click', loadCurrent);
    loadCurrent();
  </script>
</body>
</html>
