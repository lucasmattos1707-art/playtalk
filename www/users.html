<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Usuarios</title>
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --line-strong: rgba(140, 197, 255, 0.24);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --accent: #7ed0ff;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
      --native-top-offset: 0px;
      --footer-height: max(62px, 8vh);
      --footer-safe-bottom: env(safe-area-inset-bottom, 0px);
      --footer-total-height: calc(var(--footer-height) + var(--footer-safe-bottom));
    }

    * {
      box-sizing: border-box;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: lightblue;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle, #3498db 10%, transparent 20%),
        radial-gradient(circle, transparent 10%, #3498db 20%);
      background-size: 30px 30px;
      animation: moveBackground 8s linear infinite;
    }

    @keyframes moveBackground {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(20%, 20%);
      }
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      background: transparent;
    }

    body.is-native-runtime {
      --native-top-offset: 50px;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(14px + var(--native-top-offset)) 0 calc(var(--footer-total-height) + 20px);
    }

    .panel {
      width: 100%;
      padding: 30px 22px 22px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .panel-head {
      padding: 26px 22px 18px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 0;
      background: transparent;
      backdrop-filter: none;
    }

    .title {
      margin: 0;
      text-align: center;
      font-family: "PlaytalkDisplay", Impact, sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.1em;
      color: #ffffff;
      text-transform: uppercase;
    }

    .banner-carousel {
      width: 100vw;
      margin: 0 0 8px;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      overflow: hidden;
      background: transparent;
    }

    .banner-carousel__viewport {
      overflow: hidden;
    }

    .banner-carousel__track {
      display: flex;
      width: 400%;
      animation: bannersSlide 14s infinite;
    }

    body.is-admin-banner .banner-carousel.is-admin-paused .banner-carousel__track {
      animation-play-state: paused;
      transform: translateX(calc(var(--admin-focus-index, 0) * -25%));
    }

    .banner-carousel__item {
      width: 25%;
      min-height: 0;
      padding: 0;
      display: grid;
      align-content: start;
      justify-items: stretch;
      gap: 0;
      text-align: center;
      background: transparent;
      user-select: none;
      position: relative;
    }

    .banner-carousel__media {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 0;
      background: linear-gradient(140deg, rgba(27, 88, 161, 0.92), rgba(36, 112, 199, 0.9));
    }

    .banner-carousel__item:nth-child(2) .banner-carousel__media {
      background: linear-gradient(140deg, rgba(16, 116, 138, 0.92), rgba(30, 148, 172, 0.9));
    }

    .banner-carousel__item:nth-child(3) .banner-carousel__media {
      background: linear-gradient(140deg, rgba(41, 96, 159, 0.92), rgba(75, 133, 198, 0.9));
    }

    .banner-carousel__item:nth-child(4) .banner-carousel__media {
      background: linear-gradient(140deg, rgba(13, 95, 173, 0.92), rgba(38, 127, 214, 0.9));
    }

    .banner-carousel__media-image {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(100% + var(--banner-size-adjust, 0px));
      height: calc(100% + var(--banner-size-adjust, 0px));
      object-fit: cover;
      transform: translate(
        calc(-50% + var(--banner-offset-x, 0px)),
        calc(-50% + var(--banner-offset-y, 0px))
      );
      transition: transform 120ms ease, width 120ms ease, height 120ms ease, opacity 220ms ease;
      opacity: 0;
      pointer-events: none;
    }

    .banner-carousel__item.has-image .banner-carousel__media-image {
      opacity: 1;
    }

    body.is-admin-banner .banner-carousel__item {
      cursor: pointer;
    }

    .banner-carousel__item.is-editing .banner-carousel__media {
      box-shadow: inset 0 0 0 2px rgba(125, 255, 175, 0.9);
    }

    .banner-carousel__item.is-busy::after {
      content: "Gerando...";
      position: absolute;
      inset: 12px 10px auto;
      min-height: 24px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ffffff;
      background: rgba(8, 24, 44, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.26);
    }

    @keyframes bannersSlide {
      0%, 20% {
        transform: translateX(0);
      }

      25%, 45% {
        transform: translateX(-25%);
      }

      50%, 70% {
        transform: translateX(-50%);
      }

      75%, 95% {
        transform: translateX(-75%);
      }

      100% {
        transform: translateX(0);
      }
    }

    .status {
      min-height: 24px;
      margin: 12px 0 0;
      text-align: center;
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
    }

    .users-list {
      display: grid;
      gap: 10px;
    }

    .users-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 74px;
      padding: 10px 14px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .users-row.is-empty {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
      color: var(--muted);
    }

    .users-avatar {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%);
      overflow: hidden;
      position: relative;
    }

    .users-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .users-rank-badge {
      position: absolute;
      right: -6px;
      bottom: -4px;
      width: 28px;
      height: 28px;
      transform: none;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(210, 227, 255, 0.98) 100%);
      color: #0f2f6b;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.22);
      border: 1px solid rgba(37, 99, 235, 0.22);
      background-clip: padding-box;
      z-index: 2;
      text-shadow: none;
    }

    .users-rank-badge {
      background-image: linear-gradient(180deg, #153e75 0%, #1e3a8a 45%, #2563eb 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .users-main {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .users-name {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .users-count {
      min-width: 42px;
      text-align: right;
      font-size: 24px;
      font-weight: 900;
      color: #ffffff;
    }

    .users-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
    }

    .users-row.is-admin-target {
      cursor: pointer;
    }

    .users-row.is-admin-target:active {
      transform: scale(0.995);
    }

    .users-row.is-online {
      border-color: rgba(123, 245, 172, 0.32);
      box-shadow: inset 0 0 0 1px rgba(123, 245, 172, 0.16);
    }

    .users-admin-modal {
      position: fixed;
      inset: 0;
      z-index: 220;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(3, 10, 18, 0.8);
      backdrop-filter: blur(8px);
    }

    .users-admin-modal.is-visible {
      display: flex;
    }

    .users-admin-card {
      width: min(100%, 420px);
      display: grid;
      gap: 14px;
      padding: 22px 18px;
      border-radius: 28px;
      background: rgba(8, 28, 54, 0.96);
      border: 1px solid rgba(140, 197, 255, 0.2);
      box-shadow: 0 24px 60px rgba(0,0,0,0.34);
    }

    .users-admin-card h2 {
      margin: 0;
      font-family: "PlaytalkDisplay", Impact, sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .users-admin-copy {
      color: #d9ebff;
      font-size: 14px;
      line-height: 1.5;
    }

    .users-admin-actions {
      display: grid;
      gap: 10px;
    }

    .users-admin-btn {
      min-height: 50px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(180deg, #2f87ff, #1f62d1);
    }

    .users-admin-btn.is-danger {
      background: linear-gradient(180deg, #ff6b6b, #d63d3d);
    }

    .users-admin-btn.is-secondary {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .users-admin-status {
      min-height: 20px;
      color: #cfe6ff;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .users-challenge-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(2, 11, 24, 0.62);
      z-index: 230;
    }

    .users-challenge-modal.is-visible {
      display: flex;
    }

    .users-challenge-card {
      width: min(460px, 100%);
      border-radius: 24px;
      border: 1px solid rgba(124, 192, 255, 0.38);
      background: linear-gradient(145deg, rgba(28, 92, 156, 0.96), rgba(18, 70, 127, 0.95));
      color: #eff7ff;
      padding: 20px;
      box-shadow: 0 24px 52px rgba(2, 14, 29, 0.46);
      text-align: center;
    }

    .users-challenge-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0.02em;
    }

    .users-challenge-copy {
      margin: 0 0 14px;
      color: rgba(232, 244, 255, 0.94);
      line-height: 1.38;
      font-size: 14px;
    }

    .users-challenge-actions {
      display: grid;
      gap: 10px;
    }

    .users-challenge-btn {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      color: #08315e;
      background: linear-gradient(140deg, #b4dcff, #8cc8ff);
    }

    .users-challenge-btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .users-challenge-btn.is-secondary {
      color: #ecf4ff;
      background: rgba(12, 43, 82, 0.68);
      border: 1px solid rgba(174, 214, 255, 0.24);
    }

    .users-challenge-status {
      min-height: 20px;
      margin-top: 8px;
      color: #e5f2ff;
      font-size: 13px;
      text-align: center;
    }

    .incoming-challenge-avatar {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.54);
      box-shadow: 0 8px 20px rgba(2, 12, 29, 0.34);
      margin-bottom: 8px;
    }

    .flashcards-footer-nav {
      position: fixed !important;
      left: 0;
      right: 0;
      bottom: 0;
      bottom: var(--footer-safe-bottom);
      height: var(--footer-height);
      background: #157efb;
      display: grid !important;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100vw - 16px);
        padding-top: 0;
      }

      .panel-head {
        padding: 22px 14px 16px;
      }

      .panel {
        padding: 22px 14px 14px;
      }

      .users-row {
        grid-template-columns: auto minmax(0, 1fr) auto;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>
  <section class="banner-carousel" data-banner-carousel aria-label="Carrossel de banners">
    <div class="banner-carousel__viewport">
      <div class="banner-carousel__track">
        <article class="banner-carousel__item" data-banner-slot="1">
          <div class="banner-carousel__media">
            <img class="banner-carousel__media-image" alt="Banner 1" loading="lazy">
          </div>
        </article>
        <article class="banner-carousel__item" data-banner-slot="2">
          <div class="banner-carousel__media">
            <img class="banner-carousel__media-image" alt="Banner 2" loading="lazy">
          </div>
        </article>
        <article class="banner-carousel__item" data-banner-slot="3">
          <div class="banner-carousel__media">
            <img class="banner-carousel__media-image" alt="Banner 3" loading="lazy">
          </div>
        </article>
        <article class="banner-carousel__item" data-banner-slot="4">
          <div class="banner-carousel__media">
            <img class="banner-carousel__media-image" alt="Banner 4" loading="lazy">
          </div>
        </article>
      </div>
    </div>
  </section>

  <main class="page">
    <section class="panel-head">
      <h1 class="title">Usuarios</h1>
    </section>
    <p class="status" id="usersStatus">Carregando usuarios...</p>
    <section class="panel">
      <section class="users-list" id="usersList" aria-live="polite"></section>
    </section>
  </main>

  <div class="users-admin-modal" id="usersAdminModal" aria-modal="true" role="dialog" aria-label="Gerenciar usuario">
    <div class="users-admin-card">
      <h2 id="usersAdminTitle">Usuario</h2>
      <div class="users-admin-copy" id="usersAdminCopy">Escolha uma acao.</div>
      <div class="users-admin-actions">
        <button class="users-admin-btn" id="grant7Btn" type="button">Premium 7 dias</button>
        <button class="users-admin-btn" id="grant30Btn" type="button">Premium 30 dias</button>
        <button class="users-admin-btn" id="grant365Btn" type="button">Premium 1 ano</button>
        <button class="users-admin-btn is-danger" id="deleteUserBtn" type="button">Excluir usuario</button>
        <button class="users-admin-btn is-secondary" id="closeAdminModalBtn" type="button">Fechar</button>
      </div>
      <div class="users-admin-status" id="usersAdminStatus"></div>
    </div>
  </div>

  <div class="users-challenge-modal" id="usersChallengeModal" aria-modal="true" role="dialog" aria-label="Desafiar usuario">
    <div class="users-challenge-card">
      <h2 id="usersChallengeName">Usuario</h2>
      <p class="users-challenge-copy" id="usersChallengeCopy">Envie um desafio de speaking.</p>
      <div class="users-challenge-actions">
        <button class="users-challenge-btn" id="usersChallengeActionBtn" type="button">Desafiar</button>
        <button class="users-challenge-btn is-secondary" id="usersChallengeCloseBtn" type="button">Fechar</button>
      </div>
      <div class="users-challenge-status" id="usersChallengeStatus"></div>
    </div>
  </div>

  <div class="users-challenge-modal" id="incomingChallengeModal" aria-modal="true" role="dialog" aria-label="Convite de speaking">
    <div class="users-challenge-card">
      <img class="incoming-challenge-avatar" id="incomingChallengeAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do usuario">
      <h2>Novo desafio</h2>
      <p class="users-challenge-copy" id="incomingChallengeCopy">Usuario te desafiou pra um speaking</p>
      <div class="users-challenge-actions">
        <button class="users-challenge-btn" id="incomingChallengeAcceptBtn" type="button">Aceitar</button>
        <button class="users-challenge-btn is-secondary" id="incomingChallengeRejectBtn" type="button">Recusar</button>
      </div>
    </div>
  </div>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.36a1 1 0 0 0 0-1.72l-10-6.36A1 1 0 0 0 8 5.14Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/allcards" aria-label="Flashcards">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.6 2.5c.33 2.34 2.12 3.25 3.48 4.86 1.34 1.59 2 3.22 2 5.35 0 4.3-2.96 8.79-7.58 8.79-3.36 0-5.58-2.4-5.58-5.34 0-2.21 1.12-3.85 2.97-5.78 1.38-1.44 2.94-3.14 4.71-7.88Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/users" aria-label="Usuarios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v2h2a2 2 0 0 1 2 2c0 3.32-2.47 6-5.57 6.4A5.99 5.99 0 0 1 13 17.83V20h4v2H7v-2h4v-2.17A5.99 5.99 0 0 1 8.57 13.4C5.47 13 3 10.32 3 7a2 2 0 0 1 2-2h2V3Zm-2 4c0 2.1 1.45 3.82 3.4 4.28A6 6 0 0 1 7 7V7H5Zm14 0h-2a6 6 0 0 1-1.4 4.28C17.55 10.82 19 9.1 19 7Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
    </a>
  </nav>

  <script src="js/android-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/banner-carousel-admin.js"></script>
  <script src="js/android-shell.js"></script>
  <script>
    if (window.PlaytalkNative && typeof window.PlaytalkNative.isNativeRuntime === 'function' && window.PlaytalkNative.isNativeRuntime()) {
      document.body.classList.add('is-native-runtime');
    }
  </script>
  <script src="js/users-page.js"></script>
</body>
</html>
