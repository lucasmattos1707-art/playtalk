<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Usuarios</title>
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --line-strong: rgba(140, 197, 255, 0.24);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --accent: #7ed0ff;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
      --footer-height: max(62px, 8vh);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      background: transparent;
    }

    @keyframes usersGradient {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    .playtalk-wave-bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      background: linear-gradient(315deg, rgba(101, 0, 94, 1) 3%, rgba(60, 132, 206, 1) 38%, rgba(48, 238, 226, 1) 68%, rgba(255, 25, 25, 1) 98%);
      animation: usersGradient 15s ease infinite;
      background-size: 400% 400%;
      background-attachment: fixed;
    }

    .wave {
      background: rgb(255 255 255 / 25%);
      border-radius: 1000% 1000% 0 0;
      position: fixed;
      width: 200%;
      height: 12em;
      animation: usersWave 10s -3s linear infinite;
      transform: translate3d(0, 0, 0);
      opacity: 0.8;
      bottom: 0;
      left: 0;
    }

    .wave:nth-of-type(2) {
      bottom: -1.25em;
      animation: usersWave 18s linear reverse infinite;
      opacity: 0.8;
    }

    .wave:nth-of-type(3) {
      bottom: -2.5em;
      animation: usersWave 20s -1s reverse infinite;
      opacity: 0.9;
    }

    @keyframes usersWave {
      2% { transform: translateX(1px); }
      25% { transform: translateX(-25%); }
      50% { transform: translateX(-50%); }
      75% { transform: translateX(-25%); }
      100% { transform: translateX(1px); }
    }

    body > :not(.playtalk-wave-bg) {
      position: relative;
      z-index: 1;
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 0 calc(var(--footer-height) + 20px);
    }

    .panel {
      width: 100%;
      padding: 30px 22px 22px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--line);
      border-top: 0;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .panel-head {
      padding: 26px 22px 18px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--line);
      border-bottom: 0;
      background: rgba(7, 18, 34, 0.96);
    }

    .title {
      margin: 0;
      text-align: center;
      font-family: "PlaytalkDisplay", Impact, sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.1em;
      color: #ffffff;
      text-transform: uppercase;
    }

    .status {
      min-height: 24px;
      margin: 0 0 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .users-list {
      display: grid;
      gap: 12px;
    }

    .users-row {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .users-row.is-empty {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
      color: var(--muted);
    }

    .users-rank {
      min-width: 42px;
      font-size: 26px;
      font-weight: 900;
      color: var(--accent);
      text-align: left;
    }

    .users-avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%);
      overflow: hidden;
    }

    .users-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .users-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .users-name {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .users-sub {
      font-size: 14px;
      color: var(--muted);
    }

    .users-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .users-action {
      border: 1px solid rgba(126, 208, 255, 0.22);
      background: rgba(126, 208, 255, 0.08);
      color: #f4f8ff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .users-action:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    .flashcards-footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #157efb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 40;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item img {
      width: 28px;
      height: 28px;
      display: block;
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100vw - 16px);
        padding-top: 0;
      }

      .panel-head {
        padding: 22px 14px 16px;
      }

      .panel {
        padding: 22px 14px 14px;
      }

      .users-row {
        grid-template-columns: 1fr;
        padding: 14px 12px;
      }

      .users-rank {
        min-width: 0;
        font-size: 22px;
      }

      .users-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="playtalk-wave-bg" aria-hidden="true">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>
  <main class="page">
    <section class="panel-head">
      <h1 class="title">Usuarios</h1>
    </section>
    <section class="panel">
      <p class="status" id="usersStatus">Carregando usuarios...</p>
      <section class="users-list" id="usersList" aria-live="polite"></section>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <img src="svgnovo/play.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item" href="/mycards" aria-label="Flashcards">
      <img src="svgnovo/cards.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/users" aria-label="Usuarios">
      <img src="svgnovo/cup.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <img src="svgnovo/profile.svg" alt="">
    </a>
  </nav>

  <script src="js/apk-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/users-page.js"></script>
</body>
</html>
