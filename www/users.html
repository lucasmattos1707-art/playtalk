<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Usuarios</title>
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --line-strong: rgba(140, 197, 255, 0.24);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --accent: #7ed0ff;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
      --footer-height: max(62px, 8vh);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      background: linear-gradient(180deg, #ffffff 0%, #edf8fc 36%, #d4edf7 68%, #228ebf 100%);
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 0 calc(var(--footer-height) + 20px);
    }

    .panel {
      width: 100%;
      padding: 30px 22px 22px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--line);
      border-top: 0;
      background: rgba(9, 21, 38, 0.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .panel-head {
      padding: 26px 22px 18px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--line);
      border-bottom: 0;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(18px);
    }

    .title {
      margin: 0;
      text-align: center;
      font-family: "PlaytalkDisplay", Impact, sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.1em;
      color: #ffffff;
      text-transform: uppercase;
    }

    .status {
      min-height: 24px;
      margin: 0 0 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .users-list {
      display: grid;
      gap: 12px;
    }

    .users-row {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .users-row.is-empty {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
      color: var(--muted);
    }

    .users-rank {
      min-width: 42px;
      font-size: 26px;
      font-weight: 900;
      color: var(--accent);
      text-align: left;
    }

    .users-avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%);
      overflow: hidden;
    }

    .users-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .users-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .users-name {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .users-sub {
      font-size: 14px;
      color: var(--muted);
    }

    .users-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .users-action {
      border: 1px solid rgba(126, 208, 255, 0.22);
      background: rgba(126, 208, 255, 0.08);
      color: #f4f8ff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .users-action:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    .flashcards-footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #157efb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
      visibility: visible;
      opacity: 1;
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100vw - 16px);
        padding-top: 0;
      }

      .panel-head {
        padding: 22px 14px 16px;
      }

      .panel {
        padding: 22px 14px 14px;
      }

      .users-row {
        grid-template-columns: 1fr;
        padding: 14px 12px;
      }

      .users-rank {
        min-width: 0;
        font-size: 22px;
      }

      .users-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel-head">
      <h1 class="title">Usuarios</h1>
    </section>
    <section class="panel">
      <p class="status" id="usersStatus">Carregando usuarios...</p>
      <section class="users-list" id="usersList" aria-live="polite"></section>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.36a1 1 0 0 0 0-1.72l-10-6.36A1 1 0 0 0 8 5.14Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/mycards" aria-label="Flashcards">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.6 2.5c.33 2.34 2.12 3.25 3.48 4.86 1.34 1.59 2 3.22 2 5.35 0 4.3-2.96 8.79-7.58 8.79-3.36 0-5.58-2.4-5.58-5.34 0-2.21 1.12-3.85 2.97-5.78 1.38-1.44 2.94-3.14 4.71-7.88Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/users" aria-label="Usuarios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v2h2a2 2 0 0 1 2 2c0 3.32-2.47 6-5.57 6.4A5.99 5.99 0 0 1 13 17.83V20h4v2H7v-2h4v-2.17A5.99 5.99 0 0 1 8.57 13.4C5.47 13 3 10.32 3 7a2 2 0 0 1 2-2h2V3Zm-2 4c0 2.1 1.45 3.82 3.4 4.28A6 6 0 0 1 7 7V7H5Zm14 0h-2a6 6 0 0 1-1.4 4.28C17.55 10.82 19 9.1 19 7Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
    </a>
  </nav>

  <script src="js/apk-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/users-page.js"></script>
</body>
</html>
