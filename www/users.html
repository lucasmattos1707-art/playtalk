<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Usuarios</title>
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --line-strong: rgba(140, 197, 255, 0.24);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --accent: #7ed0ff;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
      --footer-height: max(62px, 8vh);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(80, 170, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #081322 0%, #050b14 100%);
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 0 calc(var(--footer-height) + 20px);
    }

    .panel {
      width: 100%;
      padding: 30px 22px 22px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--line);
      border-top: 0;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .panel-head {
      padding: 26px 22px 18px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--line);
      border-bottom: 0;
      background: rgba(7, 18, 34, 0.96);
    }

    .title {
      margin: 0;
      text-align: center;
      font-family: "PlaytalkDisplay", Impact, sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.1em;
      color: #ffffff;
      text-transform: uppercase;
    }

    .status {
      min-height: 24px;
      margin: 0 0 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .users-list {
      display: grid;
      gap: 12px;
    }

    .users-row {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .users-row.is-empty {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
      color: var(--muted);
    }

    .users-rank {
      min-width: 42px;
      font-size: 26px;
      font-weight: 900;
      color: var(--accent);
      text-align: left;
    }

    .users-avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%);
      overflow: hidden;
    }

    .users-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .users-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .users-name {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .users-sub {
      font-size: 14px;
      color: var(--muted);
    }

    .users-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .users-action {
      border: 1px solid rgba(126, 208, 255, 0.22);
      background: rgba(126, 208, 255, 0.08);
      color: #f4f8ff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .users-action:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    .flashcards-footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #157efb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 40;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item img {
      width: 28px;
      height: 28px;
      display: block;
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100vw - 16px);
        padding-top: 0;
      }

      .panel-head {
        padding: 22px 14px 16px;
      }

      .panel {
        padding: 22px 14px 14px;
      }

      .users-row {
        grid-template-columns: 1fr;
        padding: 14px 12px;
      }

      .users-rank {
        min-width: 0;
        font-size: 22px;
      }

      .users-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel-head">
      <h1 class="title">Usuarios</h1>
    </section>
    <section class="panel">
      <p class="status" id="usersStatus">Carregando usuarios...</p>
      <section class="users-list" id="usersList" aria-live="polite"></section>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <img src="svgnovo/play.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item" href="/mycards" aria-label="Flashcards">
      <img src="svgnovo/cards.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/users" aria-label="Usuarios">
      <img src="svgnovo/cup.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <img src="svgnovo/profile.svg" alt="">
    </a>
  </nav>

  <script src="js/apk-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/users-page.js"></script>
</body>
</html>
