<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Criar aula | PlayTalk</title>
  <meta
    name="description"
    content="Crie aulas com quadros de imagem, áudio, vídeo, texto e alternativas."
  >
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/settings.js"></script>
  <script src="js/lens.js"></script>
  <script src="js/site-nav.js"></script>
</head>
<body class="page-create" data-lens-context="menus">
  <header class="site-header" id="global-header">
    <div class="site-header__profile">
      <div class="site-header__text">
        <span class="site-header__name">PlayTalk</span>
      </div>
    </div>
  </header>
  <main id="create-container" class="container-screen container-screen--create" data-page-transition>
    <section class="create-panel">
      <div class="create-panel__header">
        <div>
          <h1 class="create-title">Criador de aulas</h1>
          <p class="create-subtitle">Monte quadros um de cada vez, com visualização imediata.</p>
        </div>
        <div class="create-actions">
          <button id="create-frame-btn" class="btn-primary create-action-btn create-action-btn--add" type="button">Adicionar</button>
        </div>
      </div>
      <div class="create-lesson-info">
        <label class="create-field">
          <span>Título da aula</span>
          <input id="lesson-title" type="text" placeholder="Ex: Present simple" autocomplete="off">
        </label>
      </div>
      <div id="frame-menu" class="create-menu hidden" role="dialog" aria-modal="true">
        <div class="create-menu__content">
          <h2>Escolha o tipo de quadro</h2>
          <div class="create-menu__grid">
            <button class="create-menu__card create-menu__card--image" data-frame-type="image" type="button">
              <span class="create-menu__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm0 2v10h16V7H4zm4 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm2.5 8h8.5l-4.25-5-2.25 2.75-1.5-1.75L8 17z"></path>
                </svg>
              </span>
              <span class="create-menu__label">Quadro 1: Imagem</span>
            </button>
            <button class="create-menu__card create-menu__card--audio" data-frame-type="audio" type="button">
              <span class="create-menu__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M14 3v11.5a3.5 3.5 0 1 1-2-3.15V7.5l8-2v9.5a3.5 3.5 0 1 1-2-3.15V4.5l-4 1z"></path>
                </svg>
              </span>
              <span class="create-menu__label">Quadro 2: Áudio</span>
            </button>
            <button class="create-menu__card create-menu__card--video" data-frame-type="video" type="button">
              <span class="create-menu__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M4 6h11a1 1 0 0 1 1 1v3.2l4-2.3v8.2l-4-2.3V17a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z"></path>
                </svg>
              </span>
              <span class="create-menu__label">Quadro 4: Vídeo</span>
            </button>
            <button class="create-menu__card create-menu__card--quiz" data-frame-type="quiz" type="button">
              <span class="create-menu__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M6 4h12a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H9l-5 5v-5H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm2 6.5 2.2 2.2 5.8-5.8 1.4 1.4-7.2 7.2-3.6-3.6L8 10.5z"></path>
                </svg>
              </span>
              <span class="create-menu__label">Quadro 5: Interativo</span>
            </button>
            <button class="create-menu__card create-menu__card--text" data-frame-type="text" type="button">
              <span class="create-menu__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M4 5h16v2H13v12h-2V7H4V5zm4 6h8v2H8v-2zm0 4h8v2H8v-2z"></path>
                </svg>
              </span>
              <span class="create-menu__label">Quadro 6: Texto</span>
            </button>
          </div>
          <button id="close-menu-btn" class="btn-secondary create-menu__close" type="button">Fechar</button>
        </div>
      </div>
      <div id="visual-menu" class="create-menu hidden" role="dialog" aria-modal="true">
        <div class="create-menu__content">
          <h2>Escolha o tipo de visual</h2>
          <div class="create-menu__grid">
            <button class="create-menu__card create-menu__card--visual-image" data-visual-type="image" type="button">
              <span class="create-menu__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm0 2v10h16V7H4zm4 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm2.5 8h8.5l-4.25-5-2.25 2.75-1.5-1.75L8 17z"></path>
                </svg>
              </span>
              <span class="create-menu__label">Imagem</span>
            </button>
            <button class="create-menu__card create-menu__card--visual-text" data-visual-type="text" type="button">
              <span class="create-menu__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M4 5h16v2H13v12h-2V7H4V5zm4 6h8v2H8v-2zm0 4h8v2H8v-2z"></path>
                </svg>
              </span>
              <span class="create-menu__label">Texto</span>
            </button>
            <button class="create-menu__card create-menu__card--visual-video" data-visual-type="video" type="button">
              <span class="create-menu__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M4 6h11a1 1 0 0 1 1 1v3.2l4-2.3v8.2l-4-2.3V17a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z"></path>
                </svg>
              </span>
              <span class="create-menu__label">Vídeo</span>
            </button>
          </div>
          <button id="close-visual-menu-btn" class="btn-secondary create-menu__close" type="button">Fechar</button>
        </div>
      </div>
      <div class="create-workspace">
        <section class="create-editor">
          <h2 class="create-section-title">Editor do quadro</h2>
          <div id="frame-form" class="create-form"></div>
        </section>
        <section class="create-preview">
          <div class="create-preview__header">
            <h2 class="create-section-title">Prévia do quadro</h2>
            <div class="create-preview__controls">
              <button id="preview-play" class="btn-secondary" type="button">▶️ Reproduzir</button>
              <label class="create-preview__time" aria-label="Tempo em milissegundos">
                <input id="preview-time" class="create-preview__time-input" type="number" min="0" step="1" value="0">
                <span>ms</span>
              </label>
            </div>
          </div>
          <div id="frame-preview" class="class-frame create-frame"></div>
          <div class="create-progress">
            <div class="create-progress__track">
              <div id="visual-progress" class="create-progress__visual"></div>
              <div id="progress-fill" class="create-progress__fill"></div>
            </div>
            <input id="progress-seek" class="create-progress__seek" type="range" min="0" max="100" value="0">
          </div>
        </section>
      </div>
    </section>
    <section id="lesson-overview" class="create-overview" aria-live="polite">
      <div class="create-overview__header">
        <div>
          <h2 class="create-section-title">Visão da aula</h2>
          <p id="lesson-total" class="create-overview__total">Tempo total: 0s</p>
        </div>
        <div class="create-overview__actions">
          <button id="play-lesson" class="btn-primary" type="button">Assistir aula</button>
          <button id="export-lesson" class="btn-secondary" type="button">Exportar</button>
        </div>
      </div>
      <div id="overview-list" class="create-overview__list"></div>
    </section>
  </main>
  <div id="lesson-player" class="lesson-player" role="dialog" aria-modal="true">
    <div class="lesson-player__container">
      <button id="lesson-player-close" class="lesson-player__close" type="button" aria-label="Fechar reprodução">✕</button>
      <div id="lesson-player-frame" class="class-frame lesson-player__frame"></div>
    </div>
  </div>
  <script src="js/create-page.js"></script>
</body>
</html>
