<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Speaking | PlayTalk</title>
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <script src="js/api-config.js"></script>
  <script src="/config.js"></script>
  <script src="js/openai-stt.js"></script>
  <script src="js/android-speech.js"></script>
  <script src="js/android-shell.js"></script>
  <style>
    :root {
      --bg-1: #06141f;
      --bg-2: #102838;
      --card: rgba(9, 32, 47, 0.88);
      --line: rgba(124, 192, 150, 0.35);
      --text: #e8f5ef;
      --muted: #a8c6b6;
      --accent: #7cc096;
      --accent-2: #a8ddb6;
      --enemy: #ffb25e;
      --enemy-2: #ff8d4a;
      --danger: #ff8f8f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background: transparent;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #041226 url('/accesskey/quantum-gradient.svg') center/cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .speaking-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 22px 16px 28px;
    }

    .speaking-card {
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      backdrop-filter: blur(8px);
      box-shadow: none;
    }

    .home-title {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.3px;
    }

    .home-copy {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.4;
    }

    .home-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .home-row select,
    .home-row button,
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 15px;
      font-weight: 600;
    }

    .home-row select {
      background: #17394d;
      color: var(--text);
      min-width: 130px;
      outline: 1px solid rgba(255, 255, 255, 0.06);
    }

    .home-row button,
    .btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0f3021;
      cursor: pointer;
    }

    .home-row button:disabled,
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .speaking-game { display: none; margin-top: 12px; }
    .speaking-game.is-active { display: block; }

    .duel-head {
      display: none;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .speaking-percent {
      font-size: 24px;
      font-weight: 800;
      color: #b8f5cc;
    }

    .enemy-speaking {
      font-size: 21px;
      font-weight: 800;
      color: #ffb56b;
      text-align: right;
      margin-left: auto;
    }

    .progress-wrap {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      overflow: hidden;
      margin-top: 7px;
    }

    .progress-wrap.is-enemy { margin-top: 7px; }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #63c983, #a8ddb6);
      transition: width 240ms ease;
    }

    .progress-bar.enemy {
      background: linear-gradient(90deg, var(--enemy), var(--enemy-2));
    }

    .progress-copy {
      margin: 8px 0 8px;
      text-align: left;
      color: #cbe8d7;
      font-size: 14px;
      font-weight: 700;
    }

    .duel-avatars {
      display: flex;
      gap: 26px;
      align-items: center;
      align-items: center;
      justify-content: center;
      margin: 14px 0 14px;
    }

    .duel-avatar {
      display: grid;
      justify-items: center;
      gap: 6px;
      min-width: 116px;
    }

    .duel-avatar__ring {
      --percent: 0;
      --ring-a: #61f2a4;
      --ring-b: #2c7f50;
      width: 124px;
      height: 124px;
      border-radius: 50%;
      background:
        conic-gradient(var(--ring-a) calc(var(--percent) * 1%), rgba(255,255,255,0.16) 0%);
      display: grid;
      place-items: center;
      animation: ringPulse 1600ms ease-in-out infinite;
      box-shadow: 0 8px 18px rgba(0,0,0,0.24);
    }

    .duel-avatar__ring.enemy {
      --ring-a: #ffb25e;
      --ring-b: #ff8d4a;
    }

    .duel-avatar__ring::after {
      content: "";
      width: 106px;
      height: 106px;
      border-radius: 50%;
      background: rgba(6, 20, 34, 0.8);
      position: absolute;
      pointer-events: none;
    }

    .duel-avatar__ring img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      border: 2px solid rgba(255,255,255,0.64);
    }

    .duel-avatar__name {
      margin: 0;
      font-size: 13px;
      color: #d0e7da;
      font-weight: 700;
      text-align: center;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .duel-avatar__percent {
      margin: 0;
      font-size: 17px;
      font-weight: 800;
      color: #b9f7cd;
    }

    .duel-avatar__percent.enemy {
      color: #ffbc71;
    }

    .card-word {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      min-height: 52px;
      will-change: transform, opacity;
    }

    .card-word.is-slide {
      animation: wordSlide 360ms ease;
    }

    .card-subword {
      margin: 8px 0 12px;
      text-align: center;
      color: var(--muted);
      font-size: 17px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-secondary {
      background: #1c3f54;
      color: var(--text);
    }

    .btn.is-mic-live {
      background: linear-gradient(135deg, #1d77ff, #52a8ff);
      color: #ffffff;
    }

    .status {
      margin: 12px 0 0;
      min-height: 22px;
      text-align: center;
      color: #d2ecde;
    }

    .status.is-error { color: var(--danger); }
    .status.is-score { color: #bdf0cf; }

    .final-result {
      display: none;
      margin-top: 16px;
      border-radius: 14px;
      border: 1px solid rgba(168, 221, 182, 0.5);
      background: rgba(28, 75, 50, 0.45);
      text-align: center;
      padding: 18px;
      font-size: 26px;
      font-weight: 800;
      color: #d4f9df;
      animation: fadeIn 240ms ease;
    }

    .final-result.is-visible { display: block; }

    .winner-card {
      display: none;
      margin-top: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 179, 103, 0.6);
      background: rgba(83, 45, 18, 0.54);
      padding: 12px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-weight: 800;
      color: #ffd9b2;
    }

    .winner-card.is-visible {
      display: flex;
    }

    .winner-card img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 218, 163, 0.76);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes wordSlide {
      from {
        opacity: 0.2;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .home-title { font-size: 24px; }
      .card-word { font-size: 24px; }
      .enemy-speaking { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>
  <main class="speaking-shell">
    <section class="speaking-card" id="speakingHome">
      <h1 class="home-title">Speaking Mode</h1>
      <p class="home-copy">Escolha quantas cartas voce quer jogar. Aqui roda apenas o modo <strong>first-star</strong>, com foco na sua pronuncia geral.</p>
      <div class="home-row">
        <label for="cardCountSelect">Cartas</label>
        <select id="cardCountSelect" aria-label="Quantidade de cartas">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="75">75</option>
          <option value="100">100</option>
        </select>
        <button id="startSpeakingBtn" type="button">Iniciar</button>
      </div>
      <p class="status" id="homeStatus" aria-live="polite"></p>
    </section>

    <section class="speaking-card speaking-game" id="speakingGame">
      <div class="duel-head">
        <div class="speaking-percent" id="speakingPercent">Speaking 0%</div>
        <div class="enemy-speaking" id="enemySpeakingPercent">Speaking rival 0%</div>
      </div>

      <div class="progress-wrap" aria-hidden="true">
        <div class="progress-bar" id="gameProgressBar"></div>
      </div>
      <div class="progress-wrap is-enemy" aria-hidden="true" id="enemyProgressWrap">
        <div class="progress-bar enemy" id="enemyProgressBar"></div>
      </div>
      <p class="progress-copy" id="progressLabel">0/0 concluidas</p>

      <div class="duel-avatars" id="duelAvatarsWrap">
        <article class="duel-avatar">
          <div class="duel-avatar__ring" id="mePronRing">
            <img id="meAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Seu avatar">
          </div>
          <p class="duel-avatar__name" id="meAvatarName">Voce</p>
          <p class="duel-avatar__percent" id="meAvatarPercent">0%</p>
        </article>
        <article class="duel-avatar">
          <div class="duel-avatar__ring enemy" id="enemyPronRing">
            <img id="enemyAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do adversario">
          </div>
          <p class="duel-avatar__name" id="enemyAvatarName">Adversario</p>
          <p class="duel-avatar__percent enemy" id="enemyAvatarPercent">0%</p>
        </article>
      </div>
      <h2 class="card-word" id="cardEnglishWord">-</h2>
      <p class="card-subword" id="cardPortugueseWord" hidden>-</p>

      <div class="actions">
        <button class="btn" id="sendSpeakingBtn" type="button">Ligar microfone</button>
      </div>
      <p class="status" id="gameStatus" aria-live="polite"></p>
      <div class="final-result" id="finalResultBox">0% seu resultado final</div>
      <div class="winner-card" id="winnerCard">
        <img id="winnerAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do vencedor">
        <span id="winnerName">Vencedor Usuario</span>
      </div>
    </section>
  </main>

  <audio id="successAudio" src="gamesounds/success.mp3" preload="auto"></audio>
  <script src="js/speaking-page.js"></script>
</body>
</html>
