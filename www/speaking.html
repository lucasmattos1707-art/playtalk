<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Speaking | PlayTalk</title>
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <script src="js/api-config.js"></script>
  <script src="/config.js"></script>
  <script src="js/android-speech.js"></script>
  <script src="js/android-shell.js"></script>
  <style>
    :root {
      --bg-1: #06141f;
      --bg-2: #102838;
      --card: rgba(9, 32, 47, 0.88);
      --line: rgba(124, 192, 150, 0.35);
      --text: #e8f5ef;
      --muted: #a8c6b6;
      --accent: #7cc096;
      --accent-2: #a8ddb6;
      --enemy: #ffb25e;
      --enemy-2: #ff8d4a;
      --danger: #ff8f8f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background: transparent;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #041226 url('/accesskey/quantum-gradient.svg') center/cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .speaking-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 22px 16px 28px;
    }

    .speaking-card {
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      backdrop-filter: blur(8px);
      box-shadow: none;
    }

    .home-title {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.3px;
    }

    .home-copy {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.4;
    }

    .home-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .home-row select,
    .home-row button,
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 15px;
      font-weight: 600;
    }

    .home-row select {
      background: #17394d;
      color: var(--text);
      min-width: 130px;
      outline: 1px solid rgba(255, 255, 255, 0.06);
    }

    .home-row button,
    .btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0f3021;
      cursor: pointer;
    }

    .home-row button:disabled,
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .speaking-game { display: none; margin-top: 12px; }
    .speaking-game.is-active { display: block; }
    .speaking-game.is-prestart .progress-wrap,
    .speaking-game.is-prestart .progress-copy,
    .speaking-game.is-prestart .duel-avatars,
    .speaking-game.is-prestart .card-word,
    .speaking-game.is-prestart .card-subword,
    .speaking-game.is-prestart .mic-trigger-wrap,
    .speaking-game.is-prestart .final-result,
    .speaking-game.is-prestart .winner-card {
      display: none !important;
    }

    .speaking-game.is-winner .duel-intro,
    .speaking-game.is-winner .duel-head,
    .speaking-game.is-winner .progress-wrap,
    .speaking-game.is-winner .progress-copy,
    .speaking-game.is-winner .duel-avatars,
    .speaking-game.is-winner .card-word,
    .speaking-game.is-winner .card-subword,
    .speaking-game.is-winner .mic-trigger-wrap,
    .speaking-game.is-winner .final-result,
    .speaking-game.is-winner .winner-card {
      display: none !important;
    }

    .duel-intro {
      display: none;
      margin: 8px 0 10px;
      padding: 18px 12px 14px;
      border-radius: 18px;
      border: 0;
      background: transparent;
      text-align: center;
    }

    .duel-intro.is-visible {
      display: block;
      animation: fadeIn 220ms ease;
    }

    .duel-intro__avatars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .duel-intro__vs {
      font-size: 26px;
      font-weight: 900;
      color: #b8f5cc;
      text-shadow: 0 0 14px rgba(124, 192, 150, 0.45);
      letter-spacing: 1px;
    }

    .duel-intro__player {
      display: grid;
      justify-items: center;
      gap: 8px;
      min-width: 140px;
    }

    .duel-intro__avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.4);
      background: rgba(8, 24, 38, 0.8);
    }

    .duel-intro__name {
      margin: 0;
      max-width: 180px;
      font-size: 16px;
      font-weight: 800;
      color: #dff8eb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .duel-intro__countdown {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      color: #bff7d0;
    }

    .duel-head {
      display: none;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .speaking-percent {
      font-size: 24px;
      font-weight: 800;
      color: #b8f5cc;
    }

    .enemy-speaking {
      font-size: 21px;
      font-weight: 800;
      color: #ffb56b;
      text-align: right;
      margin-left: auto;
    }

    .progress-wrap {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      overflow: hidden;
      margin-top: 7px;
    }

    .progress-wrap.is-enemy { margin-top: 7px; }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #63c983, #a8ddb6);
      transition: width 1000ms ease;
    }

    .progress-bar.enemy {
      background: linear-gradient(90deg, var(--enemy), var(--enemy-2));
    }

    .progress-copy {
      margin: 8px 0 8px;
      text-align: left;
      color: #cbe8d7;
      font-size: 14px;
      font-weight: 700;
    }

    .duel-avatars {
      display: flex;
      gap: 26px;
      align-items: center;
      align-items: center;
      justify-content: center;
      margin: 14px 0 14px;
    }

    .duel-avatar {
      display: grid;
      justify-items: center;
      gap: 6px;
      min-width: 116px;
    }

    .duel-avatar__ring {
      --percent: 0;
      --ring-a: #61f2a4;
      --ring-b: #2c7f50;
      width: 143px;
      height: 143px;
      padding: 6px;
      border-radius: 50%;
      background:
        conic-gradient(var(--ring-a) calc(var(--percent) * 1%), rgba(255,255,255,0.16) 0%);
      display: grid;
      place-items: center;
      animation: ringPulse 1600ms ease-in-out infinite;
      box-shadow: 0 8px 18px rgba(0,0,0,0.24);
    }

    .duel-avatar__ring.enemy {
      --ring-a: #ffb25e;
      --ring-b: #ff8d4a;
    }

    .duel-avatar__ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 0;
    }

    .duel-avatar__name {
      margin: 0;
      font-size: 13px;
      color: #d0e7da;
      font-weight: 700;
      text-align: center;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .duel-avatar__percent {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      color: #b9f7cd;
    }

    .duel-avatar__percent.enemy {
      color: #ffbc71;
    }

    .card-word {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      min-height: 52px;
      will-change: transform, opacity;
    }

    .card-word.is-slide {
      animation: wordSlide 360ms ease;
    }

    .card-subword {
      margin: 8px 0 12px;
      text-align: center;
      color: var(--muted);
      font-size: 17px;
    }

    .mic-trigger-wrap {
      display: flex;
      justify-content: center;
      margin: 8px 0 6px;
    }

    .mic-trigger {
      width: min(180px, 42vw);
      height: 15vh;
      min-height: 100px;
      max-height: 180px;
      border: 0;
      border-radius: 26px;
      background: radial-gradient(circle at 30% 20%, rgba(123, 191, 150, 0.34), transparent 45%), rgba(19, 58, 78, 0.58);
      color: #d9ffeb;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
    }

    .mic-trigger svg {
      width: 72%;
      height: 72%;
      display: block;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.28));
    }

    .mic-trigger:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.32);
    }

    .mic-trigger:disabled {
      opacity: 0.52;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .mic-trigger.is-mic-live {
      background: radial-gradient(circle at 30% 20%, rgba(82, 168, 255, 0.34), transparent 46%), rgba(25, 78, 136, 0.64);
      animation: micPulse 900ms ease-in-out infinite;
    }

    .btn-secondary {
      background: #1c3f54;
      color: var(--text);
    }

    .btn.is-mic-live {
      background: linear-gradient(135deg, #1d77ff, #52a8ff);
      color: #ffffff;
    }

    .status {
      margin: 12px 0 0;
      min-height: 22px;
      text-align: center;
      color: #d2ecde;
    }

    .status.is-error { color: var(--danger); }
    .status.is-score { color: #bdf0cf; }

    .final-result {
      display: none;
      margin-top: 16px;
      border-radius: 14px;
      border: 1px solid rgba(168, 221, 182, 0.5);
      background: rgba(28, 75, 50, 0.45);
      text-align: center;
      padding: 18px;
      font-size: 26px;
      font-weight: 800;
      color: #d4f9df;
      animation: fadeIn 240ms ease;
    }

    .final-result.is-visible { display: block; }

    .winner-card {
      display: none;
      margin-top: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 179, 103, 0.6);
      background: rgba(83, 45, 18, 0.54);
      padding: 12px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-weight: 800;
      color: #ffd9b2;
    }

    .winner-card.is-visible {
      display: flex;
    }

    .winner-card img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 218, 163, 0.76);
    }

    .winner-reveal {
      display: none;
      min-height: 58vh;
      margin-top: 12px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      text-align: center;
      animation: winnerFlash 360ms ease-in-out infinite alternate;
    }

    .winner-reveal.is-visible {
      display: flex;
    }

    .winner-reveal__avatar {
      width: min(56vw, 280px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.82);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.36);
      animation: winnerPulse 2000ms ease-in-out infinite;
      will-change: transform;
    }

    .winner-reveal__text {
      margin: 0;
      font-size: clamp(34px, 9vw, 72px);
      letter-spacing: 0.08em;
      color: #fff3d8;
      text-shadow: 0 0 24px rgba(255, 210, 140, 0.5);
      font-weight: 900;
      animation: winnerPulse 2000ms ease-in-out infinite;
      will-change: transform;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes wordSlide {
      from {
        opacity: 0.2;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes micPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    @keyframes winnerPulse {
      0%, 100% { transform: scale(0.9); }
      50% { transform: scale(1.1); }
    }

    @keyframes winnerFlash {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.18); }
    }

    @media (max-width: 640px) {
      .home-title { font-size: 24px; }
      .card-word { font-size: 24px; }
      .enemy-speaking { font-size: 18px; }
      .duel-intro__avatar {
        width: 124px;
        height: 124px;
      }
      .duel-intro__countdown {
        font-size: 19px;
      }
      .duel-avatar__ring {
        width: 126px;
        height: 126px;
      }
      .duel-avatar__percent {
        font-size: 20px;
      }
      .mic-trigger {
        width: min(210px, 64vw);
      }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>
  <main class="speaking-shell">
    <section class="speaking-card" id="speakingHome">
      <h1 class="home-title">Speaking Mode</h1>
      <p class="home-copy">Escolha quantas cartas voce quer jogar. Aqui roda apenas o modo <strong>first-star</strong>, com foco na sua pronuncia geral.</p>
      <div class="home-row">
        <label for="cardCountSelect">Cartas</label>
        <select id="cardCountSelect" aria-label="Quantidade de cartas">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="75">75</option>
          <option value="100">100</option>
        </select>
        <button id="startSpeakingBtn" type="button">Iniciar</button>
      </div>
      <p class="status" id="homeStatus" aria-live="polite"></p>
    </section>

    <section class="speaking-card speaking-game" id="speakingGame">
      <section class="duel-intro" id="duelIntro" hidden>
        <div class="duel-intro__avatars">
          <article class="duel-intro__player">
            <img class="duel-intro__avatar" id="duelIntroMeAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Seu avatar grande">
            <p class="duel-intro__name" id="duelIntroMeName">Você</p>
          </article>
          <span class="duel-intro__vs">VS</span>
          <article class="duel-intro__player">
            <img class="duel-intro__avatar" id="duelIntroEnemyAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar grande do adversario">
            <p class="duel-intro__name" id="duelIntroEnemyName">Adversário</p>
          </article>
        </div>
        <p class="duel-intro__countdown" id="duelIntroCountdown">O desafio vai começar em 5...</p>
      </section>

      <div class="duel-head">
        <div class="speaking-percent" id="speakingPercent">Speaking 0%</div>
        <div class="enemy-speaking" id="enemySpeakingPercent">Speaking rival 0%</div>
      </div>

      <div class="progress-wrap" aria-hidden="true">
        <div class="progress-bar" id="gameProgressBar"></div>
      </div>
      <div class="progress-wrap is-enemy" aria-hidden="true" id="enemyProgressWrap">
        <div class="progress-bar enemy" id="enemyProgressBar"></div>
      </div>
      <p class="progress-copy" id="progressLabel" hidden></p>

      <div class="duel-avatars" id="duelAvatarsWrap">
        <article class="duel-avatar">
          <div class="duel-avatar__ring" id="mePronRing">
            <img id="meAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Seu avatar">
          </div>
          <p class="duel-avatar__name" id="meAvatarName">Você</p>
          <p class="duel-avatar__percent" id="meAvatarPercent">0%</p>
        </article>
        <article class="duel-avatar">
          <div class="duel-avatar__ring enemy" id="enemyPronRing">
            <img id="enemyAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do adversario">
          </div>
          <p class="duel-avatar__name" id="enemyAvatarName">Adversário</p>
          <p class="duel-avatar__percent enemy" id="enemyAvatarPercent">0%</p>
        </article>
      </div>
      <h2 class="card-word" id="cardEnglishWord">-</h2>
      <p class="card-subword" id="cardPortugueseWord" hidden>-</p>

      <div class="mic-trigger-wrap">
        <button class="mic-trigger" id="sendSpeakingBtn" type="button" aria-label="Ativar microfone">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-5a3.5 3.5 0 1 0-7 0v5A3.5 3.5 0 0 0 12 15m5.5-3.5a.9.9 0 1 1 1.8 0 7.3 7.3 0 0 1-6.4 7.24V21h3.1a.9.9 0 1 1 0 1.8H8a.9.9 0 0 1 0-1.8h3.1v-2.26a7.3 7.3 0 0 1-6.4-7.24.9.9 0 0 1 1.8 0 5.5 5.5 0 0 0 11 0" />
          </svg>
        </button>
      </div>
      <div class="final-result" id="finalResultBox">0% seu resultado final</div>
      <div class="winner-card" id="winnerCard">
        <img id="winnerAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do vencedor">
        <span id="winnerName">Vencedor Usuario</span>
      </div>
      <section class="winner-reveal" id="winnerReveal" hidden>
        <img class="winner-reveal__avatar" id="winnerRevealAvatar" src="/Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do vencedor">
        <p class="winner-reveal__text">WINNER</p>
      </section>
    </section>
  </main>

  <audio id="successAudio" src="gamesounds/success.mp3" preload="auto"></audio>
  <script src="js/speaking-page.js"></script>
</body>
</html>
