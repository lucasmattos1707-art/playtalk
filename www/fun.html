<body class="page-fun" data-lens-context="menus">
  <header class="site-header site-header--app" id="global-header">
    <div class="site-header__slot site-header__slot--left">
      <button type="button" class="site-header__avatar-button" aria-label="Perfil do jogador">
        <img id="global-header-avatar-image" class="site-header__avatar" src="Avatar/avatar-boy-male-svgrepo-com.svg" alt="Avatar do jogador">
        <span id="global-header-avatar-fallback" class="site-header__avatar-fallback">P</span>
      </button>
    </div>
    <div class="site-header__slot site-header__slot--center">
      <button id="global-header-menu" type="button" class="site-header__menu-button" aria-label="Menu principal">
        <span class="site-header__menu-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M4 7h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
        </span>
        <span id="global-header-menu-label" class="site-header__menu-label">PlayTalk</span>
      </button>
    </div>
    <div class="site-header__slot site-header__slot--right">
      <div class="site-header__coins" aria-label="Moedas">
        <span class="site-header__coins-icon" aria-hidden="true">?</span>
        <span id="global-header-coins">0</span>
      </div>
    </div>
  </header>

  <main id="fun-container" class="fun-layout radio-lounge-layout" data-page-transition>
    <section class="radio-lounge" aria-label="Zen Place">
      <h1 id="radioStationTitle" class="radio-lounge__title">Escolha sua música</h1>
      <p class="radio-lounge__subtitle">Deslise para escolher.</p>
      <div class="radio-lounge__selector">
        <div class="radio-lounge__media-row">
          <button id="radioPrevBtn" class="radio-lounge__arrow" type="button" aria-label="Radio anterior">
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path d="M14.7 5.3a1 1 0 0 1 0 1.4L9.41 12l5.29 5.3a1 1 0 1 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.42 0Z"/>
            </svg>
          </button>
          <div id="radioCover" class="radio-lounge__cover-wrap">
            <div class="radio-lounge__cover">
              <img id="radioStationImage" class="radio-lounge__image" src="images/modern.png" alt="Radio Modern">
            </div>
          </div>
          <button id="radioNextBtn" class="radio-lounge__arrow" type="button" aria-label="Proxima radio">
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path d="M9.3 18.7a1 1 0 0 1 0-1.4L14.59 12 9.3 6.7a1 1 0 1 1 1.42-1.4l6 6a1 1 0 0 1 0 1.4l-6 6a1 1 0 0 1-1.42 0Z"/>
            </svg>
          </button>
        </div>
        <p id="radioStationLabel" class="radio-lounge__label">Modern</p>
        <p id="radioStationDescription" class="radio-lounge__description">Beats limpos, vibe futurista. Sua radio pra trabalhar e voar.</p>
        <div class="radio-lounge__hint" aria-hidden="true">
          <span class="radio-lounge__hint-dot"></span>
          <span class="radio-lounge__hint-dot"></span>
          <span class="radio-lounge__hint-dot"></span>
          <span class="radio-lounge__hint-text">arraste a capa</span>
        </div>
        <div id="radioStationDots" class="radio-lounge__dots" role="radiogroup" aria-label="Radios disponiveis"></div>
      </div>
    </section>
  </main>

  <script src="js/fun-page.js" defer></script>
