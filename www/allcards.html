<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>AllCards | PlayTalk</title>
  <meta name="description" content="Flashcards do usuario no PlayTalk.">
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <style>
    :root {
      --footer-height: max(62px, 8vh);
      --footer-safe-bottom: env(safe-area-inset-bottom, 0px);
      --footer-total-height: calc(var(--footer-height) + var(--footer-safe-bottom));
      --native-top-offset: 0px;
      --page-max-width: 1240px;
      --card-width-mobile: 80vw;
      --card-gap: 24px;
      --panel-bg: rgba(255, 255, 255, 0.12);
      --panel-line: rgba(255, 255, 255, 0.2);
      --progress-track: rgba(255, 255, 255, 0.18);
      --progress-fill: linear-gradient(90deg, #5cff88 0%, #1eba5f 100%);
    }

    * {
      box-sizing: border-box;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: lightblue;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle, #3498db 10%, transparent 20%),
        radial-gradient(circle, transparent 10%, #3498db 20%);
      background-size: 30px 30px;
      animation: moveBackground 8s linear infinite;
    }

    @keyframes moveBackground {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(20%, 20%);
      }
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      -webkit-overflow-scrolling: touch;
    }

    body {
      font-family: "Open Sans", "Segoe UI", Arial, sans-serif;
      background: transparent;
      color: #ffffff;
      position: relative;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      touch-action: auto !important;
      overscroll-behavior-y: auto;
    }

    body.is-native-runtime {
      --native-top-offset: 50px;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .allcards-page {
      width: min(var(--page-max-width), calc(100vw - 24px));
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(26px + var(--native-top-offset)) 0 calc(var(--footer-total-height) + 32px);
      font-family: "Open Sans", "Arial Black", "Segoe UI", Arial, sans-serif;
      font-weight: 700;
      overflow: visible;
      touch-action: auto !important;
    }

    .allcards-page,
    .allcards-page * {
      color: #ffffff;
      font-family: "Open Sans", "Arial Black", "Segoe UI", Arial, sans-serif;
      font-weight: 700;
    }

    .allcards-head {
      display: grid;
      justify-items: center;
      gap: 6px;
      margin-bottom: 24px;
      text-align: center;
    }

    .banner-carousel {
      margin: 0 auto 18px;
      width: min(100%, 1000px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      overflow: clip;
      background: rgba(3, 12, 24, 0.45);
      box-shadow: 0 16px 34px rgba(8, 20, 36, 0.28);
      backdrop-filter: blur(8px);
    }

    .banner-carousel__viewport {
      overflow: hidden;
    }

    .banner-carousel__track {
      display: flex;
      width: 400%;
      animation: bannersSlide 14s infinite;
    }

    body.is-admin-banner .banner-carousel.is-admin-paused .banner-carousel__track {
      animation-play-state: paused;
      transform: translateX(calc(var(--admin-focus-index, 0) * -25%));
    }

    .banner-carousel__item {
      width: 25%;
      min-height: 220px;
      padding: 12px 10px 12px;
      display: grid;
      align-content: start;
      justify-items: stretch;
      gap: 10px;
      text-align: center;
      background: linear-gradient(140deg, rgba(12, 56, 112, 0.72), rgba(24, 88, 162, 0.68));
      user-select: none;
      position: relative;
    }

    .banner-carousel__media {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: linear-gradient(140deg, rgba(27, 88, 161, 0.92), rgba(36, 112, 199, 0.9));
    }

    .banner-carousel__item:nth-child(2) .banner-carousel__media {
      background: linear-gradient(140deg, rgba(16, 116, 138, 0.92), rgba(30, 148, 172, 0.9));
    }

    .banner-carousel__item:nth-child(3) .banner-carousel__media {
      background: linear-gradient(140deg, rgba(41, 96, 159, 0.92), rgba(75, 133, 198, 0.9));
    }

    .banner-carousel__item:nth-child(4) .banner-carousel__media {
      background: linear-gradient(140deg, rgba(13, 95, 173, 0.92), rgba(38, 127, 214, 0.9));
    }

    .banner-carousel__media-image {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(100% + var(--banner-size-adjust, 0px));
      height: calc(100% + var(--banner-size-adjust, 0px));
      object-fit: cover;
      transform: translate(
        calc(-50% + var(--banner-offset-x, 0px)),
        calc(-50% + var(--banner-offset-y, 0px))
      );
      transition: transform 120ms ease, width 120ms ease, height 120ms ease, opacity 220ms ease;
      opacity: 0;
      pointer-events: none;
    }

    .banner-carousel__item.has-image .banner-carousel__media-image {
      opacity: 1;
    }

    .banner-carousel__placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 8px;
      background: linear-gradient(120deg, rgba(6, 18, 34, 0.1), rgba(255, 255, 255, 0.06));
      text-shadow: 0 6px 20px rgba(0, 0, 0, 0.24);
    }

    .banner-carousel__item.has-image .banner-carousel__placeholder {
      opacity: 0;
      pointer-events: none;
    }

    .banner-carousel__title {
      margin: 0;
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 900;
      letter-spacing: 0.03em;
      color: #ffffff;
    }

    .banner-carousel__resolution {
      margin: 0;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.94);
    }

    .banner-carousel__status {
      margin: 0;
      min-height: 18px;
      padding: 4px 10px 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: rgba(226, 242, 255, 0.95);
    }

    body.is-admin-banner .banner-carousel__item {
      cursor: pointer;
    }

    body.is-admin-banner .banner-carousel__item:hover .banner-carousel__media {
      border-color: rgba(255, 255, 255, 0.7);
    }

    .banner-carousel__item.is-editing .banner-carousel__media {
      box-shadow: inset 0 0 0 2px rgba(125, 255, 175, 0.9);
    }

    .banner-carousel__item.is-busy::after {
      content: "Gerando...";
      position: absolute;
      inset: 12px 10px auto;
      min-height: 24px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ffffff;
      background: rgba(8, 24, 44, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.26);
    }

    @keyframes bannersSlide {
      0%, 20% {
        transform: translateX(0);
      }

      25%, 45% {
        transform: translateX(-25%);
      }

      50%, 70% {
        transform: translateX(-50%);
      }

      75%, 95% {
        transform: translateX(-75%);
      }

      100% {
        transform: translateX(0);
      }
    }

    .allcards-title {
      margin: 0;
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.03em;
    }

    .allcards-total {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
    }

    .allcards-grid {
      display: grid;
      grid-template-columns: 1fr;
      justify-items: center;
      gap: var(--card-gap);
      overflow: visible;
      touch-action: auto !important;
    }

    .allcards-empty {
      width: min(80vw, 520px);
      margin: 12px auto 0;
      padding: 22px 18px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      border: 1px solid var(--panel-line);
      background: var(--panel-bg);
      box-shadow: 0 18px 34px rgba(20, 47, 114, 0.16);
      backdrop-filter: blur(12px);
    }

    .allcards-card {
      width: var(--card-width-mobile);
      display: grid;
      gap: 10px;
      justify-items: stretch;
    }

    .allcards-card__frame {
      width: 100%;
      aspect-ratio: 1 / 1;
      padding: 12px;
      border-radius: 32px;
      border: 1px solid var(--panel-line);
      background: var(--panel-bg);
      box-shadow: 0 18px 34px rgba(20, 47, 114, 0.16);
      backdrop-filter: blur(12px);
    }

    .allcards-card__image {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 26px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .allcards-card__image img,
    .allcards-card__fallback {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .allcards-card__fallback {
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04)),
        rgba(255, 255, 255, 0.06);
    }

    .allcards-card__status {
      min-height: 18px;
      margin: 0;
      text-align: center;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0;
      font-family: "Open Sans", "Segoe UI", Arial, sans-serif;
    }

    .allcards-card__progress {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--progress-track);
    }

    .allcards-card__progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--progress-fill);
      transition: width 220ms ease;
    }

    .flashcards-footer-nav {
      position: fixed !important;
      left: 0;
      right: 0;
      bottom: 0;
      bottom: var(--footer-safe-bottom);
      height: var(--footer-height);
      background: #157efb;
      display: grid !important;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
      fill: currentColor;
    }

    .flashcards-footer-nav__item svg path {
      fill: currentColor;
    }

    @media (min-width: 900px) {
      .allcards-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: start;
      }

      .allcards-card {
        width: min(100%, 340px);
      }
    }

    @media (max-width: 640px) {
      .allcards-page {
        width: calc(100vw - 16px);
      }
    }
  </style>
</head>
<body data-lens-context="menus">
  <div class="container" aria-hidden="true"></div>
  <main class="allcards-page" aria-live="polite">
    <section class="banner-carousel" data-banner-carousel aria-label="Carrossel de banners">
      <div class="banner-carousel__viewport">
        <div class="banner-carousel__track">
          <article class="banner-carousel__item" data-banner-slot="1">
            <div class="banner-carousel__media">
              <img class="banner-carousel__media-image" alt="Banner 1" loading="lazy">
              <div class="banner-carousel__placeholder">
                <h2 class="banner-carousel__title">Banner 1</h2>
              </div>
            </div>
            <p class="banner-carousel__resolution">Resolucao ideal: 1600 x 900 px</p>
          </article>
          <article class="banner-carousel__item" data-banner-slot="2">
            <div class="banner-carousel__media">
              <img class="banner-carousel__media-image" alt="Banner 2" loading="lazy">
              <div class="banner-carousel__placeholder">
                <h2 class="banner-carousel__title">Banner 2</h2>
              </div>
            </div>
            <p class="banner-carousel__resolution">Resolucao ideal: 1600 x 900 px</p>
          </article>
          <article class="banner-carousel__item" data-banner-slot="3">
            <div class="banner-carousel__media">
              <img class="banner-carousel__media-image" alt="Banner 3" loading="lazy">
              <div class="banner-carousel__placeholder">
                <h2 class="banner-carousel__title">Banner 3</h2>
              </div>
            </div>
            <p class="banner-carousel__resolution">Resolucao ideal: 1600 x 900 px</p>
          </article>
          <article class="banner-carousel__item" data-banner-slot="4">
            <div class="banner-carousel__media">
              <img class="banner-carousel__media-image" alt="Banner 4" loading="lazy">
              <div class="banner-carousel__placeholder">
                <h2 class="banner-carousel__title">Banner 4</h2>
              </div>
            </div>
            <p class="banner-carousel__resolution">Resolucao ideal: 1600 x 900 px</p>
          </article>
        </div>
      </div>
      <p class="banner-carousel__status" aria-live="polite"></p>
    </section>

    <header class="allcards-head">
      <h1 class="allcards-title">AllCards</h1>
      <p class="allcards-total" id="allcards-total">0 FlashCards</p>
    </header>

    <section>
      <div id="allcards-grid" class="allcards-grid" role="list"></div>
      <p id="allcards-empty" class="allcards-empty" hidden></p>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.36a1 1 0 0 0 0-1.72l-10-6.36A1 1 0 0 0 8 5.14Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/allcards" aria-label="Flashcards">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.6 2.5c.33 2.34 2.12 3.25 3.48 4.86 1.34 1.59 2 3.22 2 5.35 0 4.3-2.96 8.79-7.58 8.79-3.36 0-5.58-2.4-5.58-5.34 0-2.21 1.12-3.85 2.97-5.78 1.38-1.44 2.94-3.14 4.71-7.88Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/users" aria-label="Usuarios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v2h2a2 2 0 0 1 2 2c0 3.32-2.47 6-5.57 6.4A5.99 5.99 0 0 1 13 17.83V20h4v2H7v-2h4v-2.17A5.99 5.99 0 0 1 8.57 13.4C5.47 13 3 10.32 3 7a2 2 0 0 1 2-2h2V3Zm-2 4c0 2.1 1.45 3.82 3.4 4.28A6 6 0 0 1 7 7V7H5Zm14 0h-2a6 6 0 0 1-1.4 4.28C17.55 10.82 19 9.1 19 7Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
    </a>
  </nav>

  <script src="js/android-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/banner-carousel-admin.js"></script>
  <script src="js/android-shell.js"></script>
  <script>
    if (window.PlaytalkNative && typeof window.PlaytalkNative.isNativeRuntime === 'function' && window.PlaytalkNative.isNativeRuntime()) {
      document.body.classList.add('is-native-runtime');
    }
  </script>
  <script src="js/allcards-page.js" defer></script>
</body>
</html>
