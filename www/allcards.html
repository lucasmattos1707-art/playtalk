<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>AllCards | Fluent LevelUp</title>
  <meta name="description" content="Flashcards do usuario no Fluent LevelUp.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="css/playtalk-shell.css">
  <style>
    @font-face {
      font-family: "Soopafre";
      src: url("soopafre.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("playtalk.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "QuicksandLight";
      src: url("/newfonts/Quicksand_Light.otf") format("opentype");
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #041321;
      --playtalk-global-bg-desktop: url('/api/r2-media/backgrounds/playtalk-global-desktop.webp');
      --playtalk-global-bg-mobile: url('/api/r2-media/backgrounds/playtalk-global-mobile.webp');
      --playtalk-global-bg-image: var(--playtalk-global-bg-desktop);
      --playtalk-global-bg-overlay: linear-gradient(to top, rgba(4, 18, 38, 1) 0%, rgba(4, 18, 38, 0.58) 38%, rgba(4, 18, 38, 0) 100%);
      --muted: #b8d4ea;
      --blue: #38c9ff;
      --footer-height: max(62px, 8vh);
      --footer-safe-bottom: env(safe-area-inset-bottom, 0px);
      --footer-total-height: calc(var(--footer-height) + var(--footer-safe-bottom));
    }

    @media (max-width: 800px) {
      :root {
        --playtalk-global-bg-image: var(--playtalk-global-bg-mobile);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Soopafre", Arial, sans-serif;
      color: #fff;
      background: transparent;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #041226 var(--playtalk-global-bg-image) center/cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--playtalk-global-bg-overlay);
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .shell {
      width: min(1240px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 calc(var(--footer-total-height) + 24px);
    }

    .catalog {
      display: grid;
      gap: 16px;
    }

    .content-switcher {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      width: min(520px, calc(100vw - 28px));
      margin: calc(5vh - 20px) auto 0;
    }

    .content-switcher__arrow,
    .content-switcher__current {
      border: 0;
      background: transparent;
      color: #fff;
      cursor: pointer;
      padding: 0;
    }

    .content-switcher__arrow {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      opacity: 0.92;
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .content-switcher__arrow:hover,
    .content-switcher__arrow:focus-visible {
      transform: scale(1.08);
      opacity: 1;
      outline: none;
    }

    .content-switcher__arrow svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .content-switcher__current {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 16px;
      border-radius: 999px;
      font-family: "Exo 2", "Open Sans", Arial, sans-serif;
      font-size: clamp(20px, 4.8vw, 28px);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.34);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .content-switcher__current:hover,
    .content-switcher__current:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .content-switcher__icon {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      opacity: 1;
    }

    .content-switcher__icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
      display: block;
    }

    .content-switcher__label {
      white-space: nowrap;
    }

    .content-view {
      margin-top: 5vh;
    }

    .content-view[hidden] {
      display: none !important;
    }

    #smartbooksView {
      position: relative;
      margin-top: 5vh;
      transform: none;
      min-height: calc(100vh - var(--footer-total-height) - 2vh);
      display: flex;
      flex-direction: column;
    }

    .panel.section {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 28px;
      backdrop-filter: none;
      padding: 18px 14px;
    }

    .section-head {
      display: flex;
      justify-content: center;
      margin-bottom: 0;
    }

    .section-head[hidden] {
      display: none !important;
    }

    .section-copy {
      width: 100%;
      text-align: center;
    }

    .smartbooks-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(720px, calc(100vw - 28px));
      margin: 0 auto 12px;
      min-height: auto;
      padding: 0 10px;
      z-index: 6;
    }

    .smartbooks-head .section-copy {
      min-width: 0;
    }

    .smartbooks-play-btn {
      width: clamp(46px, 9vw, 58px);
      height: clamp(46px, 9vw, 58px);
      position: fixed;
      top: 50vh;
      right: 18px;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: radial-gradient(circle at 34% 28%, #b9ffcf 0%, #43ff70 38%, #03c834 100%);
      box-shadow:
        0 0 0 1px rgba(181, 255, 199, 0.44),
        0 0 22px rgba(43, 255, 91, 0.62),
        0 12px 28px rgba(0, 70, 24, 0.35);
      cursor: pointer;
      text-decoration: none;
      transform: translateY(-50%);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      z-index: 12;
    }

    .smartbooks-play-btn:hover,
    .smartbooks-play-btn:focus-visible {
      transform: translateY(-50%) scale(1.04);
      filter: saturate(1.08);
      box-shadow:
        0 0 0 1px rgba(218, 255, 226, 0.7),
        0 0 30px rgba(43, 255, 91, 0.78),
        0 14px 30px rgba(0, 70, 24, 0.4);
      outline: none;
    }

    .smartbooks-play-btn svg {
      width: 74%;
      height: 74%;
      fill: currentColor;
      filter: drop-shadow(0 2px 4px rgba(0, 82, 24, 0.22));
    }

    .smartbooks-play-btn[hidden] {
      display: none !important;
    }

    #libraryTitle,
    #smartbooksTitle {
      width: 100%;
      margin: 0;
      text-align: center;
      font-size: clamp(28px, 4.6vw, 42px);
      font-family: "Exo 2", "Open Sans", Arial, sans-serif;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      color: #fff;
      text-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
      transition: transform 220ms ease, opacity 220ms ease, filter 220ms ease;
      transform: translateY(-4vh);
    }

    #libraryTitle.is-updating {
      transform: translateY(calc(-4vh - 2px)) scale(1.02);
      filter: drop-shadow(0 10px 20px rgba(255, 255, 255, 0.12));
    }

    #allSectionCopy {
      display: none;
      margin: 8px 0 0;
      font-family: "PlaytalkDisplay", "Soopafre", Arial, sans-serif;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1;
      letter-spacing: 0.03em;
      text-align: center;
      background: linear-gradient(180deg, #8ed8ff 0%, #3ea8ff 48%, #0b67ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 26px rgba(37, 125, 255, 0.16);
      transition: transform 220ms ease, opacity 220ms ease, filter 220ms ease;
    }

    #allSectionCopy.is-updating {
      transform: translateY(-2px) scale(1.04);
      filter: drop-shadow(0 10px 24px rgba(35, 137, 255, 0.26));
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-card {
      padding: 10px;
      border-radius: 24px;
      background: transparent;
      border: 1px solid transparent;
      min-height: 100%;
      position: relative;
      overflow: hidden;
      backdrop-filter: none;
    }

    .mini-card__image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: visible;
      background: transparent;
      border: 1px solid transparent;
      position: relative;
      isolation: isolate;
    }

    .mini-card__image > img:not(.mini-card__seal) {
      width: 100%;
      height: 100%;
      object-fit: cover;
      clip-path: inset(8% 8% 8% 8% round 14px);
      transition: filter 240ms ease, opacity 240ms ease;
    }

    .mini-card__fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 12px;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
      background:
        linear-gradient(135deg, rgba(83, 213, 255, 0.12), transparent),
        rgba(255, 255, 255, 0.02);
    }

    .mini-card__word {
      margin: 10px 0 0;
      font-weight: 700;
      font-size: 17px;
      text-align: center;
    }

    .mini-card__subword {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      min-height: 18px;
    }

    .mini-card__seal {
      position: absolute;
      right: -10px;
      bottom: -10px;
      top: auto;
      width: clamp(56px, 34%, 82px);
      height: clamp(56px, 34%, 82px);
      object-fit: contain;
      transform: none;
      filter: drop-shadow(0 10px 16px rgba(0, 0, 0, 0.28));
      pointer-events: none;
      z-index: 4;
    }

    .mini-card__progress {
      margin-top: 10px;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .mini-card__progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #5cff88, #1eba5f);
    }

    .mini-card__loader {
      position: absolute;
      inset: 50% auto auto 50%;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 3px solid rgba(92, 214, 255, 0.18);
      border-top-color: #55deff;
      border-right-color: #1da7ff;
      box-shadow: 0 0 14px rgba(66, 198, 255, 0.38);
      animation: flashcardsMiniLoaderSpin 0.9s linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    .mini-card__loader::after {
      content: "";
      position: absolute;
      inset: 5px;
      background: rgba(6, 18, 36, 0.82);
      border-radius: 50%;
    }

    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      border-radius: 24px;
      color: var(--muted);
      border: 1px dashed rgba(125, 203, 255, 0.16);
      background: rgba(255, 255, 255, 0.02);
    }

    .empty-library {
      grid-column: 1 / -1;
      min-height: min(52vh, 440px);
      display: grid;
      place-items: start center;
      align-content: start;
      justify-items: center;
      gap: 14px;
      padding: 7vh 12px 0;
      text-align: center;
    }

    .empty-library__icon {
      width: 60px;
      height: 60px;
      color: rgba(255, 255, 255, 0.5);
    }

    .empty-library__icon svg {
      width: 100%;
      height: 100%;
      display: block;
      fill: currentColor;
    }

    .empty-library__copy {
      margin: 0;
      color: rgba(255, 255, 255, 0.92);
      font-family: "Exo 2", "Open Sans", Arial, sans-serif;
      font-size: clamp(19px, 4.4vw, 25px);
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: 0;
      text-shadow: 0 7px 18px rgba(0, 0, 0, 0.28);
    }

    .empty-library__emphasis {
      display: inline-block;
      font-size: 1.25em;
    }

    .empty-library__start-btn {
      width: min(317px, 64.8vw);
      display: block;
      border-radius: 999px;
      transform: translateY(-8px) scale(0.9);
      transform-origin: center;
      transition: transform 180ms ease;
    }

    .empty-library__start-btn:hover,
    .empty-library__start-btn:focus-visible {
      transform: translateY(-10px) scale(0.93);
      outline: none;
    }

    .empty-library__start-btn img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: inherit;
    }

    .smartbooks-shelf {
      --books-shelf-height: max(420px, calc(100vh - var(--footer-total-height) - 112px));
      min-height: var(--books-shelf-height);
      max-height: var(--books-shelf-height);
      border-radius: 0;
      border: 1px solid transparent;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      flex: 1 1 auto;
      margin-bottom: calc(-1 * (24px + env(safe-area-inset-bottom, 0px)));
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .smartbooks-shelf::before {
      display: none;
    }

    .smartbooks-shelf::-webkit-scrollbar {
      display: none;
    }

    .smartbooks-grid {
      width: 100%;
      min-height: 100%;
      display: block;
      padding: 0;
      margin: 0;
    }

    .smartbooks-shelf-page {
      width: 100%;
      min-height: var(--books-shelf-height);
      display: grid;
      place-items: center;
      align-content: center;
      padding: 0;
      overflow: hidden;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .smartbooks-card {
      --books-card-book-width: min(calc(var(--books-shelf-height) * 9 / 16 * 0.62), 62vw);
      --books-card-book-height: calc(var(--books-card-book-width) * 16 / 9);
      --books-card-badge-size: 76.5px;
      --books-card-vertical-offset: -16vh;
      --books-card-badge-offset: -17vh;
      width: var(--books-card-book-width);
      max-width: 73%;
      max-height: 73%;
      aspect-ratio: 9 / 16;
      border: 0;
      border-radius: 16px;
      overflow: visible;
      position: relative;
      padding: 0;
      background: transparent;
      box-shadow: none;
    }

    .smartbooks-card__background {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--books-card-book-width);
      height: var(--books-card-book-height);
      max-width: 100%;
      border-radius: 14px;
      background: linear-gradient(155deg, #2a5bcf, #28a7d5);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      border: 1px solid transparent;
      box-shadow: 0 26px 44px rgba(0, 0, 0, 0.48), 18px 0 24px rgba(0, 0, 0, 0.18);
      transform: translate(-50%, calc(-50% + var(--books-card-vertical-offset))) perspective(1300px) rotateY(-16deg) rotateX(7deg);
      transform-origin: center center;
      transform-style: preserve-3d;
      overflow: visible;
    }

    .smartbooks-card__background::after {
      content: "";
      position: absolute;
      top: 2%;
      bottom: 2%;
      right: -10px;
      width: 12px;
      border-radius: 0 12px 12px 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(0, 0, 0, 0.3));
      filter: blur(0.2px);
      opacity: 0.8;
    }

    .smartbooks-card__overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--books-card-book-width);
      height: var(--books-card-book-height);
      transform: translate(-50%, calc(-50% + var(--books-card-vertical-offset)));
      border-radius: 14px;
      background: transparent;
      pointer-events: none;
    }

    .smartbooks-card__badge {
      position: absolute;
      right: calc(50% - (var(--books-card-book-width) / 2) - (var(--books-card-badge-size) * 0.16) - 6vw);
      bottom: calc(50% - (var(--books-card-book-height) / 2) - (var(--books-card-badge-size) * 0.12) - 7vh);
      width: var(--books-card-badge-size);
      height: var(--books-card-badge-size);
      display: grid;
      place-items: center;
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.42));
      transform: translateY(var(--books-card-badge-offset));
    }

    .smartbooks-card__badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .smartbooks-card__title {
      display: none;
    }

    #smartbooksTitle {
      position: relative;
      z-index: 2;
    }

    .smartbooks-status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: #9fdcff;
      font-size: clamp(18px, 3.5vw, 24px);
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, rgba(4, 16, 29, 0.76), rgba(4, 16, 29, 0.24));
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .smartbooks-status[hidden] {
      opacity: 0;
    }

    @keyframes flashcardsMiniLoaderSpin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .flashcards-footer-nav {
      position: fixed !important;
      left: 0;
      right: 0;
      bottom: var(--footer-safe-bottom);
      height: var(--footer-height);
      background: #157efb;
      display: grid !important;
      grid-template-columns: repeat(5, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
      fill: currentColor;
    }

    .flashcards-footer-nav__item svg path {
      fill: currentColor;
    }

    .flashcards-footer-nav__item img {
      width: 31px;
      height: 31px;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 6px 14px rgba(7, 17, 35, 0.28));
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    .flashcards-footer-nav__item.is-active img {
      transform: translateY(-1px) scale(1.05);
      filter:
        drop-shadow(0 0 10px rgba(105, 214, 255, 0.55))
        drop-shadow(0 8px 16px rgba(7, 17, 35, 0.28));
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel.section {
        padding: 14px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>

  <main class="shell">
    <section class="catalog" id="catalog">
      <div class="content-switcher" aria-label="Escolher biblioteca">
        <button class="content-switcher__arrow" id="contentSwitcherPrevBtn" type="button" aria-label="Mostrar biblioteca anterior">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5L8 12l6.5 6.5"/></svg>
        </button>
        <button
          class="content-switcher__current"
          id="contentSwitcherCurrentBtn"
          type="button"
          aria-live="polite"
          aria-label="Alternar biblioteca"
        >
          <span class="content-switcher__icon" id="contentSwitcherIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2.7l2.86 5.8 6.4.93-4.63 4.51 1.1 6.36L12 17.2l-5.73 3.1 1.1-6.36L2.74 9.43l6.4-.93z"/></svg>
          </span>
          <span class="content-switcher__label" id="contentSwitcherLabel">FlashCards</span>
        </button>
        <button class="content-switcher__arrow" id="contentSwitcherNextBtn" type="button" aria-label="Mostrar pr\u00f3xima biblioteca">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5L16 12l-6.5 6.5"/></svg>
        </button>
      </div>

      <div class="content-view" id="flashcardsView" role="tabpanel" aria-labelledby="contentSwitcherCurrentBtn">
        <div class="section-head" id="flashcardsSectionHead">
          <div class="section-copy">
            <h2 id="libraryTitle">0 FlashCards</h2>
            <p id="allSectionCopy">0 FlashCards</p>
          </div>
        </div>
        <div class="panel section">
          <div class="grid" id="allGrid"></div>
        </div>
      </div>

      <div class="content-view" id="smartbooksView" role="tabpanel" aria-labelledby="contentSwitcherCurrentBtn" hidden>
        <div class="section-head smartbooks-head" id="smartbooksSectionHead">
          <div class="section-copy">
            <h2 id="smartbooksTitle">SmartBooks</h2>
          </div>
          <a class="smartbooks-play-btn" id="smartbooksPlayBtn" href="/books" aria-label="Abrir Books">
