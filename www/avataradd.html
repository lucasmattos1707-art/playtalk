<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Crie seu avatar</title>
  <style>
    @font-face {
      font-family: "Pltay";
      src: url("/arquivos-codex/pltay.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --playtalk-global-bg-desktop: url('/api/r2-media/backgrounds/playtalk-global-desktop.webp');
      --playtalk-global-bg-mobile: url('/api/r2-media/backgrounds/playtalk-global-mobile.webp');
      --playtalk-global-bg-image: var(--playtalk-global-bg-desktop);
      --playtalk-global-bg-overlay: linear-gradient(to top, rgba(4, 18, 38, 1) 0%, rgba(4, 18, 38, 0.58) 38%, rgba(4, 18, 38, 0) 100%);
      --panel: rgba(9, 21, 38, 0.22);
      --line: rgba(140, 197, 255, 0.18);
      --text: #f4f8ff;
      --muted: #c7daef;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --green-1: #0d3b1f;
      --green-2: #072b16;
      --green-neon: #58f09d;
      --blue-1: #06183d;
      --blue-2: #03112e;
      --blue-neon: #00b8ff;
      --ring-track: rgba(0, 184, 255, 0.26);
    }

    @media (max-width: 800px) {
      :root {
        --playtalk-global-bg-image: var(--playtalk-global-bg-mobile);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      background: transparent;
      transition: background 700ms ease;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #041226 var(--playtalk-global-bg-image) center/cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      transition: opacity 700ms ease;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--playtalk-global-bg-overlay);
    }

    body.ai-generating {
      background: transparent;
      animation: none;
    }

    body.ai-generating .container {
      opacity: 1;
    }


    .identity-page {
      min-height: 100vh;
      padding: 20px 14px 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: hidden;
    }

    .identity-card {
      width: min(100%, 430px);
      min-height: calc(100vh - 40px);
      padding: 12px 18px 20px;
      border-radius: 0 0 30px 30px;
      border: 1px solid transparent;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
      transition: background 700ms ease, border-color 700ms ease;
    }

    body.ai-generating .identity-card {
      background: transparent;
      border-color: transparent;
    }

    body.ai-generating .photo-shell,
    body.ai-generating .photo-actions {
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    h1 {
      margin: 20px 0 12px;
      color: #fff;
      font-family: "Pltay", "Trebuchet MS", sans-serif;
      font-size: clamp(34px, 6.5vw, 48px);
      letter-spacing: 0.02em;
      line-height: 0.88;
      width: 100%;
      text-align: center;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 0 18px rgba(97, 212, 255, 0.32);
    }

    .photo-helper {
      margin: 18px auto 0;
      width: min(94%, 520px);
      font-family: "Pltay", "Trebuchet MS", sans-serif;
      font-size: clamp(19px, 3.6vw, 26px);
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #d7e9ff;
      text-align: center;
      text-wrap: balance;
      text-shadow: 0 0 12px rgba(97, 212, 255, 0.24);
    }

    .photo-helper span {
      display: block;
    }

    .photo-helper.is-hidden {
      display: none;
    }

    .photo-shell {
      display: grid;
      justify-items: center;
      gap: 0;
      width: 100%;
      margin-top: 0;
    }

    .photo-ring {
      --progress-angle: 0deg;
      width: min(78vw, 306px);
      height: min(78vw, 306px);
      margin-top: 0;
      padding: 8px;
      border-radius: 50%;
      background: conic-gradient(var(--blue-neon) 0deg, var(--blue-neon) var(--progress-angle), var(--ring-track) var(--progress-angle), var(--ring-track) 360deg);
      box-shadow:
        0 0 24px rgba(0, 184, 255, 0.9),
        0 0 54px rgba(0, 184, 255, 0.48);
      transition: background 180ms linear;
    }

    .photo-ring.is-hidden-progress {
      background: conic-gradient(var(--ring-track) 0deg, var(--ring-track) 360deg);
    }

    body.ai-generating .photo-ring {
      background: conic-gradient(var(--blue-neon) 0deg, var(--blue-neon) var(--progress-angle), var(--ring-track) var(--progress-angle), var(--ring-track) 360deg);
      box-shadow:
        0 0 28px rgba(0, 184, 255, 0.98),
        0 0 70px rgba(0, 184, 255, 0.56);
    }

    .photo-circle {
      position: relative;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 50%;
      background: transparent;
      overflow: hidden;
      cursor: pointer;
      display: grid;
      place-items: center;
      padding: 0;
      box-shadow: none;
    }

    .photo-circle img,
    .photo-circle svg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-circle svg {
      padding: 72px;
      color: rgba(255,255,255,0.88);
      opacity: 0.95;
    }

    .photo-circle::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      opacity: 0;
      pointer-events: none;
    }

    .photo-circle.is-flash::after {
      animation: photoFlash 700ms ease-out forwards;
    }

    .photo-circle.is-gold-flash::after {
      background: radial-gradient(circle, rgba(255, 236, 158, 0.92) 0%, rgba(255, 202, 40, 0.72) 44%, rgba(255, 179, 0, 0.18) 100%);
      animation: photoGoldFlash 950ms ease-out forwards;
    }

    .photo-preview,
    .photo-result {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-preview {
      opacity: 0;
      transition: opacity 420ms ease, filter 900ms ease;
      transform: scale(1.02);
    }

    .photo-circle.is-busy .photo-preview,
    .photo-circle.has-preview .photo-preview {
      opacity: 1;
    }

    .photo-result {
      opacity: 0;
      transition: opacity 650ms ease;
    }

    .photo-circle.has-result .photo-result {
      opacity: 1;
    }

    .photo-circle.has-result .photo-preview {
      opacity: 0;
    }

    .identity-status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-line;
    }

    #loadingCopy {
      width: min(100%, 420px);
      min-height: 3.2em;
      margin-top: 60px;
      font-family: "Pltay", "Trebuchet MS", sans-serif;
      font-size: clamp(24px, 5.8vw, 40px);
      line-height: 0.92;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 10px 24px rgba(15, 23, 42, 0.24);
      opacity: 1;
      transform: scale(1);
      transition: opacity 240ms ease, transform 320ms ease;
    }

    #loadingCopy.is-changing {
      opacity: 0;
      transform: scale(0.9);
    }

    #loadingCopy.is-entering {
      animation: loadingCopyReveal 850ms ease;
    }

    body.ai-generating #loadingCopy,
    body.ai-generating h1 {
      color: #ffffff;
      text-shadow: 0 10px 28px rgba(15, 23, 42, 0.3);
    }

    .identity-status.is-error {
      color: #ffd1d1;
      font-weight: 700;
    }

    .photo-actions {
      display: grid;
      gap: 12px;
      width: min(100%, 300px);
      margin-top: 16px;
    }

    .photo-actions.is-hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .identity-action {
      min-height: 56px;
      border: 2px solid transparent;
      border-radius: 18px;
      color: #fff;
      font-size: 18px;
      font-family: "Pltay", "Trebuchet MS", sans-serif;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      transition: transform 140ms ease, filter 140ms ease, opacity 140ms ease;
    }

    .identity-action:hover { filter: brightness(1.03); }
    .identity-action:active { transform: translateY(1px) scale(0.99); }
    .identity-action.is-success {
      background: linear-gradient(180deg, var(--green-1), var(--green-2));
      border-color: var(--green-neon);
      box-shadow:
        0 0 13px rgba(88, 240, 157, 0.58),
        inset 0 0 16px rgba(88, 240, 157, 0.15);
    }
    .identity-action.is-secondary {
      background: linear-gradient(180deg, var(--blue-1), var(--blue-2));
      border-color: var(--blue-neon);
      box-shadow:
        0 0 12px rgba(97, 212, 255, 0.58),
        inset 0 0 14px rgba(97, 212, 255, 0.14);
    }

    .identity-action[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    @keyframes photoFlash {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes photoGoldFlash {
      0% { opacity: 0; transform: scale(0.92); }
      20% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.08); }
    }

    @keyframes loadingCopyReveal {
      0% { opacity: 0; transform: scale(0.9); }
      35% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }


    @media (max-width: 520px) {
      .identity-page { padding-inline: 10px; padding-bottom: 18px; }
      .identity-card { padding-inline: 14px; padding-bottom: 18px; }
      .photo-ring {
        width: min(68vw, 270px);
        height: min(68vw, 270px);
      }
      #loadingCopy {
        min-height: 2.7em;
      }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>
  
  <main class="identity-page">
    <section class="identity-card" aria-label="Crie seu avatar">
      <h1>Crie seu avatar</h1>
      <div class="photo-shell">
        <div class="photo-ring is-hidden-progress" id="photoRing">
          <button class="photo-circle" id="photoCircle" type="button" aria-label="Enviar foto">
            <svg id="photoPlaceholder" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M9 4.5 7.5 6H5.75A2.75 2.75 0 0 0 3 8.75v8.5A2.75 2.75 0 0 0 5.75 20h12.5A2.75 2.75 0 0 0 21 17.25v-8.5A2.75 2.75 0 0 0 18.25 6H16.5L15 4.5H9Zm3 12.75a4.25 4.25 0 1 1 0-8.5 4.25 4.25 0 0 1 0 8.5Zm0-1.75a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/></svg>
          </button>
        </div>
        <p class="photo-helper" id="photoHelper"><span>SUA FOTO SER&Aacute;</span><span>TRANSFORMADA</span><span>EM UM DESENHO</span></p>
        <div class="photo-actions" id="photoActions">
          <button class="identity-action is-success" id="continueBtn" type="button" disabled>Avancar</button>
          <button class="identity-action is-secondary" id="regenerateBtn" type="button" disabled>Gerar nova</button>
        </div>
        <input id="photoInput" type="file" accept="image/*" hidden>
        <p class="identity-status" id="photoStatus"></p>
        <p class="identity-status" id="loadingCopy" aria-live="polite"></p>
      </div>
    </section>
  </main>
  <script src="js/android-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/android-shell.js"></script>
  <script>
    const ONBOARDING_MAX_PHOTO_GENERATIONS = 5;
    const ONBOARDING_LOADING_MESSAGES = [
      'Analisando a imagem enviada...',
      'Detectando estrutura facial e proporcoes...',
      'Identificando olhos e expressoes...',
      'Analisando cabelo, textura e volume...',
      'Extraindo cores principais e iluminacao...',
      'Interpretando expressao e vibe emocional...',
      'Simplificando tracos para estilo ilustrado...',
      'Aplicando caracteristicas animadas...',
      'Ajustando luz, profundidade e foco...',
      'Renderizando sua versao fiel...'
    ];
    const PROGRESS_DURATION_MS = 20000;
    const BLUR_SEQUENCE = [0.7, 0.6, 0.5, 0.4];
    const state = {
      user: null,
      photoGateBusy: false,
      photoSourceDataUrl: '',
      photoVersions: [],
      photoVersionIndex: 0,
      photoGenerationCount: 0,
      photoLoadingTimer: 0,
      photoLoadingMessageIndex: 0,
      photoFlashTimer: 0,
      photoProgressTimer: 0,
      photoProgressStartedAt: 0,
      blurTimer: 0,
      blurIndex: 0
    };
    const els = {
      photoRing: document.getElementById('photoRing'),
      photoCircle: document.getElementById('photoCircle'),
      photoPlaceholder: document.getElementById('photoPlaceholder'),
      photoHelper: document.getElementById('photoHelper'),
      photoInput: document.getElementById('photoInput'),
      photoStatus: document.getElementById('photoStatus'),
      loadingCopy: document.getElementById('loadingCopy'),
      photoActions: document.getElementById('photoActions'),
      continueBtn: document.getElementById('continueBtn'),
      regenerateBtn: document.getElementById('regenerateBtn')
    };

    function safeText(value) { return typeof value === 'string' ? value.trim() : ''; }
    function buildApiUrl(path) { return window.PlaytalkApi && typeof window.PlaytalkApi.url === 'function' ? window.PlaytalkApi.url(path) : path; }
    function buildAuthHeaders(extraHeaders) { return window.PlaytalkApi && typeof window.PlaytalkApi.authHeaders === 'function' ? window.PlaytalkApi.authHeaders(extraHeaders) : { ...(extraHeaders || {}) }; }
    function persistAuthToken(token) {
      if (window.PlaytalkApi && typeof window.PlaytalkApi.setAuthToken === 'function') {
        window.PlaytalkApi.setAuthToken(token || '');
        return;
      }
      try {
        if (token) {
          window.localStorage.setItem('playtalk_auth_token', token);
        } else {
          window.localStorage.removeItem('playtalk_auth_token');
        }
      } catch (_error) {}
    }
    function normalizeUser(user) {
      if (!user || typeof user !== 'object') return null;
      const id = Number(user.id) || 0;
      const username = safeText(user.username);
      if (!id || !username) return null;
      return {
        id,
        username,
        avatarVersions: Array.isArray(user.avatar_versions || user.avatarVersions)
          ? (user.avatar_versions || user.avatarVersions).map((entry) => ({
            image: safeText(entry?.image || entry?.url),
            source: safeText(entry?.source),
            createdAt: entry?.createdAt || entry?.created_at || null
          })).filter((entry) => entry.image)
          : [],
        avatarGenerationCount: Math.max(0, Number.parseInt(user.avatar_generation_count || user.avatarGenerationCount, 10) || 0)
      };
    }
    function getReturnPath() {
      const raw = safeText(new URLSearchParams(window.location.search).get('return'));
      return raw && raw.startsWith('/') ? raw : '/flashcards';
    }
    function navigateTo(target, options) {
      if (window.PlaytalkNative && typeof window.PlaytalkNative.navigate === 'function') {
        window.PlaytalkNative.navigate(target, options || {});
        return;
      }
      window.location.href = target;
    }

    function nextAfterAvatar() {
      return `/password?return=${encodeURIComponent(getReturnPath())}`;
    }
    function currentPhotoVersion() { return state.photoVersions[state.photoVersionIndex] || null; }
    function formatLoadingMessage(message) {
      const words = String(message || '').trim().split(/\s+/).filter(Boolean);
      if (words.length <= 2) return words.join(' ');
      let bestIndex = 1;
      let bestScore = Number.POSITIVE_INFINITY;
      for (let index = 1; index < words.length; index += 1) {
        const first = words.slice(0, index).join(' ');
        const second = words.slice(index).join(' ');
        const score = Math.abs(first.length - second.length);
        if (score < bestScore) {
          bestScore = score;
          bestIndex = index;
        }
      }
      return `${words.slice(0, bestIndex).join(' ')}\n${words.slice(bestIndex).join(' ')}`;
    }
    function setLoadingCopy(message, { animate = false } = {}) {
      if (!els.loadingCopy) return;
      const nextText = message || '';
      if (!animate || els.loadingCopy.textContent === nextText) {
        els.loadingCopy.textContent = nextText;
        els.loadingCopy.classList.remove('is-changing', 'is-entering');
        return;
      }
      els.loadingCopy.classList.add('is-changing');
      window.setTimeout(() => {
        els.loadingCopy.textContent = nextText;
        els.loadingCopy.classList.remove('is-changing');
        els.loadingCopy.classList.remove('is-entering');
        void els.loadingCopy.offsetWidth;
        els.loadingCopy.classList.add('is-entering');
      }, 180);
    }
    function setStatus(message, tone = '', target = els.photoStatus) {
      target.textContent = message || '';
      target.className = 'identity-status';
      if (tone) target.classList.add(`is-${tone}`);
    }
    function stopPhotoLoadingCopy() {
      if (!state.photoLoadingTimer) return;
      window.clearInterval(state.photoLoadingTimer);
      state.photoLoadingTimer = 0;
    }
    function startPhotoLoadingCopy() {
      stopPhotoLoadingCopy();
      state.photoLoadingMessageIndex = 0;
      setLoadingCopy(formatLoadingMessage(ONBOARDING_LOADING_MESSAGES[0]));
      state.photoLoadingTimer = window.setInterval(() => {
        state.photoLoadingMessageIndex += 1;
        setLoadingCopy(
          state.photoLoadingMessageIndex >= ONBOARDING_LOADING_MESSAGES.length
            ? 'Finalizando'
            : formatLoadingMessage(ONBOARDING_LOADING_MESSAGES[state.photoLoadingMessageIndex]),
          { animate: true }
        );
      }, 2000);
    }
    function stopProgressRing() {
      if (state.photoProgressTimer) {
        window.clearInterval(state.photoProgressTimer);
        state.photoProgressTimer = 0;
      }
      state.photoProgressStartedAt = 0;
      els.photoRing.style.setProperty('--progress-angle', '0deg');
      els.photoRing.classList.add('is-hidden-progress');
    }
    function startProgressRing() {
      stopProgressRing();
      state.photoProgressStartedAt = Date.now();
      els.photoRing.classList.remove('is-hidden-progress');
      const update = () => {
        const elapsed = Date.now() - state.photoProgressStartedAt;
        const ratio = Math.max(0, Math.min(1, elapsed / PROGRESS_DURATION_MS));
        els.photoRing.style.setProperty('--progress-angle', `${Math.round(ratio * 360)}deg`);
      };
      update();
      state.photoProgressTimer = window.setInterval(update, 100);
    }
    function stopBlurAnimation() {
      if (state.blurTimer) {
        window.clearInterval(state.blurTimer);
        state.blurTimer = 0;
      }
    }
    function applyPreviewBlur() {
      const preview = els.photoCircle.querySelector('.photo-preview');
      if (!preview) return;
      const blurLevel = BLUR_SEQUENCE[state.blurIndex % BLUR_SEQUENCE.length];
      preview.style.filter = `blur(${Math.round(blurLevel * 20)}px) saturate(1.04)`;
      state.blurIndex += 1;
    }
    function startBlurAnimation() {
      stopBlurAnimation();
      state.blurIndex = 0;
      applyPreviewBlur();
      state.blurTimer = window.setInterval(applyPreviewBlur, 1000);
    }
    function flashPhotoResult() {
      els.photoCircle.classList.remove('is-flash');
      void els.photoCircle.offsetWidth;
      els.photoCircle.classList.add('is-flash');
      if (state.photoFlashTimer) window.clearTimeout(state.photoFlashTimer);
      state.photoFlashTimer = window.setTimeout(() => {
        els.photoCircle.classList.remove('is-flash');
        state.photoFlashTimer = 0;
      }, 700);
    }
    function flashGoldenPhotoResult() {
      els.photoCircle.classList.remove('is-gold-flash');
      void els.photoCircle.offsetWidth;
      els.photoCircle.classList.add('is-gold-flash');
      if (state.photoFlashTimer) window.clearTimeout(state.photoFlashTimer);
      state.photoFlashTimer = window.setTimeout(() => {
        els.photoCircle.classList.remove('is-gold-flash');
        state.photoFlashTimer = 0;
      }, 950);
    }
    function renderPhoto() {
      const currentVersion = currentPhotoVersion();
      const hasGeneratedAvatar = Boolean(currentVersion?.image) || state.photoVersions.length > 0;
      document.body.classList.toggle('ai-generating', Boolean(state.photoGateBusy));
      const parts = [];
      if (state.photoSourceDataUrl) {
        parts.push(`<img class="photo-preview" src="${state.photoSourceDataUrl}" alt="Preview desfocado da foto enviada">`);
      }
      if (currentVersion?.image) {
        parts.push(`<img class="photo-result" src="${currentVersion.image}" alt="Foto ilustrada do usuario">`);
      }
      if (!state.photoSourceDataUrl && !currentVersion?.image) {
        parts.push('<svg id="photoPlaceholder" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M9 4.5 7.5 6H5.75A2.75 2.75 0 0 0 3 8.75v8.5A2.75 2.75 0 0 0 5.75 20h12.5A2.75 2.75 0 0 0 21 17.25v-8.5A2.75 2.75 0 0 0 18.25 6H16.5L15 4.5H9Zm3 12.75a4.25 4.25 0 1 1 0-8.5 4.25 4.25 0 0 1 0 8.5Zm0-1.75a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/></svg>');
      }
      els.photoCircle.innerHTML = parts.join('');
      els.photoCircle.classList.toggle('is-busy', state.photoGateBusy && Boolean(state.photoSourceDataUrl));
      els.photoCircle.classList.toggle('has-preview', Boolean(state.photoSourceDataUrl));
      els.photoCircle.classList.toggle('has-result', Boolean(currentVersion?.image) && !state.photoGateBusy);
      els.photoHelper?.classList.toggle('is-hidden', hasGeneratedAvatar);
      els.continueBtn.disabled = state.photoGateBusy || !currentVersion?.image;
      els.regenerateBtn.disabled = state.photoGateBusy || state.photoGenerationCount >= ONBOARDING_MAX_PHOTO_GENERATIONS || !state.photoSourceDataUrl;
      els.photoActions.classList.toggle('is-hidden', state.photoGateBusy);
      if (state.photoGateBusy) {
        setStatus('');
      } else if (!els.photoStatus.classList.contains('is-error')) {
        setStatus('');
      }
      if (state.photoGateBusy && state.photoSourceDataUrl) {
        startBlurAnimation();
      } else {
        stopBlurAnimation();
      }
    }
    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('Falha ao ler a imagem.'));
        reader.readAsDataURL(file);
      });
    }
    async function dataUrlToSquareWebpDataUrl(sourceDataUrl, size = 400) {
      return await new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const context = canvas.getContext('2d');
            if (!context) return reject(new Error('Nao foi possivel preparar a imagem.'));
            const sourceWidth = image.naturalWidth || image.width;
            const sourceHeight = image.naturalHeight || image.height;
            const sourceSide = Math.min(sourceWidth, sourceHeight);
            const sourceX = Math.max(0, Math.round((sourceWidth - sourceSide) / 2));
            const sourceY = Math.max(0, Math.round((sourceHeight - sourceSide) / 2));
            context.clearRect(0, 0, size, size);
            context.drawImage(image, sourceX, sourceY, sourceSide, sourceSide, 0, 0, size, size);
            resolve(canvas.toDataURL('image/webp', 0.86));
          } catch (error) {
            reject(error);
          }
        };
        image.onerror = () => reject(new Error('Nao foi possivel abrir a foto.'));
        image.src = sourceDataUrl;
      });
    }
    async function fileToSquareWebpDataUrl(file, size = 400) {
      const sourceDataUrl = await fileToDataUrl(file);
      return dataUrlToSquareWebpDataUrl(sourceDataUrl, size);
    }
    async function createCartoonAvatar(imageDataUrl) {
      const response = await fetch(buildApiUrl('/api/images/openai/avatar-cartoon'), {
        method: 'POST',
        credentials: 'include',
        headers: buildAuthHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ imageDataUrl })
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload?.success || !payload?.dataUrl) throw new Error(payload?.message || payload?.error || 'Nao foi possivel transformar a foto em desenho.');
      return String(payload.dataUrl);
    }
    async function getSessionUser() {
      if (window.PlaytalkApi && typeof window.PlaytalkApi.fetchSessionUser === 'function') {
        return normalizeUser(await window.PlaytalkApi.fetchSessionUser({
          attempts: 3,
          retryDelayMs: 450
        }));
      }
      const response = await fetch(buildApiUrl('/auth/session'), {
        cache: 'no-store',
        credentials: 'include',
        headers: buildAuthHeaders()
      });
      if (!response.ok) return null;
      const payload = await response.json().catch(() => ({}));
      return normalizeUser(payload?.user);
    }
    async function ensureProvisionedUser() {
      const sessionUser = await getSessionUser().catch(() => null);
      if (sessionUser?.id) {
        state.user = sessionUser;
        return sessionUser;
      }
      const response = await fetch(buildApiUrl('/auth/provision-temp'), {
        method: 'POST',
        credentials: 'include',
        headers: buildAuthHeaders({ 'Content-Type': 'application/json' })
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload?.success) throw new Error(payload?.message || 'Nao foi possivel preparar o usuario.');
      if (payload?.token) persistAuthToken(payload.token);
      const user = normalizeUser(payload.user);
      if (!user) throw new Error('Nao foi possivel preparar o perfil.');
      state.user = user;
      return user;
    }
    function sanitizedAvatarVersions() {
      return state.photoVersions.map((entry) => ({
        image: entry.image,
        source: '',
        createdAt: entry.createdAt || new Date().toISOString()
      }));
    }
    async function persistPhotoGateProfile() {
      const currentVersion = currentPhotoVersion();
      if (!currentVersion?.image) return;
      const response = await fetch(buildApiUrl('/auth/avatar'), {
        method: 'PATCH',
        credentials: 'include',
        headers: buildAuthHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({
          avatar: currentVersion.image,
          avatarVersions: sanitizedAvatarVersions(),
          avatarGenerationCount: state.photoGenerationCount,
          onboardingPhotoCompleted: true
        })
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload?.success) throw new Error(payload?.message || 'Nao foi possivel salvar a foto.');
      if (payload?.token) persistAuthToken(payload.token);
      const user = normalizeUser(payload.user);
      if (!user) throw new Error('Nao foi possivel atualizar o usuario.');
      state.user = user;
      return user;
    }
    async function generatePhotoVersionFromFile(file) {
      if (!file) return;
      if (state.photoGenerationCount >= ONBOARDING_MAX_PHOTO_GENERATIONS) {
        setStatus('Voce chegou ao limite de 5 geracoes.', 'error', els.loadingCopy);
        return;
      }
      state.photoGateBusy = true;
      setStatus('');
      renderPhoto();
      startProgressRing();
      try {
        const sourceDataUrl = await fileToSquareWebpDataUrl(file, 400);
        state.photoSourceDataUrl = sourceDataUrl;
        renderPhoto();
        startPhotoLoadingCopy();
        const cartoonDataUrl = await createCartoonAvatar(sourceDataUrl);
        const optimizedCartoonDataUrl = await dataUrlToSquareWebpDataUrl(cartoonDataUrl, 400);
        stopPhotoLoadingCopy();
        stopProgressRing();
        setLoadingCopy('');
        state.photoGenerationCount += 1;
        state.photoVersions.push({ image: optimizedCartoonDataUrl, source: '', createdAt: new Date().toISOString() });
        state.photoVersions = state.photoVersions.slice(-ONBOARDING_MAX_PHOTO_GENERATIONS);
        state.photoVersionIndex = state.photoVersions.length - 1;
        state.photoGateBusy = false;
        renderPhoto();
        flashPhotoResult();
        flashGoldenPhotoResult();
      } catch (error) {
        stopPhotoLoadingCopy();
        stopProgressRing();
        state.photoGateBusy = false;
        renderPhoto();
        setStatus(error?.message || 'Nao foi possivel gerar o desenho.', 'error', els.loadingCopy);
      }
    }
    async function regenerateFromLastSource() {
      const blob = await fetch(state.photoSourceDataUrl).then((response) => response.blob());
      const file = new File([blob], 'avatar.webp', { type: blob.type || 'image/webp' });
      await generatePhotoVersionFromFile(file);
    }
    async function init() {
      setStatus('');
      try {
        const user = await ensureProvisionedUser();
        state.photoVersions = Array.isArray(user?.avatarVersions) ? user.avatarVersions.slice(0, 5).map((entry) => ({
          image: entry.image,
          source: '',
          createdAt: entry.createdAt
        })) : [];
        state.photoVersionIndex = Math.max(0, state.photoVersions.length - 1);
        state.photoGenerationCount = Math.max(state.photoVersions.length, Number(user?.avatarGenerationCount || 0));
        renderPhoto();
      } catch (error) {
        if ((state.photoVersions || []).length) {
          setStatus('');
          renderPhoto();
          return;
        }
        const nextMessage = String(error?.message || '').trim();
        if (!nextMessage || /Nao foi possivel preparar o usuario/i.test(nextMessage)) {
          setStatus('');
          renderPhoto();
          return;
        }
        setStatus(nextMessage || 'Nao foi possivel abrir a tela de avatar.', 'error');
      }
    }
    els.photoCircle.addEventListener('click', () => {
      if (state.photoGateBusy) return;
      els.photoInput.click();
    });
    els.photoInput.addEventListener('change', (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      void generatePhotoVersionFromFile(file);
      event.target.value = '';
    });
    els.regenerateBtn.addEventListener('click', () => {
      if (state.photoGateBusy || state.photoGenerationCount >= ONBOARDING_MAX_PHOTO_GENERATIONS || !state.photoSourceDataUrl) return;
      void regenerateFromLastSource();
    });
    els.continueBtn.addEventListener('click', () => {
      void (async () => {
        setStatus('Salvando foto...');
        try {
          await persistPhotoGateProfile();
          navigateTo(nextAfterAvatar());
        } catch (error) {
          setStatus(error?.message || 'Nao foi possivel salvar a foto.', 'error');
        }
      })();
    });
    window.addEventListener('beforeunload', () => {
      stopPhotoLoadingCopy();
      stopProgressRing();
      stopBlurAnimation();
    });
    void init();
  </script>
</body>
</html>
