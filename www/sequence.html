<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence | Admin</title>
  <style>
    :root{
      --bg:#030d1f;
      --deck:#082c6a;
      --card:#3f9ae8;
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --warn:#ffb86b;
    }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 20% 0%,#103067 0%,var(--bg) 48%);color:var(--text);font-family:Arial,sans-serif}
    .page{max-width:1100px;margin:0 auto;padding:18px 14px 36px}
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
    .title{font-size:26px;font-weight:800}
    .hint{font-size:12px;color:var(--muted);line-height:1.4;margin-top:6px}
    .hint strong{color:#d8ebff}
    .tools{display:flex;align-items:center;gap:8px}
    .tools button{
      border:none;
      color:#fff;
      background:linear-gradient(135deg,#35b5ff,#1673d9);
      border-radius:10px;
      padding:9px 12px;
      font-weight:700;
      cursor:pointer;
    }
    .status{font-size:12px;color:var(--muted);margin-top:8px;text-align:right;max-width:420px}
    .status.is-error{color:#ff9a9a}
    .status.is-warn{color:var(--warn)}
    .stack{display:grid;gap:10px}
    .deck{background:linear-gradient(180deg,#0b357c,#07295f);border:1px solid rgba(143,188,255,.35);border-radius:16px;padding:10px}
    .deck.is-dimmed{opacity:.52}
    .deck.is-dimmed .deck-head{border-color:rgba(255,255,255,.08)}
    .deck-head{
      height:8vh;
      min-height:56px;
      width:90%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 14px;
      border-radius:12px;
      background:rgba(9,38,91,.92);
      cursor:pointer;
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
    }
    .deck-head.is-active{
      border-color:rgba(255,255,255,.82);
      box-shadow:0 0 0 1px rgba(255,255,255,.22);
    }
    .deck-head-left{display:flex;align-items:center;gap:10px;min-width:0}
    .deck-pick{
      width:16px;
      height:16px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.62);
      background:transparent;
      flex:0 0 auto;
      box-shadow:0 0 0 1px rgba(0,0,0,.2) inset;
    }
    .deck-pick.is-on{
      border-color:#fff;
      background:#fff;
      box-shadow:0 0 0 4px rgba(255,255,255,.26);
    }
    .deck-slot{
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:800;
      background:rgba(73,167,255,.26);
      border:1px solid rgba(167,219,255,.52);
      white-space:nowrap;
      letter-spacing:.04em;
    }
    .deck-title{
      font-size:18px;
      font-weight:800;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:270px;
    }
    .deck-meta{font-size:12px;color:var(--muted);white-space:nowrap}
    .deck-actions{display:flex;align-items:center;gap:6px}
    .deck-actions button{
      width:30px;
      height:30px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.08);
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }
    .deck-items{display:none;margin-top:10px;gap:8px}
    .deck.is-open .deck-items{display:grid}
    .card{
      height:8vh;
      min-height:52px;
      width:90%;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 12px;
      border-radius:12px;
      background:linear-gradient(180deg,#5caef3,#3f9ae8);
      color:#fff;
      cursor:pointer;
      border:none;
      transition:opacity .2s ease,transform .2s ease;
      text-align:left;
    }
    .card img{
      width:38px;
      height:38px;
      border-radius:999px;
      object-fit:cover;
      background:#0c3f7f;
      flex:0 0 auto;
    }
    .pick{
      width:16px;
      height:16px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.62);
      background:transparent;
      flex:0 0 auto;
      box-shadow:0 0 0 1px rgba(0,0,0,.2) inset;
    }
    .pick.is-on{
      border-color:#fff;
      background:#fff;
      box-shadow:0 0 0 4px rgba(255,255,255,.26);
    }
    .card .label{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card .id{margin-left:auto;font-size:12px;opacity:.5;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card.is-selected{outline:2px solid rgba(255,255,255,.95);transform:translateX(2px)}
    .card.is-dimmed{opacity:.42}
    .empty{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div>
        <div class="title">Sequence (Admin)</div>
        <div class="hint">
          <strong>Cartas:</strong> selecione com clique, <code>Shift</code> (intervalo) e <code>Ctrl/Cmd</code> (isoladas).<br>
          <strong>Decks:</strong> clique no cabecalho para selecionar o deck e limpar a selecao de cartas.<br>
          <strong>Teclas:</strong> <code>&uarr;</code>/<code>&darr;</code> move cartas selecionadas, ou deck ativo quando nao ha cartas selecionadas. <code>M</code> exporta para slot, <code>S</code> salva.
        </div>
      </div>
      <div>
        <div class="tools">
          <button id="saveBtn" type="button">Salvar (S)</button>
        </div>
        <div id="status" class="status">Carregando...</div>
      </div>
    </div>
    <div id="list" class="stack"></div>
  </div>
  <script>
    (() => {
      const state = {
        decks: [],
        openDecks: new Set(),
        selectedCardKeys: new Set(),
        selectionAnchor: null,
        selectedDeckSource: '',
        saving: false,
        lastExportSlot: 1
      };
      const $ = (id) => document.getElementById(id);

      const cardKey = (deckSource, cardId) => `${String(deckSource || '').trim()}::${String(cardId || '').trim()}`;
      const parseSlot = (value) => {
        const parsed = Number.parseInt(value, 10);
        return Number.isInteger(parsed) && parsed >= 1 ? parsed : null;
      };

      function setStatus(text, tone = '') {
        const el = $('status');
        el.textContent = String(text || '').trim();
        el.className = 'status';
        if (tone) el.classList.add(`is-${tone}`);
      }

      function sortDecksBySlot() {
        state.decks.sort((left, right) => {
          const leftSlot = Number(left?.deckLevel) || 0;
          const rightSlot = Number(right?.deckLevel) || 0;
          if (leftSlot !== rightSlot) return leftSlot - rightSlot;
          return String(left?.title || '').localeCompare(String(right?.title || ''), 'pt-BR', { sensitivity: 'base' });
        });
      }

      async function loadSequence() {
        setStatus('Carregando sequencia...');
        const response = await fetch('/api/admin/flashcards/sequence', { credentials: 'include', cache: 'no-store' });
        const payload = await response.json().catch(() => null);
        if (!response.ok || !payload?.success) throw new Error(payload?.message || 'Falha ao carregar sequencia admin.');

        const decks = Array.isArray(payload?.state?.decks) ? payload.state.decks : [];
        state.decks = decks
          .map((deck) => ({
            source: String(deck?.source || '').trim(),
            title: String(deck?.title || '').trim() || `Deck ${String(deck?.source || '').trim()}`,
            deckLevel: parseSlot(deck?.deckLevel),
            items: Array.isArray(deck?.items) ? deck.items.map((item) => ({
              id: String(item?.id || '').trim(),
              english: String(item?.english || '').trim(),
              portuguese: String(item?.portuguese || '').trim(),
              image: String(item?.image || '').trim()
            })).filter((item) => item.id) : []
          }))
          .filter((deck) => deck.source && Number.isInteger(deck.deckLevel));

        sortDecksBySlot();
        state.openDecks = new Set(state.decks.map((deck) => deck.source));
        state.selectedCardKeys.clear();
        state.selectionAnchor = null;
        state.selectedDeckSource = state.decks[0]?.source || '';
        setStatus(payload?.savedAt ? `Salvo em ${new Date(payload.savedAt).toLocaleString('pt-BR')}` : 'Ordem atual carregada.');
        render();
      }

      function toggleDeck(source) {
        if (state.openDecks.has(source)) state.openDecks.delete(source);
        else state.openDecks.add(source);
        render();
      }

      function setActiveDeck(source) {
        const safeSource = String(source || '').trim();
        if (!safeSource) return;
        state.selectedDeckSource = safeSource;
      }

      function findDeckBySource(source) {
        const safeSource = String(source || '').trim();
        return state.decks.find((deck) => deck.source === safeSource) || null;
      }

      function clearCardSelection() {
        state.selectedCardKeys.clear();
        state.selectionAnchor = null;
      }

      function selectDeck(deckSource) {
        const deck = findDeckBySource(deckSource);
        if (!deck) return;
        setActiveDeck(deck.source);
        clearCardSelection();
      }

      function selectCard(deckSource, cardId, event) {
        const deck = findDeckBySource(deckSource);
        const safeCardId = String(cardId || '').trim();
        if (!deck || !safeCardId) return;
        setActiveDeck(deckSource);
        const clickedKey = cardKey(deckSource, safeCardId);
        const isToggle = Boolean(event?.ctrlKey || event?.metaKey);
        const isRange = Boolean(event?.shiftKey);

        if (isRange && state.selectionAnchor && state.selectionAnchor.deckSource === deckSource) {
          const anchorIndex = deck.items.findIndex((item) => item.id === state.selectionAnchor.cardId);
          const targetIndex = deck.items.findIndex((item) => item.id === safeCardId);
          if (anchorIndex >= 0 && targetIndex >= 0) {
            const [minIndex, maxIndex] = anchorIndex <= targetIndex ? [anchorIndex, targetIndex] : [targetIndex, anchorIndex];
            if (!isToggle) state.selectedCardKeys.clear();
            for (let index = minIndex; index <= maxIndex; index += 1) {
              const rangeCardId = deck.items[index]?.id;
              if (rangeCardId) state.selectedCardKeys.add(cardKey(deckSource, rangeCardId));
            }
            render();
            return;
          }
        }

        if (isToggle) {
          if (state.selectedCardKeys.has(clickedKey)) state.selectedCardKeys.delete(clickedKey);
          else state.selectedCardKeys.add(clickedKey);
          state.selectionAnchor = { deckSource, cardId: safeCardId };
          render();
          return;
        }

        state.selectedCardKeys.clear();
        state.selectedCardKeys.add(clickedKey);
        state.selectionAnchor = { deckSource, cardId: safeCardId };
        render();
      }

      function moveDeckSlot(deckSource, direction) {
        sortDecksBySlot();
        const index = state.decks.findIndex((deck) => deck.source === deckSource);
        if (index < 0) return;
        const targetIndex = direction === 'up' ? index - 1 : index + 1;
        if (targetIndex < 0 || targetIndex >= state.decks.length) return;
        const deck = state.decks[index];
        const neighbor = state.decks[targetIndex];
        const currentSlot = Number(deck.deckLevel) || 0;
        deck.deckLevel = Number(neighbor.deckLevel) || currentSlot;
        neighbor.deckLevel = currentSlot;
        sortDecksBySlot();
        state.selectedDeckSource = deck.source;
        render();
      }

      function isSelectedCard(deckSource, itemId) {
        return state.selectedCardKeys.has(cardKey(deckSource, itemId));
      }

      function moveSelectedCardsStep(direction) {
        if (!state.selectedCardKeys.size) return;
        let movedAny = false;
        state.decks.forEach((deck) => {
          const items = Array.isArray(deck.items) ? deck.items : [];
          if (items.length <= 1) return;
          if (direction === 'up') {
            for (let index = 1; index < items.length; index += 1) {
              if (!isSelectedCard(deck.source, items[index]?.id)) continue;
              if (isSelectedCard(deck.source, items[index - 1]?.id)) continue;
              const temp = items[index - 1];
              items[index - 1] = items[index];
              items[index] = temp;
              movedAny = true;
            }
            return;
          }
          if (direction === 'down') {
            for (let index = items.length - 2; index >= 0; index -= 1) {
              if (!isSelectedCard(deck.source, items[index]?.id)) continue;
              if (isSelectedCard(deck.source, items[index + 1]?.id)) continue;
              const temp = items[index + 1];
              items[index + 1] = items[index];
              items[index] = temp;
              movedAny = true;
            }
          }
        });
        if (movedAny) render();
      }

      function moveSelectedCardsEdge(position) {
        if (!state.selectedCardKeys.size) return;
        let movedAny = false;
        state.decks.forEach((deck) => {
          const items = Array.isArray(deck.items) ? deck.items : [];
          if (!items.length) return;
          const selectedItems = [];
          const unselectedItems = [];
          items.forEach((item) => {
            if (isSelectedCard(deck.source, item?.id)) selectedItems.push(item);
            else unselectedItems.push(item);
          });
          if (!selectedItems.length || !unselectedItems.length) return;
          deck.items = position === 'top'
            ? selectedItems.concat(unselectedItems)
            : unselectedItems.concat(selectedItems);
          movedAny = true;
        });
        if (movedAny) render();
      }

      function moveSelectedCardsToSlot(slot) {
        const targetSlot = parseSlot(slot);
        if (!targetSlot) {
          setStatus('Slot invalido.', 'error');
          return;
        }
        if (!state.selectedCardKeys.size) {
          setStatus('Selecione pelo menos uma carta para mover.', 'warn');
          return;
        }
        const targetDeck = state.decks.find((deck) => Number(deck.deckLevel) === targetSlot) || null;
        if (!targetDeck) {
          setStatus(`Slot ${targetSlot} nao encontrado.`, 'error');
          return;
        }

        const movedCards = [];
        state.decks.forEach((deck) => {
          deck.items.forEach((item) => {
            if (isSelectedCard(deck.source, item?.id)) {
              movedCards.push({ item: { ...item }, fromSource: deck.source });
            }
          });
        });
        if (!movedCards.length) return;

        state.decks.forEach((deck) => {
          deck.items = deck.items.filter((item) => !isSelectedCard(deck.source, item?.id));
        });
        movedCards.forEach((entry) => targetDeck.items.push(entry.item));

        const nextSelection = new Set();
        movedCards.forEach((entry) => {
          nextSelection.add(cardKey(targetDeck.source, entry.item.id));
        });
        state.selectedCardKeys = nextSelection;
        state.selectionAnchor = movedCards.length
          ? { deckSource: targetDeck.source, cardId: movedCards[movedCards.length - 1].item.id }
          : null;
        state.openDecks.add(targetDeck.source);
        state.selectedDeckSource = targetDeck.source;
        state.lastExportSlot = targetSlot;
        setStatus(`${movedCards.length} carta(s) exportada(s) para o slot ${targetSlot}.`);
        render();
      }

      function promptExportSelectedToSlot() {
        if (!state.selectedCardKeys.size) {
          setStatus('Selecione cartas para exportar (Shift/Ctrl).', 'warn');
          return;
        }
        const defaultSlot = state.lastExportSlot || 1;
        const raw = window.prompt('Exportar selecao para qual slot?', String(defaultSlot));
        if (raw === null) return;
        moveSelectedCardsToSlot(raw);
      }

      async function saveSequence() {
        if (state.saving) return;
        state.saving = true;
        setStatus('Salvando sequencia...');
        try {
          const payload = {
            version: 1,
            decks: state.decks
              .filter((deck) => deck && deck.source && Number.isInteger(Number(deck.deckLevel)))
              .map((deck) => ({
                source: deck.source,
                title: deck.title,
                deckLevel: Number(deck.deckLevel),
                items: Array.isArray(deck.items)
                  ? deck.items.map((item) => ({
                    id: String(item?.id || '').trim(),
                    english: String(item?.english || '').trim(),
                    portuguese: String(item?.portuguese || '').trim(),
                    image: String(item?.image || '').trim()
                  })).filter((item) => item.id)
                  : []
              }))
          };
          const response = await fetch('/api/admin/flashcards/sequence', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ state: payload })
          });
          const json = await response.json().catch(() => null);
          if (!response.ok || !json?.success) throw new Error(json?.message || 'Falha ao salvar sequencia.');
          setStatus(`Salvo em ${new Date(json.savedAt || Date.now()).toLocaleString('pt-BR')}`);
        } catch (error) {
          setStatus(error?.message || 'Falha ao salvar sequencia.', 'error');
        } finally {
          state.saving = false;
        }
      }

      function render() {
        sortDecksBySlot();
        const host = $('list');
        host.innerHTML = '';
        if (!state.decks.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Nenhum deck com slot definido foi encontrado.';
          host.appendChild(empty);
          return;
        }

        const hasSelection = state.selectedCardKeys.size > 0;
        const deckSelectionMode = !hasSelection && Boolean(state.selectedDeckSource);
        state.decks.forEach((deck) => {
          const box = document.createElement('section');
          box.className = `deck${state.openDecks.has(deck.source) ? ' is-open' : ''}`;
          if (deckSelectionMode && state.selectedDeckSource !== deck.source) box.classList.add('is-dimmed');

          const head = document.createElement('div');
          head.className = `deck-head${state.selectedDeckSource === deck.source ? ' is-active' : ''}`;
          head.innerHTML = `
            <span class="deck-head-left">
              <span class="deck-pick${state.selectedDeckSource === deck.source && !hasSelection ? ' is-on' : ''}" aria-hidden="true"></span>
              <span class="deck-slot">SLOT ${Number(deck.deckLevel)}</span>
              <span class="deck-title">${deck.title || 'Deck'}</span>
            </span>
            <span class="deck-actions">
              <span class="deck-meta">${deck.items.length} cards</span>
              <button type="button" data-action="up" aria-label="Subir slot">&uarr;</button>
              <button type="button" data-action="down" aria-label="Descer slot">&darr;</button>
            </span>
          `;
          head.addEventListener('click', () => {
            selectDeck(deck.source);
            render();
          });
          head.querySelector('[data-action="up"]')?.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            moveDeckSlot(deck.source, 'up');
          });
          head.querySelector('[data-action="down"]')?.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            moveDeckSlot(deck.source, 'down');
          });
          box.appendChild(head);

          const itemsHost = document.createElement('div');
          itemsHost.className = 'deck-items';
          deck.items.forEach((item) => {
            const row = document.createElement('button');
            row.type = 'button';
            row.className = 'card';
            const selected = isSelectedCard(deck.source, item.id);
            if (selected) row.classList.add('is-selected');
            if (hasSelection && !selected) row.classList.add('is-dimmed');
            row.innerHTML = `
              <span class="pick${selected ? ' is-on' : ''}" aria-hidden="true"></span>
              <img src="${item.image || ''}" alt="">
              <span class="label">${item.english || item.portuguese || '(sem texto)'}</span>
              <span class="id">${item.id}</span>
            `;
            row.addEventListener('click', (event) => selectCard(deck.source, item.id, event));
            itemsHost.appendChild(row);
          });

          box.appendChild(itemsHost);
          host.appendChild(box);
        });
      }

      function handleKeyDown(event) {
        const key = String(event.key || '').toLowerCase();
        if (key === 's') {
          event.preventDefault();
          void saveSequence();
          return;
        }
        if (key === 'm') {
          event.preventDefault();
          promptExportSelectedToSlot();
          return;
        }
        if (key === 'escape') {
          clearCardSelection();
          render();
          return;
        }

        if (key === 'arrowup') {
          event.preventDefault();
          if (state.selectedCardKeys.size) moveSelectedCardsStep('up');
          else if (state.selectedDeckSource) moveDeckSlot(state.selectedDeckSource, 'up');
          return;
        }
        if (key === 'arrowdown') {
          event.preventDefault();
          if (state.selectedCardKeys.size) moveSelectedCardsStep('down');
          else if (state.selectedDeckSource) moveDeckSlot(state.selectedDeckSource, 'down');
          return;
        }
        if (key === 'home') {
          event.preventDefault();
          moveSelectedCardsEdge('top');
          return;
        }
        if (key === 'end') {
          event.preventDefault();
          moveSelectedCardsEdge('bottom');
        }
      }

      $('saveBtn').addEventListener('click', () => { void saveSequence(); });
      document.addEventListener('keydown', handleKeyDown);
      loadSequence().catch((error) => {
        setStatus(error?.message || 'Falha ao abrir sequence admin.', 'error');
        $('list').innerHTML = '<div class="empty">Somente admin pode usar o editor de sequence.</div>';
      });
    })();
  </script>
</body>
</html>
