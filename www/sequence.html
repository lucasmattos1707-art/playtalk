<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence</title>
  <style>
    :root{--bg:#030d1f;--text:#fff;--muted:rgba(255,255,255,.72)}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 20% 0%,#103067 0%,var(--bg) 48%);color:var(--text);font-family:Arial,sans-serif}
    .page{max-width:1100px;margin:0 auto;padding:18px 14px 36px}
    .top{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:12px}
    .status{font-size:12px;color:var(--muted)}
    .watch-btn{border:none;background:linear-gradient(135deg,#35b5ff,#1673d9);color:#fff;padding:10px 14px;border-radius:12px;font-weight:700;cursor:pointer}
    .stack{display:grid;gap:10px}
    .deck{background:linear-gradient(180deg,#0b357c,#07295f);border:1px solid rgba(143,188,255,.35);border-radius:16px;padding:10px}
    .deck-head{height:8vh;min-height:56px;width:90%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 14px;border-radius:12px;background:rgba(9,38,91,.92);cursor:pointer;border:none;color:#fff}
    .deck-head strong{font-size:18px;color:#fff;display:inline-flex;align-items:center;gap:8px}
    .deck-head strong img{width:18px;height:18px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(255,255,255,.35))}
    .deck-meta{font-size:12px;color:var(--muted)}
    .deck-items{display:none;margin-top:10px;gap:8px}
    .deck.is-open .deck-items{display:grid}
    .card{height:8vh;min-height:52px;width:90%;display:flex;align-items:center;gap:10px;padding:0 12px;border-radius:12px;background:linear-gradient(180deg,#5caef3,#3f9ae8);color:#fff;cursor:pointer;border:none}
    .card img.thumb{width:38px;height:38px;border-radius:999px;object-fit:cover;background:#0c3f7f;flex:0 0 auto}
    .card .label{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card .id{margin-left:auto;font-size:12px;opacity:0;pointer-events:none;user-select:none;width:1px;overflow:hidden}
    .card .voices{margin-left:auto;display:inline-flex;align-items:center;gap:8px}
    .card .voice-btn{width:30px;height:30px;border:none;background:transparent;padding:0;display:grid;place-items:center;border-radius:8px;cursor:pointer}
    .card .voice-btn img{width:22px;height:22px}
    .card .voice-btn:disabled{opacity:.35;cursor:not-allowed}

    .watch-screen{position:fixed;inset:0;z-index:9999;background:#000;color:#fff;display:none;grid-template-rows:auto 1fr;align-items:stretch}
    .watch-screen.is-visible{display:grid}
    .watch-top{display:flex;justify-content:flex-end;padding:12px}
    .watch-close{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:8px 12px;cursor:pointer}
    .watch-body{display:grid;grid-template-rows:56% 44%;padding:8px 18px 26px}
    .watch-image-wrap{display:grid;place-items:center}
    .watch-image{width:min(50vh,74vw);height:min(50vh,74vw);border-radius:999px;background:#102654 center/cover no-repeat;transition:opacity .35s ease,transform .35s ease;opacity:.96}
    .watch-text{display:grid;align-content:start;justify-items:center;gap:10px;padding-top:8px;text-align:center}
    .watch-pt,.watch-en{font-weight:800;line-height:1.2;transition:opacity .35s ease,transform .35s ease}
    .watch-pt{font-size:clamp(24px,5vw,42px);color:#fff}
    .watch-en{font-size:clamp(22px,4.4vw,38px);color:#65d8ff}
    .watch-fade{opacity:.25;transform:translateY(4px)}
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <button id="watchBtn" class="watch-btn" type="button">Assistir</button>
      <div id="status" class="status">Carregando...</div>
    </div>
    <div id="list" class="stack"></div>
  </div>

  <section id="watchScreen" class="watch-screen" aria-hidden="true">
    <div class="watch-top"><button id="watchCloseBtn" class="watch-close" type="button">Fechar</button></div>
    <div class="watch-body">
      <div class="watch-image-wrap"><div id="watchImage" class="watch-image"></div></div>
      <div class="watch-text">
        <div id="watchPt" class="watch-pt"></div>
        <div id="watchEn" class="watch-en"></div>
      </div>
    </div>
  </section>

  <script>
    (() => {
      const state = { decks: [], openDecks: new Set(), activeAudio: null, watch: { running: false, timer: 0, allCards: [] } };
      const $ = (id) => document.getElementById(id);
      const wait = (ms) => new Promise((resolve) => window.setTimeout(resolve, Math.max(0, ms)));

      function setStatus(text, isError = false) {
        const el = $('status');
        el.textContent = String(text || '').trim();
        el.style.color = isError ? '#ff9a9a' : 'rgba(255,255,255,.72)';
      }

      function stopActiveAudio() {
        if (!state.activeAudio) return;
        try { state.activeAudio.pause(); state.activeAudio.currentTime = 0; } catch (_error) {}
        state.activeAudio = null;
      }

      function playCardAudio(url, rate = 0.8) {
        const source = String(url || '').trim();
        if (!source) return Promise.resolve(false);
        stopActiveAudio();
        return new Promise((resolve) => {
          try {
            const audio = new Audio(source);
            state.activeAudio = audio;
            audio.playbackRate = Math.max(0.1, Math.min(2.5, Number(rate) || 0.8));
            audio.defaultPlaybackRate = audio.playbackRate;
            const done = () => {
              if (state.activeAudio === audio) state.activeAudio = null;
              resolve(true);
            };
            audio.addEventListener('ended', done, { once: true });
            audio.addEventListener('error', done, { once: true });
            audio.play().catch(done);
          } catch (_error) {
            resolve(false);
          }
        });
      }

      async function loadSequence() {
        setStatus('Carregando sequencia...');
        const response = await fetch('/api/flashcards/sequence', { credentials: 'include', cache: 'no-store' });
        const payload = await response.json().catch(() => null);
        if (!response.ok || !payload?.success) throw new Error(payload?.message || 'Falha ao carregar sequencia.');
        const decks = Array.isArray(payload?.state?.decks) ? payload.state.decks : [];
        state.decks = decks
          .filter((deck) => Number.isInteger(Number(deck?.deckLevel)))
          .sort((a, b) => Number(a.deckLevel) - Number(b.deckLevel))
          .map((deck) => ({
            source: String(deck.source || '').trim(),
            title: `Nível ${Number(deck.deckLevel)}`,
            deckLevel: Number(deck.deckLevel),
            items: Array.isArray(deck.items) ? deck.items.map((item) => ({
              id: String(item?.id || '').trim(),
              english: String(item?.english || '').trim(),
              portuguese: String(item?.portuguese || '').trim(),
              image: String(item?.image || '').trim(),
              audio: String(item?.audio || '').trim(),
              audio2: String(item?.audio2 || '').trim()
            })) : []
          }));
        state.watch.allCards = state.decks.flatMap((deck) => deck.items.filter((item) => item && (item.audio || item.audio2)));
        setStatus(payload?.savedAt ? `Atualizado em ${new Date(payload.savedAt).toLocaleString('pt-BR')}` : 'Pronto.');
        render();
      }

      function toggleDeck(source) {
        if (state.openDecks.has(source)) state.openDecks.delete(source);
        else state.openDecks.add(source);
        render();
      }

      function render() {
        const host = $('list');
        host.innerHTML = '';
        if (!state.decks.length) return;
        state.decks.forEach((deck) => {
          const box = document.createElement('section');
          box.className = `deck${state.openDecks.has(deck.source) ? ' is-open' : ''}`;
          const head = document.createElement('button');
          head.type = 'button';
          head.className = 'deck-head';
          head.innerHTML = `<strong><img src="/SVG/codex-icons/star.svg" alt="" aria-hidden="true">${deck.title}</strong><span class="deck-meta">${deck.items.length} flashcards</span>`;
          head.onclick = () => toggleDeck(deck.source);
          box.appendChild(head);

          const items = document.createElement('div');
          items.className = 'deck-items';
          deck.items.forEach((item) => {
            const row = document.createElement('button');
            row.type = 'button';
            row.className = 'card';
            const hasAmerican = Boolean(String(item.audio || '').trim());
            const hasBritish = Boolean(String(item.audio2 || '').trim());
            row.innerHTML = `
              <img class="thumb" src="${item.image || ''}" alt="">
              <span class="label">${item.english || '(sem inglês)'}</span>
              <span class="voices">
                <button class="voice-btn" type="button" data-voice="american" ${hasAmerican ? '' : 'disabled'} aria-label="Tocar audio americano"><img src="/SVG/codex-icons/american.svg" alt=""></button>
                <button class="voice-btn" type="button" data-voice="british" ${hasBritish ? '' : 'disabled'} aria-label="Tocar audio britanico"><img src="/SVG/codex-icons/british.svg" alt=""></button>
              </span>
              <span class="id">${item.id}</span>
            `;
            row.querySelector('[data-voice="american"]')?.addEventListener('click', (event) => {
              event.preventDefault(); event.stopPropagation(); void playCardAudio(item.audio, 0.8);
            });
            row.querySelector('[data-voice="british"]')?.addEventListener('click', (event) => {
              event.preventDefault(); event.stopPropagation(); void playCardAudio(item.audio2 || item.audio, 0.8);
            });
            items.appendChild(row);
          });
          box.appendChild(items);
          host.appendChild(box);
        });
      }

      function openWatchScreen() {
        $('watchScreen').classList.add('is-visible');
        $('watchScreen').setAttribute('aria-hidden', 'false');
      }

      function closeWatchScreen() {
        state.watch.running = false;
        if (state.watch.timer) window.clearTimeout(state.watch.timer);
        state.watch.timer = 0;
        stopActiveAudio();
        $('watchScreen').classList.remove('is-visible');
        $('watchScreen').setAttribute('aria-hidden', 'true');
      }

      function pickRandomCard() {
        const cards = Array.isArray(state.watch.allCards) ? state.watch.allCards : [];
        if (!cards.length) return null;
        const index = Math.floor(Math.random() * cards.length);
        return cards[index] || null;
      }

      async function renderAndPlayWatchCard(item) {
        const imageEl = $('watchImage');
        const ptEl = $('watchPt');
        const enEl = $('watchEn');
        imageEl.classList.add('watch-fade');
        ptEl.classList.add('watch-fade');
        enEl.classList.add('watch-fade');
        await wait(220);
        imageEl.style.backgroundImage = item?.image ? `url("${item.image}")` : 'none';
        ptEl.textContent = item?.portuguese || item?.english || '';
        enEl.textContent = item?.english || item?.portuguese || '';
        imageEl.classList.remove('watch-fade');
        ptEl.classList.remove('watch-fade');
        enEl.classList.remove('watch-fade');

        await playCardAudio(item?.audio, 0.8);
        await wait(2000);
        await playCardAudio(item?.audio2 || item?.audio, 0.8);
        await wait(2000);
      }

      async function runWatchLoop() {
        if (state.watch.running) return;
        if (!state.watch.allCards.length) {
          alert('Nenhum flashcard com áudio disponível.');
          return;
        }
        state.watch.running = true;
        openWatchScreen();
        while (state.watch.running) {
          const card = pickRandomCard();
          if (!card) break;
          await renderAndPlayWatchCard(card);
        }
      }

      $('watchBtn').addEventListener('click', () => { void runWatchLoop(); });
      $('watchCloseBtn').addEventListener('click', closeWatchScreen);

      loadSequence().catch((error) => setStatus(error.message || 'Falha ao abrir sequence.', true));
    })();
  </script>
</body>
</html>
