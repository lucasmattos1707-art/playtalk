<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Crie seu Plano de Fluencia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Exo 2', system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 140, 255, 0.28), transparent 32%),
        radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.24), transparent 34%),
        #050814;
      color: white;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .modal {
      width: min(980px, 100%);
      height: 100vh;
      height: 100dvh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .screen {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      display: none;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      backdrop-filter: none;
      padding: clamp(18px, 3vw, 34px);
      animation: enter .22s ease both;
      overflow: hidden;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: clamp(12px, 1.8vh, 18px);
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(16px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    h1 {
      margin: 0;
      font-size: clamp(31px, 5.5vw, 62px);
      line-height: 0.94;
      letter-spacing: -0.05em;
      text-wrap: balance;
      text-align: center;
    }

    .eyebrow {
      color: #72d6ff;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .question-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 0;
      align-items: center;
    }

    .stage-illustration {
      width: clamp(149px, 21.5vw, 226px);
      height: auto;
      margin: 10px auto 4px;
      opacity: 0.94;
      filter: drop-shadow(0 10px 26px rgba(0, 163, 255, 0.24));
    }

    .subtitle {
      display: none;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
      align-content: center;
      margin-top: 8px;
    }

    .options.three-text { grid-template-columns: 1fr; }

    .options--months .option {
      font-size: clamp(25px, 3vw, 36px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      padding: 12px 14px;
    }

    .options--application .option {
      white-space: nowrap;
      font-size: clamp(24px, 2.9vw, 34px);
      line-height: 1;
      padding: 18px 20px;
      letter-spacing: -0.04em;
    }

    .options--minutes .option {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      padding: 10px 12px;
    }

    .time-option__value {
      display: block;
      font-size: clamp(26px, 3.1vw, 36px);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .time-option__unit {
      display: block;
      font-size: clamp(11px, 1vw, 13px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .mix-stage {
      width: min(980px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      justify-content: center;
    }

    .mix-slider-shell {
      position: relative;
      display: flex;
      align-items: center;
      width: min(760px, 100%);
      min-height: 92px;
      padding: 10px 0;
    }

    .mix-slider-track {
      position: relative;
      width: 100%;
      height: 52px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(
        90deg,
        #0f78ff 0%,
        #0f78ff var(--smartbooks-stop, 50%),
        #ff7a00 var(--smartbooks-stop, 50%),
        #ff7a00 100%
      );
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 18px 42px rgba(9, 21, 49, 0.32);
    }

    .mix-slider-track::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), transparent 24%, transparent 76%, rgba(0,0,0,0.18));
      pointer-events: none;
    }

    .mix-slider-thumb {
      position: absolute;
      top: 50%;
      left: var(--mix-visual, 50%);
      width: 17px;
      height: 76px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.98);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(238,245,255,0.96));
      box-shadow: 0 0 0 4px rgba(255,255,255,0.12), 0 18px 32px rgba(2, 8, 22, 0.34);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .mix-slider-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 3;
    }

    .mix-slider-input::-webkit-slider-thumb {
      width: 17px;
      height: 76px;
      appearance: none;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .mix-slider-input::-moz-range-thumb {
      width: 17px;
      height: 76px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .mix-cards {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .mix-card {
      display: flex;
      align-items: center;
      gap: 14px;
      border-radius: 28px;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(14px);
      min-height: 104px;
      width: min(440px, 100%);
      flex: 0 1 auto;
    }

    .mix-card--flashcards {
      box-shadow: inset 0 0 0 1px rgba(255, 115, 0, 0.12), 0 0 26px rgba(255, 111, 0, 0.18);
    }

    .mix-card--smartbooks {
      box-shadow: inset 0 0 0 1px rgba(14, 120, 255, 0.12), 0 0 26px rgba(14, 120, 255, 0.2);
    }

    .mix-icon {
      width: 58px;
      height: 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .mix-icon svg {
      width: 30px;
      height: 30px;
      display: block;
    }

    .mix-icon--flashcards svg {
      filter: drop-shadow(0 0 18px rgba(255, 136, 31, 0.42));
    }

    .mix-icon--smartbooks svg {
      filter: drop-shadow(0 0 18px rgba(79, 124, 255, 0.42));
    }

    .mix-card__meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .mix-card__label {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      font-family: 'Exo 2', system-ui, sans-serif;
      font-size: clamp(24px, 3.6vw, 38px);
      font-weight: 900;
    }

    .mix-card--flashcards .mix-card__label {
      color: #ff7a00;
      text-shadow: 0 0 24px rgba(255, 122, 0, 0.22);
    }

    .mix-card--smartbooks .mix-card__label {
      color: #0f78ff;
      text-shadow: 0 0 24px rgba(15, 120, 255, 0.22);
    }

    .mix-card__value {
      font-size: clamp(26px, 4vw, 42px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #ffffff;
    }

    button.option {
      border: 1px solid rgba(148, 184, 255, 0.22);
      background: rgba(255,255,255,0.055);
      color: #dfeaff;
      padding: 14px 14px;
      border-radius: 20px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      font-size: clamp(15px, 1.8vw, 21px);
      line-height: 1.15;
      transition: .18s ease;
      min-height: clamp(58px, 8.5vh, 74px);
      text-align: center;
      text-wrap: balance;
    }

    button.option:hover { transform: translateY(-1px); background: rgba(255,255,255,0.09); }

    button.option.active {
      background: linear-gradient(135deg, #00a3ff, #3158ff);
      border-color: rgba(190, 230, 255, 0.95);
      color: white;
      box-shadow: 0 0 28px rgba(0, 163, 255, 0.38);
    }

    button.option.is-warning {
      background: linear-gradient(135deg, rgba(170, 255, 56, 0.34), rgba(118, 255, 35, 0.2));
      border-color: rgba(191, 255, 104, 0.95);
      color: #d8ff9f;
      box-shadow: 0 0 28px rgba(170, 255, 56, 0.34);
      animation: optionWarningPulse 1000ms ease;
    }

    @keyframes optionWarningPulse {
      0% { opacity: 1; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-1px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .result-screen {
      text-align: center;
    }

    .result-screen.active {
      justify-content: space-between;
      gap: 12px;
    }

    .result-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      margin: auto 0;
      text-align: center;
    }

    .result-title {
      margin: 0;
      color: #72d6ff;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: clamp(13px, 1.4vw, 18px);
      font-weight: 800;
    }

    .score {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
      margin: 0;
      font-size: clamp(72px, 13vw, 140px);
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: .92;
    }

    .score-unit {
      font-size: 0.9em;
      font-weight: 900;
      line-height: 1;
    }

    .badge {
      background: rgba(0, 163, 255, .12);
      border: 1px solid rgba(0, 163, 255, .34);
      color: #9be7ff;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 800;
      font-size: 15px;
      white-space: nowrap;
    }

    .big-bar-wrap {
      width: 100%;
      height: 16px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.1);
      margin: 0;
    }

    .big-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #18c8ff, #4f7cff, #9d7bff);
      border-radius: inherit;
      transition: width .35s ease;
      box-shadow: 0 0 28px rgba(24, 200, 255, .45);
    }

    .label {
      font-size: clamp(22px, 3.2vw, 36px);
      line-height: 1.08;
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .description {
      color: #c4d2ec;
      line-height: 1.38;
      font-size: clamp(14px, 1.55vw, 18px);
      margin-bottom: 0;
      max-width: 100%;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 0;
    }

    .stat {
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 12px;
      min-width: 0;
    }

    .stat strong {
      display: block;
      font-size: clamp(18px, 2vw, 22px);
      margin-bottom: 3px;
    }

    .stat span {
      color: #9fb1d2;
      font-size: 12px;
      line-height: 1.2;
      text-wrap: balance;
    }

    .boost {
      margin-top: 0;
      border-radius: 20px;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(0,163,255,.14), rgba(157,123,255,.12));
      border: 1px solid rgba(129, 203, 255, .22);
      color: #dff6ff;
      line-height: 1.32;
      font-size: clamp(14px, 1.5vw, 16px);
    }

    .live-result {
      margin-top: auto;
      text-align: center;
      width: 100%;
      pointer-events: none;
      padding-top: 10px;
    }

    .live-kicker {
      color: #72d6ff;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .live-title {
      color: white;
      font-size: clamp(20px, 2.72vw, 32px);
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.03em;
      text-shadow: 0 0 24px rgba(0, 163, 255, .22);
      max-width: 290px;
      margin: 0 auto;
      min-height: 2.04em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-wrap: balance;
      white-space: pre-line;
    }

    .live-title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      max-width: 520px;
      margin: 0 auto;
    }

    .live-medal {
      width: clamp(40px, 5vw, 58px);
      height: clamp(40px, 5vw, 58px);
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0, 163, 255, 0.28));
      flex: 0 0 auto;
    }

    .live-title.is-compact-30 {
      font-size: clamp(20px, 2.6vw, 30px);
      line-height: 1.08;
      max-width: 360px;
    }

    .live-result.is-final .live-title-wrap {
      flex-direction: column;
      gap: 10px;
    }

    .live-result.is-final .live-medal {
      width: clamp(92px, 14vw, 156px);
      height: clamp(92px, 14vw, 156px);
    }

    .live-title.is-warning {
      color: #b7ff57;
      text-shadow: 0 0 30px rgba(183, 255, 87, 0.34);
      animation: liveTitleWarning 500ms ease;
    }

    @keyframes liveTitleWarning {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .status {
      width: 100%;
      text-align: center;
      color: #c7daef;
      font-size: 14px;
      min-height: 20px;
      padding: 0 6px;
    }

    .status.is-error {
      color: #ffd1d1;
      font-weight: 800;
    }

    .status.is-success {
      color: #9ff5d0;
      font-weight: 800;
    }

    .bottom-bar {
      width: 100%;
      min-height: 78px;
      padding: 10px 14px 14px;
      background: rgba(3, 7, 20, .9);
      border: 1px solid rgba(130, 190, 255, 0.22);
      border-radius: 28px;
      backdrop-filter: blur(18px);
      margin-top: auto;
    }

    .bottom-inner {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .nav-btn {
      border: 0;
      color: white;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      border-radius: 18px;
      padding: 13px 18px;
      background: rgba(255,255,255,.1);
      min-width: 112px;
    }

    .nav-btn.primary { background: linear-gradient(135deg, #00a3ff, #3158ff); box-shadow: 0 0 24px rgba(0, 163, 255, .32); }
    .nav-btn:disabled { opacity: .35; cursor: not-allowed; }

    .progress-area { min-width: 0; }

    .progress-text {
      display: none;
    }

    .progress-track {
      height: 10px;
      width: 100%;
      background: rgba(255,255,255,.09);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 25%;
      background: linear-gradient(90deg, #18c8ff, #4f7cff, #9d7bff);
      border-radius: inherit;
      transition: width .25s ease;
    }

    @media (max-width: 780px) {
      .modal { padding: 10px; }
      .screen {
        padding: 16px;
      }
      .options { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .bottom-inner { grid-template-columns: 1fr 1fr; }
      .progress-area { grid-column: 1 / -1; order: -1; }
      .nav-btn { min-width: unset; }
      .mix-card { min-height: 92px; width: min(440px, 100%); }
    }

    @media (max-height: 760px) {
      .modal { padding: 8px 10px; }
      .screen {
        border-radius: 24px;
        padding: 16px;
      }
      .screen.active { gap: 10px; }
      h1 { font-size: clamp(27px, 4.7vw, 44px); }
      .stage-illustration { width: clamp(125px, 19vw, 182px); }
      .options { gap: 10px; }
      .mix-stage { gap: 16px; }
      .mix-slider-shell { min-height: 84px; }
      .mix-slider-track { height: 44px; }
      .mix-slider-thumb { height: 68px; }
      .options--months .option { font-size: clamp(21px, 2.6vw, 29px); }
      .options--application .option { font-size: clamp(20px, 2.5vw, 28px); }
      button.option {
        min-height: 50px;
        padding: 11px 12px;
        font-size: clamp(14px, 1.6vw, 18px);
      }
      .score { font-size: clamp(52px, 9vw, 92px); }
      .label { font-size: clamp(20px, 2.7vw, 30px); }
      .description { font-size: 13px; line-height: 1.3; }
      .stat { padding: 10px; }
      .boost { padding: 12px 14px; font-size: 13px; }
      .status { font-size: 13px; }
      .bottom-bar {
        min-height: 72px;
        padding: 8px 12px 12px;
      }
      .nav-btn {
        min-width: 104px;
        padding: 11px 16px;
      }
    }

    @media (max-height: 640px) {
      .modal { padding: 6px 8px; }
      .screen {
        padding: 14px;
      }
      .screen.active { gap: 8px; }
      .options {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .options.three-text { grid-template-columns: 1fr; }
      h1 {
        font-size: clamp(23px, 4.15vw, 33px);
        line-height: 0.98;
      }
      .stage-illustration {
        width: 110px;
        margin-top: 4px;
      }
      button.option {
        min-height: 46px;
        padding: 9px 10px;
        border-radius: 16px;
        font-size: 13px;
      }
      .options--months .option {
        font-size: clamp(18px, 3.2vw, 24px);
        padding: 10px 12px;
      }
      .options--application .option {
        font-size: clamp(17px, 2.9vw, 23px);
        padding: 12px 14px;
      }
      .mix-card { min-height: 86px; width: min(440px, 100%); }
      .result-top { gap: 10px; }
      .badge { padding: 9px 12px; font-size: 13px; }
      .big-bar-wrap { height: 12px; }
      .stats { gap: 8px; }
      .stat strong { font-size: 15px; margin-bottom: 2px; }
      .stat span { font-size: 10px; }
      .boost { line-height: 1.22; }
      .status { min-height: 18px; }
      .bottom-bar {
        min-height: 68px;
        padding: 8px 10px 10px;
      }
      .progress-text { margin-bottom: 4px; }
      .progress-track { height: 8px; }
    }

    @media (max-width: 560px) {
      h1 { font-size: clamp(26px, 8.8vw, 38px); }
      .eyebrow { font-size: 11px; }
      button.option { font-size: 14px; min-height: 54px; }
      .score { font-size: clamp(52px, 18vw, 84px); }
      .label { font-size: clamp(20px, 6vw, 28px); }
      .description { font-size: 13px; }
      .boost { font-size: 13px; padding: 12px 14px; }
      .stat strong { font-size: 16px; }
      .stat span { font-size: 11px; }
      .time-option__value { font-size: clamp(23px, 7vw, 30px); }
      .time-option__unit { font-size: 10px; }
      .options--months .option {
        font-size: clamp(16px, 5vw, 22px);
      }
      .options--application .option {
        font-size: clamp(15px, 4.4vw, 21px);
        padding: 12px 12px;
      }
    }

    @media (max-width: 560px) and (max-height: 640px) {
      h1 { font-size: clamp(22px, 6.6vw, 31px); }
      button.option {
        font-size: 13px;
        min-height: 46px;
        padding: 9px 10px;
      }
      .options { gap: 8px; }
      .score { font-size: clamp(46px, 16vw, 72px); }
      .label { font-size: clamp(18px, 5.4vw, 24px); }
    }
  </style>
</head>
<body>
  <main class="modal">
    <section class="screen active" data-step="0">
      <div class="question-block">
        <h1>Quanto você quer jogar por dia?</h1>
      </div>
      <div class="options options--minutes" data-group="minutes">
        <button class="option" data-value="15"><span class="time-option__value">15</span><span class="time-option__unit">min</span></button>
        <button class="option" data-value="30"><span class="time-option__value">30</span><span class="time-option__unit">min</span></button>
        <button class="option" data-value="45"><span class="time-option__value">45</span><span class="time-option__unit">min</span></button>
        <button class="option" data-value="60"><span class="time-option__value">1</span><span class="time-option__unit">hora</span></button>
        <button class="option" data-value="90"><span class="time-option__value">1h30</span><span class="time-option__unit">horas</span></button>
        <button class="option" data-value="120"><span class="time-option__value">2</span><span class="time-option__unit">horas</span></button>
      </div>
    </section>

    <section class="screen" data-step="1">
      <div class="question-block">
        <h1>Você vai treinar por quanto tempo?</h1>
      </div>
      <div class="options options--months" data-group="months">
        <button class="option" data-value="3">3 meses</button>
        <button class="option" data-value="6">6 meses</button>
        <button class="option" data-value="9">9 meses</button>
        <button class="option" data-value="12">12 meses</button>
        <button class="option" data-value="18">18 meses</button>
        <button class="option" data-value="24">24 meses</button>
      </div>
    </section>

    <section class="screen" data-step="2">
      <div class="question-block">
        <h1>Como você pretende usar o inglês?</h1>
      </div>
      <div class="options three-text options--application" data-group="application">
        <button class="option" data-value="0">Somente jogar sem prática real</button>
        <button class="option" data-value="1">Aplicar as dicas do jogo na vida real</button>
        <button class="option" data-value="2">Seguir o plano de fluência completo</button>
      </div>
    </section>

    <section class="screen" data-step="3">
      <div class="question-block">
        <h1>Quanto do seu treino vai para cada lado?</h1>
      </div>
      <div class="mix-stage">
        <div class="mix-slider-shell" id="mixSliderShell">
          <div class="mix-slider-track" id="mixSliderTrack">
            <div class="mix-slider-thumb" id="mixSliderThumb" aria-hidden="true"></div>
          </div>
          <input class="mix-slider-input" id="mixSlider" type="range" min="0" max="100" step="1" value="50" aria-label="Escolha o percentual de FlashCards e SmartBooks">
        </div>
        <div class="mix-cards">
          <div class="mix-card mix-card--flashcards">
            <div class="mix-icon mix-icon--flashcards" aria-hidden="true">
              <svg viewBox="0 0 32 32" fill="none">
                <path d="M18.4 2L7.8 17.1H15L12.9 30L24.2 13.8H16.8L18.4 2Z" fill="url(#flashGradient)"/>
                <defs>
                  <linearGradient id="flashGradient" x1="7.8" y1="2" x2="24.2" y2="30" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#FFD36A"/>
                    <stop offset="0.42" stop-color="#FF9A3D"/>
                    <stop offset="1" stop-color="#FF6F1F"/>
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <div class="mix-card__meta">
              <span class="mix-card__label">FlashCards</span>
              <span class="mix-card__value" id="flashcardsPercent">50%</span>
            </div>
          </div>
          <div class="mix-card mix-card--smartbooks">
            <div class="mix-icon mix-icon--smartbooks" aria-hidden="true">
              <svg viewBox="0 0 32 32" fill="none">
                <path d="M7 6.4C7 4.97 8.18 3.8 9.62 3.8H24.6V25.2H10.15C8.8 25.2 7.7 26.29 7.7 27.64C7.7 28.16 7.82 28.63 8.05 29H22.8" stroke="url(#bookStroke)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10.4 8.9H20.8" stroke="url(#bookStroke)" stroke-width="2.4" stroke-linecap="round"/>
                <path d="M10.4 13.4H18.7" stroke="url(#bookStroke)" stroke-width="2.4" stroke-linecap="round"/>
                <defs>
                  <linearGradient id="bookStroke" x1="7" y1="3.8" x2="24.6" y2="29" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#8FE6FF"/>
                    <stop offset="0.52" stop-color="#4F7CFF"/>
                    <stop offset="1" stop-color="#79A7FF"/>
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <div class="mix-card__meta">
              <span class="mix-card__label">SmartBooks</span>
              <span class="mix-card__value" id="smartbooksPercent">50%</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen result-screen" data-step="4">
      <div class="result-top">
        <h2 class="result-title">Seu resultado estimado</h2>
        <div class="score"><span id="score">0</span><span class="score-unit">%</span></div>
      </div>
    </section>

    <div class="live-result" id="liveResult" hidden>
      <div class="live-kicker">COM ESSE PLANO VOCÊ ALCANÇA</div>
      <div class="live-title-wrap">
        <img class="live-medal" id="liveMedal" src="/medalhas/white.png" alt="Medalha de fluencia">
        <div class="live-title" id="liveTitle">Nenhum contato com o idioma ate agora.</div>
      </div>
    </div>
    <div class="status" id="status" aria-live="polite"></div>

    <footer class="bottom-bar">
      <div class="bottom-inner">
        <button class="nav-btn" id="backBtn" type="button">Voltar</button>
        <div class="progress-area">
          <div class="progress-text" aria-hidden="true">
            <span id="stepText">Etapa 1 de 4</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="stepFill"></div></div>
        </div>
        <button class="nav-btn primary" id="nextBtn" type="button">Continuar</button>
      </div>
    </footer>
  </main>

  <script src="js/android-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/android-shell.js"></script>
  <script>
    const DEFAULT_RETURN_PATH = '/play';
    const CLICK_AUDIO_PATH = '/audio/click.mp3';
    const totalChoiceSteps = 4;
    let step = 0;
    let busy = false;

    const state = {
      minutes: 45,
      months: 12,
      application: 1,
      flashcardsPercentage: 50,
      smartbooksPercentage: 50,
      mixVisual: 50,
      selectedGroups: {
        minutes: true,
        months: true,
        application: true
      },
      liveTitleDefault: '',
      warningTimer: 0,
      clickSound: null,
      nextOnboardingRoute: ''
    };

    const labels = [
      { min: 0, medal: 'white.png', title: 'Nenhum contato com\no idioma ate agora.' },
      { min: 10, medal: 'vidro.png', title: 'Reconhece palavras\ne estruturas simples.' },
      { min: 20, medal: 'metal.png', title: 'Comunica ideias com\nfrases bem basicas.' },
      { min: 30, medal: 'bronze.png', title: 'Entende o basico\ne responde frases curtas.' },
      { min: 40, medal: 'prata.png', title: 'Se comunica em situacoes\nsimples do dia.' },
      { min: 50, medal: 'rubi.png', title: 'Participa de conversas\nsimples com confianca.' },
      { min: 60, medal: 'quartz.png', title: 'Acompanha conversas com\nalgumas limitacoes.' },
      { min: 70, medal: 'emerald.png', title: 'Pensa no idioma com\npouca traducao mental.' },
      { min: 80, medal: 'platina.png', title: 'Expressa ideias com clareza\nem varios contextos.' },
      { min: 90, medal: 'ouro.png', title: 'Domina comunicacao com\nboa fluidez e precisao.' },
      { min: 100, medal: 'diamante.png', title: 'Usa o idioma com fluidez\ntotal em qualquer contexto.' }
    ];

    const els = {
      backBtn: document.getElementById('backBtn'),
      nextBtn: document.getElementById('nextBtn'),
      stepText: document.getElementById('stepText'),
      stepFill: document.getElementById('stepFill'),
      liveResult: document.getElementById('liveResult'),
      liveTitle: document.getElementById('liveTitle'),
      liveMedal: document.getElementById('liveMedal'),
      score: document.getElementById('score'),
      status: document.getElementById('status'),
      mixSliderTrack: document.getElementById('mixSliderTrack'),
      mixSlider: document.getElementById('mixSlider'),
      flashcardsPercent: document.getElementById('flashcardsPercent'),
      smartbooksPercent: document.getElementById('smartbooksPercent')
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function safeText(value) {
      return typeof value === 'string' ? value.trim() : '';
    }

    function buildApiUrl(path) {
      return window.PlaytalkApi && typeof window.PlaytalkApi.url === 'function'
        ? window.PlaytalkApi.url(path)
        : path;
    }

    function buildAuthHeaders(extraHeaders) {
      return window.PlaytalkApi && typeof window.PlaytalkApi.authHeaders === 'function'
        ? window.PlaytalkApi.authHeaders(extraHeaders)
        : { ...(extraHeaders || {}) };
    }

    function getReturnPath() {
      const raw = safeText(new URLSearchParams(window.location.search || '').get('return'));
      return raw && raw.startsWith('/') && !raw.startsWith('//') ? raw : DEFAULT_RETURN_PATH;
    }

    function navigateTo(target, options = {}) {
      if (window.PlaytalkNative && typeof window.PlaytalkNative.navigate === 'function') {
        window.PlaytalkNative.navigate(target, options);
        return;
      }
      if (options.replace) {
        window.location.replace(target);
        return;
      }
      window.location.href = target;
    }

    function ensureClickSound() {
      if (state.clickSound) return state.clickSound;
      const audio = new Audio(CLICK_AUDIO_PATH);
      audio.preload = 'auto';
      state.clickSound = audio;
      return audio;
    }

    function playClickSound() {
      try {
        const audio = ensureClickSound();
        audio.currentTime = 0;
        const playback = audio.play();
        if (playback && typeof playback.catch === 'function') {
          playback.catch(() => {});
        }
      } catch (_error) {
        // Ignora falha silenciosamente para nao atrapalhar a interacao.
      }
    }

    function setStatus(message, tone = '') {
      els.status.textContent = message || '';
      els.status.className = 'status';
      if (tone) {
        els.status.classList.add(`is-${tone}`);
      }
    }

    function normalizeUser(user) {
      if (!user || typeof user !== 'object') return null;
      return {
        nextOnboardingRoute: safeText(user.next_onboarding_route || user.nextOnboardingRoute)
      };
    }

    function snapMixPercentage(value) {
      return clamp(Math.round(clamp(Number(value) || 0, 0, 100) / 5) * 5, 0, 100);
    }

    function syncMixVisual(value) {
      const visual = clamp(Number(value) || 0, 0, 100);
      state.mixVisual = visual;
      if (els.mixSliderTrack) {
        els.mixSliderTrack.style.setProperty('--mix-visual', `${visual}%`);
        els.mixSliderTrack.style.setProperty('--smartbooks-stop', `${smartbooksVisualStop(visual)}%`);
      }
    }

    function smartbooksVisualStop(visual) {
      return clamp(Number(visual) || 0, 0, 100);
    }

    function updateMixSelection(rawValue, options = {}) {
      const visual = clamp(Number(rawValue) || 0, 0, 100);
      const flashcardsPercentage = snapMixPercentage(100 - visual);
      const smartbooksPercentage = 100 - flashcardsPercentage;
      state.flashcardsPercentage = flashcardsPercentage;
      state.smartbooksPercentage = smartbooksPercentage;
      syncMixVisual(visual);

      if (!options.skipSliderSync && els.mixSlider) {
        els.mixSlider.value = String(Math.round(visual));
      }

      const flashcardsLabel = `${flashcardsPercentage}%`;
      const smartbooksLabel = `${smartbooksPercentage}%`;
      if (els.flashcardsPercent) els.flashcardsPercent.textContent = flashcardsLabel;
      if (els.smartbooksPercent) els.smartbooksPercent.textContent = smartbooksLabel;
      updateResult();
    }

    function calculate() {
      const monthBonusByPlan = {
        6: 0.05,
        9: 0.08,
        12: 0.10,
        18: 0.18,
        24: 0.25
      };
      const applicationBonusByUse = {
        1: 0.20,
        2: 0.25
      };
      const days = state.months * 30;
      const totalHours = (state.minutes / 60) * days;
      const normalizedHours = 2 * days;
      const timeFactor = clamp(state.minutes / 120, 0, 1);
      const calibrationFactor = 25 / 33;
      let base = 100 * (1 - Math.exp(-normalizedHours / 260));
      base *= [0.82, 1.0, 1.15][state.application];
      const smartbooksShare = state.smartbooksPercentage / 100;
      const flashcardsShare = state.flashcardsPercentage / 100;
      const bookBoost = [0.10, 0.20, 0.30][state.application] * smartbooksShare;
      const scoreCeilingBeforeInterpolation = 113;
      const targetScoreCeiling = 200;
      const interpolationFactor = targetScoreCeiling / scoreCeilingBeforeInterpolation;
      const monthBonus = monthBonusByPlan[state.months] || 0;
      const applicationBonus = applicationBonusByUse[state.application] || 0;
      const rawScore = base * (1 + bookBoost) * calibrationFactor * timeFactor * (1 + monthBonus) * (1 + applicationBonus);
      const finalScore = clamp(rawScore * interpolationFactor, 0, targetScoreCeiling);
      return {
        finalScore,
        totalHours,
        bookBoost,
        smartbooksShare,
        flashcardsShare
      };
    }

    function syncSelectedOptionsFromState() {
      document.querySelectorAll('[data-group]').forEach((groupEl) => {
        const group = groupEl.dataset.group;
        const value = String(state[group]);
        groupEl.querySelectorAll('.option').forEach((button) => {
          button.classList.toggle('active', state.selectedGroups[group] && button.dataset.value === value);
        });
      });
    }

    function updateResult() {
      const result = calculate();
      const rounded = Math.round(result.finalScore);
      const normalizedScore = clamp(rounded, 0, 100);
      let selectedLabel = labels[0];
      for (const label of labels) {
        if (normalizedScore >= label.min) selectedLabel = label;
      }

      els.score.textContent = rounded;
      if (els.liveTitle) {
        els.liveTitle.textContent = selectedLabel.title;
        els.liveTitle.classList.toggle('is-compact-30', selectedLabel.min === 30);
      }
      if (els.liveMedal) {
        els.liveMedal.src = `/medalhas/${selectedLabel.medal}`;
      }
      state.liveTitleDefault = selectedLabel.title;
    }

    function renderStep() {
      let activeScreen = null;
      document.querySelectorAll('.screen').forEach((screen) => {
        screen.classList.toggle('active', Number(screen.dataset.step) === step);
        if (Number(screen.dataset.step) === step) {
          activeScreen = screen;
        }
      });

      if (els.liveResult && activeScreen) {
        activeScreen.appendChild(els.liveResult);
        els.liveResult.hidden = false;
        els.liveResult.classList.toggle('is-final', step === 4);
      }

      els.backBtn.disabled = busy || step === 0;
      els.nextBtn.disabled = busy;
      els.nextBtn.textContent = step < totalChoiceSteps ? 'Continuar' : (busy ? 'Salvando...' : 'Continuar');
      els.stepFill.style.width = `${clamp(((step + 1) / 5) * 100, 20, 100)}%`;
      updateResult();
    }

    function requiredGroupForStep(currentStep) {
      if (currentStep === 0) return 'minutes';
      if (currentStep === 1) return 'months';
      if (currentStep === 2) return 'application';
      return '';
    }

    function clearOptionWarning(screen) {
      screen.querySelectorAll('.option.is-warning').forEach((button) => {
        button.classList.remove('is-warning');
      });
    }

    function showStepSelectionWarning() {
      const activeScreen = document.querySelector(`.screen[data-step="${step}"]`);
      if (!activeScreen) return;
      const options = activeScreen.querySelectorAll('.option');
      if (!options.length) return;

      options.forEach((button) => button.classList.add('is-warning'));
      if (els.liveTitle) {
        els.liveTitle.textContent = 'Escolha uma opção';
        els.liveTitle.classList.remove('is-warning');
        void els.liveTitle.offsetWidth;
        els.liveTitle.classList.add('is-warning');
      }

      if (state.warningTimer) {
        window.clearTimeout(state.warningTimer);
      }

      state.warningTimer = window.setTimeout(() => {
        clearOptionWarning(activeScreen);
        if (els.liveTitle) {
          els.liveTitle.classList.remove('is-warning');
          els.liveTitle.textContent = state.liveTitleDefault || 'Fluência prática';
        }
        state.warningTimer = 0;
      }, 1000);
    }

    function hydrateFromPlan(plan) {
      if (!plan || typeof plan !== 'object') return;
      if (Number.isInteger(Number(plan.minutes))) {
        state.minutes = Number(plan.minutes);
        state.selectedGroups.minutes = true;
      }
      if (Number.isInteger(Number(plan.months))) {
        state.months = Number(plan.months);
        state.selectedGroups.months = true;
      }
      if (Number.isInteger(Number(plan.application))) {
        state.application = Number(plan.application);
        state.selectedGroups.application = true;
      }
      const flashcardsPercentage = Number(plan.flashcardsPercentage ?? plan.flashcards_percentage);
      const smartbooksPercentage = Number(plan.smartbooksPercentage ?? plan.smartbooks_percentage);
      if (Number.isInteger(flashcardsPercentage) && Number.isInteger(smartbooksPercentage) && flashcardsPercentage + smartbooksPercentage === 100) {
        state.flashcardsPercentage = snapMixPercentage(flashcardsPercentage);
        state.smartbooksPercentage = 100 - state.flashcardsPercentage;
        state.mixVisual = 100 - state.flashcardsPercentage;
      } else if (Number.isInteger(Number(plan.books))) {
        state.flashcardsPercentage = Number(plan.books) === 1 ? 50 : 100;
        state.smartbooksPercentage = 100 - state.flashcardsPercentage;
        state.mixVisual = 100 - state.flashcardsPercentage;
      }

      syncSelectedOptionsFromState();
      updateMixSelection(state.mixVisual);
    }

    function resolveNextRoute(user) {
      const nextRoute = safeText(user?.nextOnboardingRoute || state.nextOnboardingRoute);
      return nextRoute || getReturnPath();
    }

    async function fetchFluencyPlan() {
      const response = await fetch(buildApiUrl('/auth/fluency-plan'), {
        cache: 'no-store',
        credentials: 'include',
        headers: buildAuthHeaders()
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload?.success) {
        throw new Error(payload?.message || 'Nao foi possivel carregar o plano de fluencia.');
      }
      return payload;
    }

    async function persistFluencyPlan() {
      const response = await fetch(buildApiUrl('/auth/fluency-plan'), {
        method: 'PATCH',
        credentials: 'include',
        headers: buildAuthHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({
          minutes: state.minutes,
          months: state.months,
          application: state.application,
          flashcardsPercentage: state.flashcardsPercentage,
          smartbooksPercentage: state.smartbooksPercentage
        })
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload?.success) {
        throw new Error(payload?.message || 'Nao foi possivel salvar o plano de fluencia.');
      }
      return payload;
    }

    document.querySelectorAll('[data-group]').forEach((groupEl) => {
      groupEl.addEventListener('click', (event) => {
        if (busy) return;
        const button = event.target.closest('.option');
        if (!button) return;
        playClickSound();
        groupEl.querySelectorAll('.option').forEach((btn) => btn.classList.remove('active'));
        button.classList.add('active');
        state[groupEl.dataset.group] = Number(button.dataset.value);
        state.selectedGroups[groupEl.dataset.group] = true;
        updateResult();
      });
    });

    if (els.mixSlider) {
      els.mixSlider.addEventListener('pointerdown', () => {
        if (busy) return;
        playClickSound();
      });

      els.mixSlider.addEventListener('input', (event) => {
        if (busy) return;
        updateMixSelection(event.target.value, { skipSliderSync: true });
      });

      els.mixSlider.addEventListener('change', (event) => {
        if (busy) return;
        updateMixSelection(event.target.value, { skipSliderSync: true });
      });
    }

    els.backBtn.addEventListener('click', () => {
      if (busy || step === 0) return;
      playClickSound();
      step -= 1;
      renderStep();
      setStatus('');
    });

    els.nextBtn.addEventListener('click', () => {
      if (busy) return;
      playClickSound();
      const requiredGroup = requiredGroupForStep(step);
      if (requiredGroup && !state.selectedGroups[requiredGroup]) {
        showStepSelectionWarning();
        return;
      }
      if (step < 4) {
        step += 1;
        renderStep();
        setStatus('');
        return;
      }

      void (async () => {
        busy = true;
        renderStep();
        setStatus('Salvando seu plano de fluência...');
        try {
          const payload = await persistFluencyPlan();
          const user = normalizeUser(payload.user);
          state.nextOnboardingRoute = safeText(payload?.user?.next_onboarding_route);
          setStatus('Plano salvo com sucesso.', 'success');
          navigateTo(resolveNextRoute(user), { replace: true });
        } catch (error) {
          setStatus(error?.message || 'Não foi possível salvar o plano de fluência.', 'error');
        } finally {
          busy = false;
          renderStep();
        }
      })();
    });

    async function init() {
      setStatus('Carregando seu plano...');
      try {
        const payload = await fetchFluencyPlan();
        const user = normalizeUser(payload.user);
        if (user?.nextOnboardingRoute && !/^\/fluency-plan(?:[/?#]|$)/i.test(user.nextOnboardingRoute)) {
          navigateTo(user.nextOnboardingRoute, { replace: true });
          return;
        }
        hydrateFromPlan(payload.plan);
        step = 0;
        setStatus('');
        renderStep();
      } catch (error) {
        setStatus(error?.message || 'Não foi possível abrir o plano de fluência.', 'error');
      }
    }

    syncSelectedOptionsFromState();
    renderStep();
    updateMixSelection(state.mixVisual);
    ensureClickSound();
    void init();
  </script>
</body>
</html>
