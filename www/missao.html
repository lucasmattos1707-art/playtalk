<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão Diária | Fluent Level Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800;900&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #020713;
      --panel: rgba(8, 16, 38, 0.84);
      --panel2: rgba(10, 22, 52, 0.68);
      --line: rgba(105, 190, 255, 0.22);
      --blue: #18c8ff;
      --blue2: #2d66ff;
      --purple: #8d65ff;
      --white: #f5fbff;
      --muted: #aebcdf;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Exo 2", system-ui, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 50% -10%, rgba(33, 161, 255, 0.34), transparent 38%),
        radial-gradient(circle at 90% 38%, rgba(99, 102, 241, 0.22), transparent 28%),
        radial-gradient(circle at 10% 85%, rgba(0, 198, 255, 0.18), transparent 32%),
        linear-gradient(180deg, #030817 0%, #061129 52%, #020511 100%);
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .phone {
      width: min(430px, 100%);
      min-height: 100vh;
      position: relative;
      padding: 28px 22px 34px;
      isolation: isolate;
    }

    .phone::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0 18%, rgba(21, 166, 255, 0.12) 18.3%, transparent 19%),
        linear-gradient(230deg, transparent 0 20%, rgba(128, 95, 255, 0.16) 20.3%, transparent 21%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 90px);
      opacity: 0.8;
      pointer-events: none;
      z-index: -2;
    }

    .glow-orb {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(24, 200, 255, 0.16);
      filter: blur(55px);
      top: 170px;
      left: 50%;
      transform: translateX(-50%);
      z-index: -1;
    }

    .topbar {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .topbar-spacer {
      width: 54px;
      height: 54px;
    }

    .brand {
      text-align: center;
      line-height: 1;
    }

    .brand strong {
      font-family: "Orbitron", sans-serif;
      letter-spacing: 0.16em;
      font-size: 19px;
      display: block;
    }

    .brand small {
      display: block;
      color: var(--blue);
      letter-spacing: 0.52em;
      font-weight: 800;
      font-size: 10px;
      margin-top: 7px;
      padding-left: 5px;
    }

    .player-badge {
      min-width: 118px;
      min-height: 54px;
      padding: 6px 8px 6px 6px;
      border-radius: 999px;
      border: 1px solid rgba(122, 199, 255, 0.22);
      background: rgba(255, 255, 255, 0.055);
      display: inline-grid;
      grid-template-columns: 42px auto;
      align-items: center;
      gap: 10px;
      justify-self: end;
      box-shadow:
        inset 0 0 18px rgba(0, 163, 255, 0.08),
        0 0 24px rgba(0, 163, 255, 0.08);
    }

    .player-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      background: radial-gradient(circle, #102143, #050a18 70%);
      box-shadow:
        0 0 0 2px rgba(24, 200, 255, 0.72),
        0 0 16px rgba(24, 200, 255, 0.34);
    }

    .player-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .player-meta {
      min-width: 0;
      display: grid;
      justify-items: start;
      gap: 2px;
      text-align: left;
    }

    .player-level-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      color: rgba(195, 228, 255, 0.74);
      text-transform: uppercase;
    }

    .player-level-value {
      font-family: "Orbitron", sans-serif;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
    }

    .hero {
      text-align: center;
      margin: 10px 0 24px;
    }

    .hero .pre {
      color: white;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(42px, 12vw, 64px);
      letter-spacing: 0.08em;
      font-weight: 900;
      line-height: 0.88;
      text-shadow: 0 0 22px rgba(255, 255, 255, 0.32);
    }

    .hero .main {
      font-family: "Orbitron", sans-serif;
      font-size: clamp(48px, 14vw, 74px);
      letter-spacing: 0.09em;
      font-weight: 900;
      line-height: 0.95;
      background: linear-gradient(180deg, #c9f4ff 0%, #2ed0ff 40%, #2d66ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 18px rgba(24, 200, 255, 0.62));
    }

    .mission-card {
      position: relative;
      background: linear-gradient(180deg, rgba(10, 24, 56, 0.86), rgba(3, 9, 24, 0.88));
      border: 1px solid var(--line);
      border-radius: 34px;
      padding: 26px 22px;
      box-shadow:
        0 0 0 1px rgba(70, 170, 255, 0.08) inset,
        0 0 42px rgba(0, 163, 255, 0.18),
        0 24px 80px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .mission-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 2px solid rgba(24, 200, 255, 0.28);
      pointer-events: none;
      filter: drop-shadow(0 0 14px rgba(24, 200, 255, 0.85));
    }

    .mission-card::after {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(110deg, transparent 0 40%, rgba(255, 255, 255, 0.12) 48%, transparent 56%);
      transform: translateX(-80%);
      animation: shine 5s infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0%, 55% { transform: translateX(-90%); }
      75%, 100% { transform: translateX(90%); }
    }

    .mission {
      display: grid;
      grid-template-columns: 94px 1fr;
      gap: 18px;
      align-items: center;
      padding: 8px 0 24px;
    }

    .mission + .mission {
      border-top: 1px solid rgba(116, 185, 255, 0.26);
      padding-top: 28px;
    }

    .icon-ring {
      width: 94px;
      height: 94px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 46px;
      color: white;
      background:
        radial-gradient(circle, rgba(24, 200, 255, 0.35), rgba(24, 200, 255, 0.04) 62%),
        rgba(5, 12, 28, 0.88);
      border: 1px solid rgba(24, 200, 255, 0.38);
      box-shadow: 0 0 34px rgba(24, 200, 255, 0.34), inset 0 0 24px rgba(24, 200, 255, 0.14);
    }

    .icon-ring.purple {
      background:
        radial-gradient(circle, rgba(141, 101, 255, 0.38), rgba(141, 101, 255, 0.04) 62%),
        rgba(5, 12, 28, 0.88);
      border-color: rgba(141, 101, 255, 0.42);
      box-shadow: 0 0 34px rgba(141, 101, 255, 0.36), inset 0 0 24px rgba(141, 101, 255, 0.14);
    }

    .mission h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .mission h2 span {
      display: block;
      color: var(--blue);
      font-size: 30px;
      margin-top: 4px;
      text-shadow: 0 0 16px rgba(24, 200, 255, 0.45);
    }

    .mission.books h2 span {
      color: var(--purple);
      text-shadow: 0 0 16px rgba(141, 101, 255, 0.55);
    }

    .counter {
      font-family: "Orbitron", sans-serif;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 12px;
    }

    .counter .done {
      color: var(--blue);
      filter: drop-shadow(0 0 12px rgba(24, 200, 255, 0.65));
    }

    .books .counter .done {
      color: var(--purple);
      filter: drop-shadow(0 0 12px rgba(141, 101, 255, 0.65));
    }

    .counter .total {
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.62em;
    }

    .bar {
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(115, 180, 255, 0.25);
      overflow: hidden;
      box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.45);
    }

    .fill {
      height: 100%;
      width: var(--progress, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, #18c8ff, #8deeff);
      box-shadow: 0 0 22px rgba(24, 200, 255, 0.72);
    }

    .books .fill {
      background: linear-gradient(90deg, #7b5cff, #b69cff);
      box-shadow: 0 0 22px rgba(141, 101, 255, 0.72);
    }

    .reward {
      margin-top: 4px;
      padding: 20px;
      border-radius: 24px;
      background: rgba(5, 14, 34, 0.7);
      border: 1px solid rgba(105, 190, 255, 0.18);
      display: grid;
      grid-template-columns: 1fr 82px;
      gap: 12px;
      align-items: center;
    }

    .reward small {
      display: block;
      color: var(--blue);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 9px;
    }

    .reward strong {
      display: block;
      font-size: 21px;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .medal {
      width: 82px;
      height: 82px;
      border-radius: 25px;
      display: grid;
      place-items: center;
      font-size: 40px;
      background: radial-gradient(circle, rgba(24, 200, 255, 0.5), rgba(45, 102, 255, 0.16) 62%, rgba(5, 12, 28, 0.9));
      border: 1px solid rgba(24, 200, 255, 0.4);
      box-shadow: 0 0 32px rgba(24, 200, 255, 0.45);
    }

    @media (max-width: 380px) {
      .phone { padding-left: 15px; padding-right: 15px; }
      .topbar { grid-template-columns: 42px 1fr auto; }
      .topbar-spacer { width: 42px; height: 42px; }
      .player-badge { min-width: 106px; }
      .mission-card { padding: 22px 16px; }
      .mission { grid-template-columns: 78px 1fr; gap: 14px; }
      .icon-ring { width: 78px; height: 78px; font-size: 38px; }
      .mission h2 span { font-size: 25px; }
      .hero .pre { font-size: 38px; }
      .hero .main { font-size: 46px; }
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="glow-orb"></div>

    <header class="topbar">
      <div class="topbar-spacer" aria-hidden="true"></div>
      <div class="brand">
        <strong>FLUENT</strong>
        <small>LEVEL UP</small>
      </div>
      <div class="player-badge" aria-label="Jogador e nível">
        <div class="player-avatar">
          <img id="missionUserAvatar" src="/Avatar/profile-neon-blue.svg" alt="Avatar do usuário">
        </div>
        <div class="player-meta">
          <span class="player-level-label">Nível</span>
          <span class="player-level-value" id="missionUserLevel">1</span>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="pre">MISSÃO</div>
      <div class="main">DIÁRIA</div>
    </section>

    <section class="mission-card">
      <article class="mission cards">
        <div class="icon-ring">⚡</div>
        <div>
          <h2>Ganhar <span>20 FlashCards</span></h2>
          <div class="counter"><span class="done" id="missionFlashcardsDone">0</span><span class="total">/20</span></div>
          <div class="bar"><div class="fill" id="missionFlashcardsBar" style="--progress: 0%"></div></div>
        </div>
      </article>

      <article class="mission books">
        <div class="icon-ring purple">📘</div>
        <div>
          <h2>Ler <span>3 MiniBooks</span></h2>
          <div class="counter"><span class="done" id="missionBooksDone">0</span><span class="total">/3</span></div>
          <div class="bar"><div class="fill" id="missionBooksBar" style="--progress: 0%"></div></div>
        </div>
      </article>

      <div class="reward">
        <div>
          <small>Recompensa</small>
          <strong>+ Experiência<br>+ Ranking</strong>
        </div>
        <div class="medal">⭐</div>
      </div>
    </section>
  </main>

  <script src="js/api-config.js"></script>
  <script>
    (function initMissionPage() {
      const els = {
        missionUserAvatar: document.getElementById('missionUserAvatar'),
        missionUserLevel: document.getElementById('missionUserLevel'),
        missionFlashcardsDone: document.getElementById('missionFlashcardsDone'),
        missionFlashcardsBar: document.getElementById('missionFlashcardsBar'),
        missionBooksDone: document.getElementById('missionBooksDone'),
        missionBooksBar: document.getElementById('missionBooksBar')
      };

      function safeText(value) {
        return typeof value === 'string' ? value.trim() : '';
      }

      function buildApiUrl(path) {
        if (window.PlaytalkApi && typeof window.PlaytalkApi.url === 'function') {
          return window.PlaytalkApi.url(path);
        }
        return path;
      }

      function buildAuthHeaders(extraHeaders) {
        if (window.PlaytalkApi && typeof window.PlaytalkApi.authHeaders === 'function') {
          return window.PlaytalkApi.authHeaders(extraHeaders);
        }
        return { ...(extraHeaders || {}) };
      }

      function setMissionProgress(targetValue, maxValue, valueEl, barEl) {
        const max = Math.max(1, Number(maxValue) || 1);
        const value = Math.max(0, Math.min(max, Number(targetValue) || 0));
        if (valueEl) valueEl.textContent = String(value);
        if (barEl) {
          const percent = (value / max) * 100;
          barEl.style.setProperty('--progress', percent.toFixed(2) + '%');
        }
      }

      async function fetchJson(path) {
        const response = await fetch(buildApiUrl(path), {
          headers: buildAuthHeaders(),
          cache: 'no-store',
          credentials: 'include'
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload?.success) {
          return null;
        }
        return payload;
      }

      async function loadMissionState() {
        const [sessionPayload, flashcardsPayload, booksPayload] = await Promise.all([
          fetchJson('/auth/session').catch(() => null),
          fetchJson('/api/flashcards/state').catch(() => null),
          fetchJson('/api/books/stats').catch(() => null)
        ]);

        const user = sessionPayload?.user || null;
        const avatar = safeText(user?.avatarImage) || '/Avatar/profile-neon-blue.svg';
        const level = Math.max(
          1,
          Number(flashcardsPayload?.userLevel) || Number(booksPayload?.stats?.userLevel) || Number(user?.level) || 1
        );
        const flashcardsDone = Math.max(
          0,
          Math.min(20, Array.isArray(flashcardsPayload?.progress) ? flashcardsPayload.progress.length : 0)
        );
        const booksDone = Math.max(
          0,
          Math.min(3, Number(booksPayload?.stats?.qualifiedBookCount) || Number(booksPayload?.stats?.myBooksCount) || 0)
        );

        if (els.missionUserAvatar) {
          els.missionUserAvatar.src = avatar;
        }
        if (els.missionUserLevel) {
          els.missionUserLevel.textContent = String(level);
        }
        setMissionProgress(flashcardsDone, 20, els.missionFlashcardsDone, els.missionFlashcardsBar);
        setMissionProgress(booksDone, 3, els.missionBooksDone, els.missionBooksBar);
      }

      loadMissionState().catch(() => {
        setMissionProgress(0, 20, els.missionFlashcardsDone, els.missionFlashcardsBar);
        setMissionProgress(0, 3, els.missionBooksDone, els.missionBooksBar);
      });
    })();
  </script>
</body>
</html>
