<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>MyCards | PlayTalk</title>
  <meta name="description" content="Flashcards conquistados pelo usuario no PlayTalk.">
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/player-state.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/global-radio.js"></script>
  <script src="js/lens.js"></script>
  <script src="js/site-nav.js"></script>
  <style>
    :root {
      --footer-height: max(62px, 8vh);
    }

    body.page-cards {
      padding-bottom: calc(var(--footer-height) + 18px);
    }

    .cards-tabs {
      display: none;
    }

    .mycards-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .mycards-stat {
      padding: 16px 14px;
      border-radius: 22px;
      background: rgba(8, 21, 40, 0.88);
      border: 1px solid rgba(126, 208, 255, 0.18);
      text-align: center;
    }

    .mycards-stat strong {
      display: block;
      font-size: 24px;
      color: #ffffff;
    }

    .mycards-stat span {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #b8d8ff;
    }

    .mycards-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .mycards-card {
      padding: 12px;
      border-radius: 22px;
      background: rgba(8, 21, 40, 0.88);
      border: 1px solid rgba(126, 208, 255, 0.18);
    }

    .mycards-card__image {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }

    .mycards-card__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mycards-card__seal {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 34px;
      height: 34px;
      object-fit: contain;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.28));
    }

    .mycards-card__status {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      padding: 7px 9px;
      border-radius: 999px;
      background: rgba(4, 10, 18, 0.72);
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .mycards-card__status.is-memorizing {
      background: rgba(16, 88, 168, 0.78);
    }

    .mycards-card__status.is-ready {
      background: rgba(29, 130, 77, 0.82);
    }

    .mycards-card__title {
      margin: 12px 0 4px;
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      text-align: center;
    }

    .mycards-card__sub {
      margin: 0;
      font-size: 12px;
      color: #b8d8ff;
      text-align: center;
      min-height: 32px;
    }

    .mycards-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
    }

    .mycards-pagination[hidden] {
      display: none;
    }

    .mycards-pagination__button {
      min-width: 110px;
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      background: #157efb;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .mycards-pagination__button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .mycards-pagination__label {
      color: #d9ecff;
      font-size: 13px;
      font-weight: 700;
    }

    .flashcards-footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #157efb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
      visibility: visible;
      opacity: 1;
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
    }

    @media (max-width: 720px) {
      .mycards-summary {
        grid-template-columns: 1fr;
      }

      .mycards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body class="page-cards" data-lens-context="menus">
  <header class="site-header site-header--app" id="global-header">
    <div class="site-header__slot site-header__slot--left">
      <button type="button" class="site-header__avatar-button" aria-label="Perfil do jogador">
        <img id="global-header-avatar-image" class="site-header__avatar" src="Avatar/avatar-boy-male-svgrepo-com.svg" alt="Avatar do jogador">
        <span id="global-header-avatar-fallback" class="site-header__avatar-fallback">P</span>
      </button>
    </div>
    <div class="site-header__slot site-header__slot--center">
      <button id="global-header-menu" type="button" class="site-header__menu-button" aria-label="Menu principal">
        <span class="site-header__menu-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M4 7h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
        </span>
        <span id="global-header-menu-label" class="site-header__menu-label">PlayTalk</span>
      </button>
    </div>
    <div class="site-header__slot site-header__slot--right">
      <div class="site-header__coins" aria-label="Moedas">
        <span class="site-header__coins-icon" aria-hidden="true">◉</span>
        <span id="global-header-coins">0</span>
      </div>
    </div>
  </header>

  <main id="cards-page" class="cards-page" data-page-transition data-cards-active-tab="flashcards">
    <section class="cards-selection" aria-live="polite" aria-label="Sessao selecionada">
      <div id="cards-section-dynamic" class="cards-section-dynamic">
        <div id="title-section" class="cards-layout-box title-section">
          <button id="cards-back-button" class="cards-back-button" type="button" hidden>Voltar aos decks</button>
          <h2 id="cards-selected-title" class="cards-selection__title">FlashCards</h2>
        </div>
        <div id="description-section" class="cards-layout-box description-section">
          <p id="cards-selected-copy" class="cards-selection__copy">Conteudo conquistado na Jornada da Fluencia.</p>
        </div>
        <div id="cards-selected-spotlight" class="cards-selected-spotlight" hidden>
          <div id="cards-selected-cover" class="cards-selected-spotlight__cover"></div>
          <p id="cards-selected-block-title" class="cards-selected-spotlight__title"></p>
          <button id="cards-selected-action" class="cards-action-button" type="button" hidden></button>
        </div>
        <div class="mycards-summary" id="mycards-summary">
          <div class="mycards-stat">
            <strong id="mycards-total">0</strong>
            <span>Total de cartas</span>
          </div>
          <div class="mycards-stat">
            <strong id="mycards-ready">0</strong>
            <span>Liberadas para fila</span>
          </div>
          <div class="mycards-stat">
            <strong id="mycards-memorizing">0</strong>
            <span>Em memorizing</span>
          </div>
        </div>
        <div id="content-section" class="cards-layout-box content-section">
          <div id="cards-collection-grid" class="mycards-grid" role="list"></div>
          <p id="cards-empty-state" class="cards-empty-state" hidden></p>
          <div class="mycards-pagination" id="mycards-pagination" hidden>
            <button class="mycards-pagination__button" id="mycards-prev" type="button">Anterior</button>
            <span class="mycards-pagination__label" id="mycards-page-label">Página 1</span>
            <button class="mycards-pagination__button" id="mycards-next" type="button">Próxima</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.36a1 1 0 0 0 0-1.72l-10-6.36A1 1 0 0 0 8 5.14Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/mycards" aria-label="Flashcards">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.6 2.5c.33 2.34 2.12 3.25 3.48 4.86 1.34 1.59 2 3.22 2 5.35 0 4.3-2.96 8.79-7.58 8.79-3.36 0-5.58-2.4-5.58-5.34 0-2.21 1.12-3.85 2.97-5.78 1.38-1.44 2.94-3.14 4.71-7.88Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/users" aria-label="Usuarios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v2h2a2 2 0 0 1 2 2c0 3.32-2.47 6-5.57 6.4A5.99 5.99 0 0 1 13 17.83V20h4v2H7v-2h4v-2.17A5.99 5.99 0 0 1 8.57 13.4C5.47 13 3 10.32 3 7a2 2 0 0 1 2-2h2V3Zm-2 4c0 2.1 1.45 3.82 3.4 4.28A6 6 0 0 1 7 7V7H5Zm14 0h-2a6 6 0 0 1-1.4 4.28C17.55 10.82 19 9.1 19 7Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
    </a>
  </nav>

  <script src="js/mycards-page.js" defer></script>
</body>
</html>
