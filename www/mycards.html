<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>MyCards | PlayTalk</title>
  <meta name="description" content="Flashcards conquistados pelo usuario no PlayTalk.">
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/player-state.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/global-radio.js"></script>
  <script src="js/lens.js"></script>
  <script src="js/site-nav.js"></script>
  <style>
    :root {
      --footer-height: max(62px, 8vh);
    }

    body.page-cards {
      padding-bottom: calc(var(--footer-height) + 18px);
    }

    .flashcards-footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #157efb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 40;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item img {
      width: 28px;
      height: 28px;
      display: block;
    }
  </style>
</head>
<body class="page-cards" data-lens-context="menus">
  <header class="site-header site-header--app" id="global-header">
    <div class="site-header__slot site-header__slot--left">
      <button type="button" class="site-header__avatar-button" aria-label="Perfil do jogador">
        <img id="global-header-avatar-image" class="site-header__avatar" src="Avatar/avatar-boy-male-svgrepo-com.svg" alt="Avatar do jogador">
        <span id="global-header-avatar-fallback" class="site-header__avatar-fallback">P</span>
      </button>
    </div>
    <div class="site-header__slot site-header__slot--center">
      <button id="global-header-menu" type="button" class="site-header__menu-button" aria-label="Menu principal">
        <span class="site-header__menu-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M4 7h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
        </span>
        <span id="global-header-menu-label" class="site-header__menu-label">PlayTalk</span>
      </button>
    </div>
    <div class="site-header__slot site-header__slot--right">
      <div class="site-header__coins" aria-label="Moedas">
        <span class="site-header__coins-icon" aria-hidden="true">◉</span>
        <span id="global-header-coins">0</span>
      </div>
    </div>
  </header>

  <main id="cards-page" class="cards-page" data-page-transition data-cards-active-tab="flashcards">
    <nav class="cards-tabs" aria-label="Sessoes de cards">
      <button class="cards-tab is-active" type="button" data-cards-tab="flashcards" data-cards-title="MyCards" aria-current="true">
        <span class="cards-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M12.66 2.58c.2-.77 1.3-.77 1.5 0 .3 1.17 1.04 2.38 2.08 3.42 1.04 1.04 2.25 1.78 3.42 2.08.77.2.77 1.3 0 1.5-1.17.3-2.38 1.04-3.42 2.08-1.04 1.04-1.78 2.25-2.08 3.42-.2.77-1.3.77-1.5 0-.3-1.17-1.04-2.38-2.08-3.42-1.04-1.04-2.25-1.78-3.42-2.08-.77-.2-.77-1.3 0-1.5 1.17-.3 2.38-1.04 3.42-2.08 1.04-1.04 1.78-2.25 2.08-3.42ZM7 14c2.76 0 5 2.24 5 5 0 1.66-.81 3.13-2.06 4.04a.7.7 0 0 1-1.08-.57c0-1.9-1.54-3.44-3.44-3.44a.7.7 0 0 1-.57-1.08A4.97 4.97 0 0 1 7 14Z"/></svg>
        </span>
        <span class="sr-only">MyCards</span>
      </button>
      <button class="cards-tab" type="button" data-cards-tab="palavras" data-cards-title="Palavras">
        <span class="cards-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M12.81 4.13 18.5 20h-2.36l-1.45-4.2H9.25L7.8 20H5.5l5.68-15.87h1.63Zm1.2 9.79-2.04-5.91-2.04 5.91h4.08Z"/></svg>
        </span>
        <span class="sr-only">Palavras</span>
      </button>
      <button class="cards-tab" type="button" data-cards-tab="minibooks" data-cards-title="Minibooks">
        <span class="cards-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M6 3h11a3 3 0 0 1 3 3v13.5a1.5 1.5 0 0 1-2.26 1.3L14 18.7l-3.74 2.1A1.5 1.5 0 0 1 8 19.5V6a3 3 0 0 0-2-2.82V3Zm0 2a1 1 0 0 0 0 2h10V5H6Zm0 4a1 1 0 0 0 0 2h10V9H6Zm0 4a1 1 0 0 0 0 2h7v-2H6Z"/></svg>
        </span>
        <span class="sr-only">Minibooks</span>
      </button>
      <button class="cards-tab" type="button" data-cards-tab="cenas" data-cards-title="Cenas">
        <span class="cards-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M4 5a2 2 0 0 1 2-2h4l2 3 2-3h4a2 2 0 0 1 2 2v14a1 1 0 0 1-1.6.8L12 14.75 5.6 19.8A1 1 0 0 1 4 19V5Zm4.5 4a1.5 1.5 0 1 0 0 3h1v1.5a1.5 1.5 0 1 0 3 0V12h1a1.5 1.5 0 1 0 0-3h-1V7.5a1.5 1.5 0 1 0-3 0V9h-1Z"/></svg>
        </span>
        <span class="sr-only">Cenas</span>
      </button>
      <button class="cards-tab" type="button" data-cards-tab="filmes" data-cards-title="Filmes">
        <span class="cards-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M6 4h12a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Zm3.5 3.5v9l7-4.5-7-4.5Z"/></svg>
        </span>
        <span class="sr-only">Filmes</span>
      </button>
    </nav>
    <section class="cards-selection" aria-live="polite" aria-label="Sessao selecionada">
      <div id="cards-section-dynamic" class="cards-section-dynamic">
        <div id="title-section" class="cards-layout-box title-section">
          <button id="cards-back-button" class="cards-back-button" type="button" hidden>Voltar aos decks</button>
          <h2 id="cards-selected-title" class="cards-selection__title">MyCards</h2>
        </div>
        <div id="description-section" class="cards-layout-box description-section">
          <p id="cards-selected-copy" class="cards-selection__copy">Conteudo conquistado pelo usuario dentro da jornada.</p>
        </div>
        <div id="cards-selected-spotlight" class="cards-selected-spotlight" hidden>
          <div id="cards-selected-cover" class="cards-selected-spotlight__cover"></div>
          <p id="cards-selected-block-title" class="cards-selected-spotlight__title"></p>
          <button id="cards-selected-action" class="cards-action-button" type="button" hidden></button>
        </div>
        <div id="content-section" class="cards-layout-box content-section">
          <div id="cards-collection-grid" class="cards-collection-grid" role="list"></div>
          <p id="cards-empty-state" class="cards-empty-state" hidden></p>
        </div>
      </div>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <img src="svgnovo/play.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/mycards" aria-label="Flashcards">
      <img src="svgnovo/cards.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item" href="/users" aria-label="Usuarios">
      <img src="svgnovo/cup.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <img src="svgnovo/profile.svg" alt="">
    </a>
  </nav>

  <script src="js/cards-page.js" defer></script>
</body>
</html>
