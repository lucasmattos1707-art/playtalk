<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>MyCards | PlayTalk</title>
  <meta name="description" content="Flashcards conquistados pelo usuario no PlayTalk.">
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/player-state.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/global-radio.js"></script>
  <script src="js/lens.js"></script>
  <script src="js/site-nav.js"></script>
  <style>
    @font-face {
      font-family: "Soopafre";
      src: url("soopafre.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --footer-height: max(62px, 8vh);
    }

    html:has(body.page-cards),
    body.page-cards {
      min-height: 100%;
      padding-bottom: calc(var(--footer-height) + 18px);
      overflow-y: auto !important;
      overflow-x: hidden !important;
      background: linear-gradient(180deg, #79afea 0%, #5f95e1 46%, #4d79db 100%);
      touch-action: pan-x pan-y !important;
      -webkit-overflow-scrolling: touch;
    }

    .mycards-page {
      width: min(1080px, calc(100vw - 22px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    .mycards-head {
      display: grid;
      justify-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    .mycards-title {
      margin: 0;
      color: #ffffff;
      font-family: "Soopafre", "Open Sans", Arial, sans-serif;
      font-size: clamp(36px, 8vw, 54px);
      letter-spacing: 0.04em;
      text-shadow: 0 10px 24px rgba(16, 42, 102, 0.2);
    }

    .mycards-total {
      margin: 0;
      color: rgba(255, 255, 255, 0.92);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mycards-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px 14px;
      overflow: visible;
      touch-action: pan-x pan-y;
    }

    .mycards-empty {
      margin: 0;
      padding: 22px 12px;
      text-align: center;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 700;
    }

    .mycards-item {
      display: flex;
      justify-content: center;
    }

    .mycards-card {
      width: min(100%, 190px);
      padding: 12px 12px 14px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 34px rgba(20, 47, 114, 0.18);
      backdrop-filter: blur(12px);
    }

    .mycards-card__image {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 26px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      margin-bottom: 12px;
    }

    .mycards-card__image img,
    .mycards-card__fallback {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .mycards-card__fallback {
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
    }

    .mycards-card.is-memorizing .mycards-card__image > img {
      filter: blur(7px);
      transform: scale(1.05);
    }

    .mycards-card__seal {
      position: absolute;
      right: 8px;
      top: 8px;
      width: 44px;
      height: 44px;
      object-fit: contain;
      z-index: 2;
      pointer-events: none;
      filter: drop-shadow(0 4px 10px rgba(12, 26, 68, 0.28));
    }

    .mycards-card__word {
      margin: 0;
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.15;
      text-align: center;
      word-break: break-word;
    }

    .mycards-card__subword {
      margin: 6px 0 0;
      min-height: 22px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    .mycards-card__progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.2);
      margin-top: 10px;
    }

    .mycards-card__progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #3ed66b 0%, #7af28d 100%);
      box-shadow: 0 0 14px rgba(62, 214, 107, 0.42);
    }

    .flashcards-footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #157efb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
      visibility: visible;
      opacity: 1;
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
    }

    @media (max-width: 720px) {
      .mycards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 12px;
      }

      .mycards-card {
        width: min(100%, 176px);
      }
    }
  </style>
</head>
<body class="page-cards" data-lens-context="menus">
  <main class="mycards-page" aria-live="polite">
    <header class="mycards-head">
      <h1 class="mycards-title">FlashCards</h1>
      <p class="mycards-total" id="mycards-total">0 FlashCards</p>
    </header>

    <section>
      <div id="cards-collection-grid" class="mycards-grid" role="list"></div>
      <p id="cards-empty-state" class="mycards-empty" hidden></p>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.36a1 1 0 0 0 0-1.72l-10-6.36A1 1 0 0 0 8 5.14Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/mycards" aria-label="Flashcards">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.6 2.5c.33 2.34 2.12 3.25 3.48 4.86 1.34 1.59 2 3.22 2 5.35 0 4.3-2.96 8.79-7.58 8.79-3.36 0-5.58-2.4-5.58-5.34 0-2.21 1.12-3.85 2.97-5.78 1.38-1.44 2.94-3.14 4.71-7.88Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/users" aria-label="Usuarios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v2h2a2 2 0 0 1 2 2c0 3.32-2.47 6-5.57 6.4A5.99 5.99 0 0 1 13 17.83V20h4v2H7v-2h4v-2.17A5.99 5.99 0 0 1 8.57 13.4C5.47 13 3 10.32 3 7a2 2 0 0 1 2-2h2V3Zm-2 4c0 2.1 1.45 3.82 3.4 4.28A6 6 0 0 1 7 7V7H5Zm14 0h-2a6 6 0 0 1-1.4 4.28C17.55 10.82 19 9.1 19 7Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
    </a>
  </nav>

  <script src="js/mycards-page.js" defer></script>
</body>
</html>
