<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>MyCards | PlayTalk</title>
  <meta name="description" content="Flashcards conquistados pelo usuario no PlayTalk.">
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/player-state.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/global-radio.js"></script>
  <script src="js/lens.js"></script>
  <script src="js/site-nav.js"></script>
  <style>
    :root {
      --footer-height: max(62px, 8vh);
    }

    body.page-cards {
      padding-bottom: calc(var(--footer-height) + 18px);
    }

    .mycards-page {
      width: min(1080px, calc(100vw - 22px));
      margin: 0 auto;
      padding: 14px 0 24px;
    }

    .mycards-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 20px;
    }

    .mycards-stat {
      min-height: 72px;
      padding: 12px 10px;
      border-radius: 24px;
      background: rgba(8, 21, 40, 0.18);
      border: 1px solid rgba(126, 208, 255, 0.18);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .mycards-stat svg {
      width: 25px;
      height: 25px;
      color: #ffffff;
      flex: 0 0 auto;
    }

    .mycards-stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      color: #ffffff;
    }

    .mycards-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px 14px;
    }

    .mycards-empty {
      margin: 0;
      padding: 18px 12px;
      text-align: center;
      color: rgba(255, 255, 255, 0.88);
      font-weight: 700;
    }

    .mycards-item {
      display: flex;
      justify-content: center;
    }

    .mycards-card {
      position: relative;
      width: min(100%, 170px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      --progress: 360deg;
      background: conic-gradient(#2be06a var(--progress), rgba(43, 224, 106, 0.18) 0deg);
      box-shadow: 0 18px 34px rgba(7, 17, 31, 0.18);
      isolation: isolate;
    }

    .mycards-card::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      z-index: 0;
    }

    .mycards-card__image {
      position: relative;
      z-index: 1;
      width: calc(100% - 16px);
      height: calc(100% - 16px);
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .mycards-card__image img,
    .mycards-card__fallback {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .mycards-card__fallback {
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
    }

    .mycards-card.is-memorizing .mycards-card__image {
      animation: mycards-memorizing-pulse 3000ms ease-in-out infinite;
    }

    .mycards-card__status {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-align: center;
      text-transform: lowercase;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
      pointer-events: none;
    }

    .flashcards-footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #157efb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
      visibility: visible;
      opacity: 1;
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
    }

    @keyframes mycards-memorizing-pulse {
      0% {
        opacity: 0.7;
      }
      50% {
        opacity: 0.35;
      }
      100% {
        opacity: 0.7;
      }
    }

    @media (max-width: 720px) {
      .mycards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 12px;
      }

      .mycards-card {
        width: min(100%, 150px);
      }
    }
  </style>
</head>
<body class="page-cards" data-lens-context="menus">
  <header class="site-header site-header--app" id="global-header">
    <div class="site-header__slot site-header__slot--left">
      <button type="button" class="site-header__avatar-button" aria-label="Perfil do jogador">
        <img id="global-header-avatar-image" class="site-header__avatar" src="Avatar/avatar-boy-male-svgrepo-com.svg" alt="Avatar do jogador">
        <span id="global-header-avatar-fallback" class="site-header__avatar-fallback">P</span>
      </button>
    </div>
    <div class="site-header__slot site-header__slot--center">
      <button id="global-header-menu" type="button" class="site-header__menu-button" aria-label="Menu principal">
        <span class="site-header__menu-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M4 7h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
        </span>
        <span id="global-header-menu-label" class="site-header__menu-label">PlayTalk</span>
      </button>
    </div>
    <div class="site-header__slot site-header__slot--right">
      <div class="site-header__coins" aria-label="Moedas">
        <span class="site-header__coins-icon" aria-hidden="true">&#9673;</span>
        <span id="global-header-coins">0</span>
      </div>
    </div>
  </header>

  <main class="mycards-page" aria-live="polite">
    <section class="mycards-summary" id="mycards-summary">
      <div class="mycards-stat" aria-label="Total de cartas">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M5 4.5A2.5 2.5 0 0 1 7.5 2h9A2.5 2.5 0 0 1 19 4.5v11A2.5 2.5 0 0 1 16.5 18h-9A2.5 2.5 0 0 1 5 15.5v-11Zm2.5-.5a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5v-11a.5.5 0 0 0-.5-.5h-9ZM8 7h8v2H8V7Zm0 4h8v2H8v-2Zm0 4h5v2H8v-2Z"/></svg>
        <strong id="mycards-total">0</strong>
      </div>
      <div class="mycards-stat" aria-label="Liberadas para fila">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2 3 7v4c0 5.25 3.84 10.74 9 12 5.16-1.26 9-6.75 9-12V7l-9-5Zm-1 14-4-4 1.41-1.41L11 13.17l4.59-4.58L17 10l-6 6Z"/></svg>
        <strong id="mycards-ready">0</strong>
      </div>
      <div class="mycards-stat" aria-label="Em memorizing">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M13 2v8h7A8 8 0 1 1 9.05 3.45L10.5 4.9A6 6 0 1 0 18 12h-7V2h2Z"/></svg>
        <strong id="mycards-memorizing">0</strong>
      </div>
    </section>

    <section>
      <div id="cards-collection-grid" class="mycards-grid" role="list"></div>
      <p id="cards-empty-state" class="mycards-empty" hidden></p>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.36a1 1 0 0 0 0-1.72l-10-6.36A1 1 0 0 0 8 5.14Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/mycards" aria-label="Flashcards">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.6 2.5c.33 2.34 2.12 3.25 3.48 4.86 1.34 1.59 2 3.22 2 5.35 0 4.3-2.96 8.79-7.58 8.79-3.36 0-5.58-2.4-5.58-5.34 0-2.21 1.12-3.85 2.97-5.78 1.38-1.44 2.94-3.14 4.71-7.88Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/users" aria-label="Usuarios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v2h2a2 2 0 0 1 2 2c0 3.32-2.47 6-5.57 6.4A5.99 5.99 0 0 1 13 17.83V20h4v2H7v-2h4v-2.17A5.99 5.99 0 0 1 8.57 13.4C5.47 13 3 10.32 3 7a2 2 0 0 1 2-2h2V3Zm-2 4c0 2.1 1.45 3.82 3.4 4.28A6 6 0 0 1 7 7V7H5Zm14 0h-2a6 6 0 0 1-1.4 4.28C17.55 10.82 19 9.1 19 7Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/account" aria-label="Perfil">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
    </a>
  </nav>

  <script src="js/mycards-page.js" defer></script>
</body>
</html>
