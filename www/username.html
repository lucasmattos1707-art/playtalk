<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Escolha um nome</title>
  <style>
    @font-face {
      font-family: "Pltay";
      src: url("/arquivos-codex/pltay.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --playtalk-global-bg-desktop: url('/backgrounds/playtalk-global-desktop.webp');
      --playtalk-global-bg-mobile: url('/backgrounds/playtalk-global-mobile.webp');
      --playtalk-global-bg-image: var(--playtalk-global-bg-desktop);
      --playtalk-global-bg-overlay: linear-gradient(to top, rgba(4, 18, 38, 1) 0%, rgba(4, 18, 38, 0.58) 38%, rgba(4, 18, 38, 0) 100%);
      --panel: transparent;
      --line: rgba(140, 197, 255, 0.18);
      --text: #f4f8ff;
      --muted: #c7daef;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --key-blue-1: #06183d;
      --key-blue-2: #03112e;
      --key-neon-blue: #61d4ff;
      --danger-1: #3f0712;
      --danger-2: #2b040c;
      --danger-neon: #ff5f7d;
      --green-1: #0d3b1f;
      --green-2: #072b16;
      --green-neon: #58f09d;
    }

    @media (max-width: 800px) {
      :root {
        --playtalk-global-bg-image: var(--playtalk-global-bg-mobile);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      background: transparent;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #041226 var(--playtalk-global-bg-image) center/cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--playtalk-global-bg-overlay);
    }

    .identity-page {
      min-height: 100vh;
      padding: 20px 14px 28px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .identity-card {
      width: min(100%, 430px);
      min-height: calc(100vh - 40px);
      padding: 22px 18px 28px;
      border-radius: 0 0 30px 30px;
      border: 1px solid transparent;
      background: var(--panel);
      box-shadow: none;
      backdrop-filter: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      color: #fff;
      font-family: "Pltay", "Trebuchet MS", sans-serif;
      font-size: clamp(32px, 6vw, 42px);
      letter-spacing: 0.02em;
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(97, 212, 255, 0.34);
    }

    .identity-name-display {
      min-height: 66px;
      width: min(100%, 360px);
      margin: 6px 0 24px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(4, 14, 28, 0.42);
      display: grid;
      place-items: center;
      padding: 8px 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      color: #fff;
      font-size: clamp(24px, 5.8vw, 32px);
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .identity-keyboard {
      display: grid;
      gap: 10px;
      width: min(100%, 392px);
    }

    .identity-keyboard-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .identity-key,
    .identity-action {
      border: 2px solid transparent;
      border-radius: 16px;
      color: #fff;
      font-size: 18px;
      font-family: "Pltay", "Trebuchet MS", sans-serif;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease, opacity 140ms ease;
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
    }

    .identity-key:hover,
    .identity-action:hover {
      filter: brightness(1.03);
    }

    .identity-key:active,
    .identity-action:active {
      transform: translateY(1px) scale(0.99);
    }

    .identity-key {
      width: 100%;
      aspect-ratio: 1 / 1;
      min-height: 0;
      background: linear-gradient(180deg, var(--key-blue-1), var(--key-blue-2));
      border-color: var(--key-neon-blue);
      box-shadow:
        0 0 10px rgba(97, 212, 255, 0.55),
        inset 0 0 14px rgba(97, 212, 255, 0.12);
    }

    .identity-actions-row {
      width: min(100%, 392px);
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 74px;
      gap: 10px;
    }

    .identity-space-btn {
      min-height: 62px;
      background: linear-gradient(180deg, var(--key-blue-1), var(--key-blue-2));
      border-color: var(--key-neon-blue);
      box-shadow:
        0 0 12px rgba(97, 212, 255, 0.58),
        inset 0 0 14px rgba(97, 212, 255, 0.14);
    }

    .identity-delete-btn {
      min-height: 62px;
      background: linear-gradient(180deg, var(--danger-1), var(--danger-2));
      border-color: var(--danger-neon);
      box-shadow:
        0 0 12px rgba(255, 95, 125, 0.58),
        inset 0 0 14px rgba(255, 95, 125, 0.16);
      font-size: 16px;
      letter-spacing: 0.01em;
    }

    .identity-continue {
      width: min(100%, 300px);
      min-height: 56px;
      margin-top: 36px;
      background: linear-gradient(180deg, var(--green-1), var(--green-2));
      border-color: var(--green-neon);
      box-shadow:
        0 0 13px rgba(88, 240, 157, 0.58),
        inset 0 0 16px rgba(88, 240, 157, 0.15);
    }

    .identity-action[disabled] {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .identity-status {
      min-height: 24px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .identity-status.is-error {
      color: #ffd1d1;
      font-weight: 700;
    }

    @media (max-width: 520px) {
      .identity-page { padding-inline: 10px; }
      .identity-card { padding-inline: 14px; }
      .identity-key, .identity-space-btn { min-height: 56px; }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>
  <main class="identity-page">
    <section class="identity-card" aria-label="Escolha um nome">
      <h1>Escolha um nome</h1>
      <div class="identity-name-display" id="nameDisplay">&nbsp;</div>
      <div class="identity-keyboard" id="nameKeyboard"></div>
      <div class="identity-actions-row">
        <button class="identity-action identity-space-btn" id="spaceBtn" type="button">Espaco</button>
        <button class="identity-action identity-delete-btn" id="deleteBtn" type="button">Apagar</button>
      </div>
      <button class="identity-action identity-continue" id="continueBtn" type="button">Avancar</button>
      <p class="identity-status" id="status" aria-live="polite"></p>
    </section>
  </main>
  <script src="js/android-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/android-shell.js"></script>
  <script>
    const ONBOARDING_USERNAME_AUDIO_PATH = window.PlaytalkApi && typeof window.PlaytalkApi.accesskeyUrl === 'function'
      ? window.PlaytalkApi.accesskeyUrl('username.mp3')
      : '/accesskey/username.mp3';
    const ONBOARDING_MIN_NAME_LENGTH = 3;
    const ONBOARDING_KEYBOARD_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUV'.split('');
    const state = { user: null, nameDraft: '', nameGateBusy: false, nameKeyboardVariantIndex: 0, nameKeyboardTimer: 0, identityAudio: null, audioRetryBound: false };
    const els = {
      nameDisplay: document.getElementById('nameDisplay'),
      nameKeyboard: document.getElementById('nameKeyboard'),
      spaceBtn: document.getElementById('spaceBtn'),
      deleteBtn: document.getElementById('deleteBtn'),
      continueBtn: document.getElementById('continueBtn'),
      status: document.getElementById('status')
    };

    function safeText(value) { return typeof value === 'string' ? value.trim() : ''; }
    function buildApiUrl(path) { return window.PlaytalkApi && typeof window.PlaytalkApi.url === 'function' ? window.PlaytalkApi.url(path) : path; }
    function buildAuthHeaders(extraHeaders) { return window.PlaytalkApi && typeof window.PlaytalkApi.authHeaders === 'function' ? window.PlaytalkApi.authHeaders(extraHeaders) : { ...(extraHeaders || {}) }; }
    function persistAuthToken(token) {
      if (window.PlaytalkApi && typeof window.PlaytalkApi.setAuthToken === 'function') {
        window.PlaytalkApi.setAuthToken(token || '');
        return;
      }
      try {
        if (token) {
          window.localStorage.setItem('playtalk_auth_token', token);
        } else {
          window.localStorage.removeItem('playtalk_auth_token');
        }
      } catch (_error) {}
    }
    function normalizeUser(user) {
      if (!user || typeof user !== 'object') return null;
      const id = Number(user.id) || 0;
      const username = safeText(user.username);
      if (!id || !username) return null;
      return { id, username, onboardingPhotoCompleted: Boolean(user.onboarding_photo_completed || user.onboardingPhotoCompleted) };
    }
    function getReturnPath() {
      const raw = safeText(new URLSearchParams(window.location.search).get('return'));
      return raw && raw.startsWith('/') ? raw : '/flashcards';
    }
    function navigateTo(target, options) {
      if (window.PlaytalkNative && typeof window.PlaytalkNative.navigate === 'function') {
        window.PlaytalkNative.navigate(target, options || {});
        return;
      }
      window.location.href = target;
    }
    function nextAfterUsername(user) {
      const returnPath = getReturnPath();
      return `/avataradd?return=${encodeURIComponent(returnPath)}`;
    }
    function setStatus(message, tone = '') {
      els.status.textContent = message || '';
      els.status.className = 'identity-status';
      if (tone) els.status.classList.add(`is-${tone}`);
    }
    function formatOnboardingName(value) { return safeText(value).slice(0, 24); }
    function renderName() {
      els.nameDisplay.textContent = formatOnboardingName(state.nameDraft) || '\u00A0';
      els.continueBtn.disabled = state.nameGateBusy || formatOnboardingName(state.nameDraft).length < ONBOARDING_MIN_NAME_LENGTH;
    }
    function renderKeyboard() {
      const letters = [...ONBOARDING_KEYBOARD_LETTERS, ['W', 'X'][state.nameKeyboardVariantIndex % 2], ['X', 'Z'][state.nameKeyboardVariantIndex % 2]];
      els.nameKeyboard.innerHTML = '';
      for (let rowIndex = 0; rowIndex < 4; rowIndex += 1) {
        const row = document.createElement('div');
        row.className = 'identity-keyboard-row';
        letters.slice(rowIndex * 6, rowIndex * 6 + 6).forEach((letter) => {
          const key = document.createElement('button');
          key.type = 'button';
          key.className = 'identity-key';
          key.textContent = letter;
          key.addEventListener('click', () => {
            if (state.nameGateBusy || state.nameDraft.length >= 24) return;
            state.nameDraft = `${state.nameDraft}${letter}`;
            setStatus('');
            renderName();
          });
          row.appendChild(key);
        });
        els.nameKeyboard.appendChild(row);
      }
    }
    function startKeyboardTicker() {
      stopKeyboardTicker();
      state.nameKeyboardTimer = window.setInterval(() => {
        state.nameKeyboardVariantIndex = (state.nameKeyboardVariantIndex + 1) % 2;
        renderKeyboard();
      }, 1200);
    }
    function stopKeyboardTicker() {
      if (!state.nameKeyboardTimer) return;
      window.clearInterval(state.nameKeyboardTimer);
      state.nameKeyboardTimer = 0;
    }
    function stopIdentityAudio() {
      if (!state.identityAudio) return;
      try {
        state.identityAudio.pause();
        state.identityAudio.currentTime = 0;
      } catch (_error) {}
      state.identityAudio = null;
    }
    function bindAudioRetry(src) {
      if (state.audioRetryBound) return;
      state.audioRetryBound = true;
      const retry = () => {
        playIdentityAudio(src, false);
        document.removeEventListener('pointerdown', retry);
        document.removeEventListener('keydown', retry);
        state.audioRetryBound = false;
      };
      document.addEventListener('pointerdown', retry, { once: true });
      document.addEventListener('keydown', retry, { once: true });
    }
    function playIdentityAudio(src, allowRetry = true) {
      if (!src) return;
      stopIdentityAudio();
      const audio = new Audio(src);
      audio.volume = 1;
      state.identityAudio = audio;
      audio.addEventListener('ended', () => { if (state.identityAudio === audio) state.identityAudio = null; }, { once: true });
      audio.addEventListener('error', () => { if (state.identityAudio === audio) state.identityAudio = null; }, { once: true });
      audio.play().catch(() => {
        if (state.identityAudio === audio) state.identityAudio = null;
        if (allowRetry) bindAudioRetry(src);
      });
    }
    async function getSessionUser() {
      if (window.PlaytalkApi && typeof window.PlaytalkApi.fetchSessionUser === 'function') {
        return normalizeUser(await window.PlaytalkApi.fetchSessionUser({
          attempts: 3,
          retryDelayMs: 450
        }));
      }
      const response = await fetch(buildApiUrl('/auth/session'), {
        cache: 'no-store',
        credentials: 'include',
        headers: buildAuthHeaders()
      });
      if (!response.ok) return null;
      const payload = await response.json().catch(() => ({}));
      return normalizeUser(payload?.user);
    }
    async function ensureProvisionedUser() {
      const sessionUser = await getSessionUser().catch(() => null);
      if (sessionUser?.id) {
        state.user = sessionUser;
        return sessionUser;
      }
      const response = await fetch(buildApiUrl('/auth/provision-temp'), {
        method: 'POST',
        credentials: 'include',
        headers: buildAuthHeaders({ 'Content-Type': 'application/json' })
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload?.success) throw new Error(payload?.message || 'Nao foi possivel preparar o usuario.');
      if (payload?.token) persistAuthToken(payload.token);
      const user = normalizeUser(payload.user);
      if (!user) throw new Error('Nao foi possivel preparar o perfil.');
      state.user = user;
      return user;
    }
    async function submitName() {
      const nextUsername = formatOnboardingName(state.nameDraft);
      if (nextUsername.length < ONBOARDING_MIN_NAME_LENGTH) {
        setStatus('Escolha um nome com pelo menos 3 caracteres.', 'error');
        return;
      }
      state.nameGateBusy = true;
      renderName();
      setStatus('Salvando nome...');
      try {
        const response = await fetch(buildApiUrl('/auth/profile'), {
          method: 'PATCH',
          credentials: 'include',
          headers: buildAuthHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ username: nextUsername })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload?.success) throw new Error(payload?.message || 'Nao foi possivel salvar o nome.');
        if (payload?.token) persistAuthToken(payload.token);
        const user = normalizeUser(payload.user);
        if (!user) throw new Error('Nao foi possivel atualizar o usuario.');
        state.user = user;
        navigateTo(nextAfterUsername(user));
      } catch (error) {
        setStatus(error?.message || 'Nao foi possivel salvar o nome.', 'error');
      } finally {
        state.nameGateBusy = false;
        renderName();
      }
    }
    async function init() {
      setStatus('Preparando perfil...');
      try {
        await ensureProvisionedUser();
        state.nameDraft = '';
        renderKeyboard();
        startKeyboardTicker();
        renderName();
        setStatus('');
        playIdentityAudio(ONBOARDING_USERNAME_AUDIO_PATH);
      } catch (error) {
        setStatus(error?.message || 'Nao foi possivel abrir a tela de nome.', 'error');
      }
    }
    els.spaceBtn.addEventListener('click', () => {
      if (state.nameGateBusy || !state.nameDraft || state.nameDraft.endsWith(' ') || state.nameDraft.length >= 24) return;
      state.nameDraft = `${state.nameDraft} `;
      setStatus('');
      renderName();
    });
    els.deleteBtn.addEventListener('click', () => {
      if (state.nameGateBusy || !state.nameDraft) return;
      state.nameDraft = state.nameDraft.slice(0, -1);
      setStatus('');
      renderName();
    });
    els.continueBtn.addEventListener('click', () => { void submitName(); });
    window.addEventListener('beforeunload', () => {
      stopKeyboardTicker();
      stopIdentityAudio();
    });
    void init();
  </script>
</body>
</html>
