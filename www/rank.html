<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Liga Playtalk</title>
  <style>
    @font-face {
      font-family: "Soopafre";
      src: url("soopafre.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg-1: #071321;
      --bg-2: #0d2643;
      --panel: rgba(10, 22, 38, 0.88);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f8fbff;
      --muted: #9fbed9;
      --gold: #ffd56d;
      --cyan: #74deff;
      --green: #74f1b3;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Soopafre", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(116, 222, 255, 0.16), transparent 32%),
        radial-gradient(circle at bottom left, rgba(116, 241, 179, 0.12), transparent 34%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      filter: blur(8px);
      pointer-events: none;
      animation: floatOrb 18s linear infinite;
    }

    body::before {
      top: 8%;
      right: 8%;
    }

    body::after {
      bottom: 10%;
      left: 6%;
      animation-duration: 24s;
    }

    .shell {
      width: min(1120px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 42px;
      position: relative;
      z-index: 1;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 24px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 64px);
      line-height: 0.94;
      letter-spacing: 0.03em;
    }

    .hero-copy {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      text-decoration: none;
      font: inherit;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .btn-primary {
      background: linear-gradient(135deg, #12a6ff 0%, #5ce6ff 100%);
      color: #042035;
      border-color: transparent;
    }

    .panel {
      overflow: hidden;
    }

    .board-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .board-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .board-head p,
    .board-meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .self-slot {
      padding: 18px 20px 0;
    }

    .leaderboard {
      display: grid;
      gap: 0;
      padding-bottom: 8px;
    }

    .leaderboard-empty {
      padding: 28px 20px 34px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 78px 98px minmax(0, 1fr) 180px;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      transition: background 160ms ease;
    }

    .leaderboard-row:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .leaderboard-row.is-me {
      background: linear-gradient(90deg, rgba(18, 166, 255, 0.16) 0%, rgba(92, 230, 255, 0.06) 100%);
    }

    .leaderboard-row.is-self {
      border-top: 0;
      border-radius: 22px;
      background: linear-gradient(90deg, rgba(255, 213, 109, 0.12) 0%, rgba(18, 166, 255, 0.08) 100%);
      margin-bottom: 12px;
    }

    .rank-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--gold);
      font-size: 24px;
    }

    .avatar-stack {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .avatar-box,
    .avatar-upload {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      text-transform: uppercase;
    }

    .avatar-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-upload {
      background: rgba(116, 241, 179, 0.12);
      color: var(--green);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .avatar-upload:hover {
      transform: translateY(-1px);
      border-color: rgba(116, 241, 179, 0.34);
      background: rgba(116, 241, 179, 0.18);
    }

    .player-line {
      display: grid;
      gap: 6px;
    }

    .player-line strong {
      font-size: 22px;
      letter-spacing: 0.03em;
    }

    .player-line span,
    .count-line,
    .updated-line {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .count-strong {
      color: #fff;
      font-size: 18px;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes floatOrb {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(160deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    @media (max-width: 920px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero-actions {
        justify-content: flex-start;
      }

      .leaderboard-row {
        grid-template-columns: 70px 86px minmax(0, 1fr);
      }

      .count-line {
        grid-column: 2 / -1;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100vw - 18px, 100%);
        padding-top: 18px;
      }

      .hero,
      .panel {
        border-radius: 22px;
      }

      .leaderboard-row {
        grid-template-columns: 64px 1fr;
      }

      .avatar-stack {
        grid-column: 2;
      }

      .count-line,
      .updated-line {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <h1>Liga Playtalk</h1>
        <p class="hero-copy" id="playerHeadline">Carregando sua posicao...</p>
      </div>
      <div class="hero-actions">
        <a class="btn" href="/flashcards">Ir para /flashcards</a>
        <button class="btn btn-primary" id="refreshBtn" type="button">Atualizar ranking</button>
      </div>
    </section>

    <section class="panel">
      <div class="board-head">
        <div>
          <h2>Ranking de flashcards</h2>
          <p>Os nomes aparecem conforme cada jogador entra em /flashcards e sincroniza seu total.</p>
        </div>
        <span class="board-meta" id="lastUpdated">Atualizando...</span>
      </div>

      <div class="self-slot" id="selfSlot"></div>

      <div class="leaderboard" id="leaderboard">
        <div class="leaderboard-empty">Carregando ranking...</div>
      </div>
    </section>

    <p class="footer-note">Clique no quadrado verde ao lado da sua foto para trocar seu avatar.</p>
  </main>

  <input id="avatarUploadInput" type="file" accept="image/*" hidden>

  <script src="js/apk-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/rank-page.js"></script>
</body>
</html>
