<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Liga PlayTalk</title>
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --line-strong: rgba(140, 197, 255, 0.24);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --accent: #7ed0ff;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(80, 170, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #081322 0%, #050b14 100%);
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 0;
    }

    .panel {
      width: 100%;
      padding: 30px 22px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .title {
      margin: 0 0 24px;
      text-align: center;
      font-family: "PlaytalkDisplay", Impact, sans-serif;
      font-size: clamp(42px, 9vw, 76px);
      letter-spacing: 0.1em;
      color: #ffffff;
      text-transform: uppercase;
    }

    .status {
      min-height: 24px;
      margin: 0 0 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .league-list {
      display: grid;
      gap: 10px;
    }

    .league-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .league-row.is-header {
      border-color: var(--line-strong);
      background: rgba(126, 208, 255, 0.08);
      color: #dff2ff;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .league-row.is-empty {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
      color: var(--muted);
    }

    .league-name,
    .league-count {
      min-width: 0;
    }

    .league-name {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .league-count {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .page {
        width: min(100vw - 16px, 100%);
        padding: 16px 0;
      }

      .panel {
        padding: 22px 14px 14px;
        border-radius: 24px;
      }

      .league-row {
        padding: 14px 12px;
      }

      .league-name,
      .league-count {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1 class="title">Liga PlayTalk</h1>
      <p class="status" id="rankStatus">Carregando usuarios...</p>
      <section class="league-list" id="leagueList" aria-live="polite"></section>
    </section>
  </main>

  <script src="js/rank-page.js"></script>
</body>
</html>
