<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Crie uma senha</title>
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Soopafre";
      src: url("/soopafre.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --text: #f4f8ff;
      --muted: #c7daef;
      --line: rgba(140, 197, 255, 0.18);
      --panel: transparent;
      --blue-1: #47bcff;
      --blue-2: #2b6ae8;
      --green-1: #2bc057;
      --green-2: #1fae4d;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      background: transparent;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: lightblue;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle, #3498db 10%, transparent 20%),
        radial-gradient(circle, transparent 10%, #3498db 20%);
      background-size: 30px 30px;
      animation: moveBackground 8s linear infinite;
    }

    @keyframes moveBackground {
      0% { transform: translate(0, 0); }
      100% { transform: translate(20%, 20%); }
    }

    .identity-page {
      min-height: 100vh;
      padding: 20px 14px 28px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .identity-card {
      width: min(100%, 430px);
      min-height: calc(100vh - 40px);
      padding: 22px 18px 28px;
      border-radius: 0 0 30px 30px;
      border: 1px solid transparent;
      background: var(--panel);
      box-shadow: none;
      backdrop-filter: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      color: #fff;
      font-family: "Soopafre", "Trebuchet MS", sans-serif;
      font-size: clamp(32px, 6vw, 42px);
      letter-spacing: 0.02em;
      line-height: 0.95;
      text-transform: none;
    }

    .identity-profile {
      display: grid;
      justify-items: center;
      gap: 10px;
      margin: 4px 0 18px;
      width: 100%;
    }

    .identity-avatar {
      width: 213px;
      height: 213px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255,255,255,0.14);
      box-shadow: 0 14px 28px rgba(20, 48, 118, 0.22);
      border: 1px solid rgba(255,255,255,0.18);
      display: grid;
      place-items: center;
    }

    .identity-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .identity-avatar-fallback {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-family: "Soopafre", "Trebuchet MS", sans-serif;
      font-size: 80px;
      line-height: 1;
    }

    .identity-name {
      color: #ffffff;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      word-break: break-word;
    }

    .password-field {
      width: min(100%, 360px);
      min-height: 66px;
      margin: 8px 0 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(4, 14, 28, 0.42);
      padding: 0 18px;
      color: #fff;
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 800;
      text-align: center;
      outline: none;
    }

    .password-field::placeholder {
      color: rgba(255,255,255,0.68);
    }

    .password-actions {
      width: min(100%, 360px);
      display: grid;
      gap: 12px;
    }

    .identity-action {
      min-height: 56px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 18px 36px rgba(20, 48, 118, 0.34);
      transition: transform 140ms ease, filter 140ms ease, opacity 140ms ease;
    }

    .identity-action:hover { filter: brightness(1.03); }
    .identity-action:active { transform: translateY(1px) scale(0.99); }
    .identity-action.is-primary { background: linear-gradient(180deg, var(--green-1), var(--green-2)); }
    .identity-action.is-secondary { background: linear-gradient(180deg, var(--blue-1), var(--blue-2)); }

    .identity-action[disabled] {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .identity-status {
      min-height: 24px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .identity-status.is-error {
      color: #ffd1d1;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>
  <main class="identity-page">
    <section class="identity-card" aria-label="Crie uma senha">
      <h1>Crie uma senha</h1>
      <div class="identity-profile" aria-label="Perfil">
        <div class="identity-avatar">
          <img id="avatarImage" src="" alt="Foto do usuario">
          <div class="identity-avatar-fallback" id="avatarFallback">P</div>
        </div>
        <div class="identity-name" id="usernameLabel">Usuario</div>
      </div>
      <input class="password-field" id="passwordInput" type="password" maxlength="64" placeholder="Minimo de 6 caracteres">
      <div class="password-actions">
        <button class="identity-action is-secondary" id="toggleBtn" type="button">Mostrar senha</button>
        <button class="identity-action is-primary" id="continueBtn" type="button">Entrar na plataforma</button>
      </div>
      <p class="identity-status" id="status" aria-live="polite"></p>
    </section>
  </main>
  <script src="js/android-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/android-shell.js"></script>
  <script>
    const state = { busy: false, showingPassword: false };
    const els = {
      avatarImage: document.getElementById('avatarImage'),
      avatarFallback: document.getElementById('avatarFallback'),
      usernameLabel: document.getElementById('usernameLabel'),
      passwordInput: document.getElementById('passwordInput'),
      toggleBtn: document.getElementById('toggleBtn'),
      continueBtn: document.getElementById('continueBtn'),
      status: document.getElementById('status')
    };

    function safeText(value) { return typeof value === 'string' ? value.trim() : ''; }
    function buildApiUrl(path) { return window.PlaytalkApi && typeof window.PlaytalkApi.url === 'function' ? window.PlaytalkApi.url(path) : path; }
    function buildAuthHeaders(extraHeaders) { return window.PlaytalkApi && typeof window.PlaytalkApi.authHeaders === 'function' ? window.PlaytalkApi.authHeaders(extraHeaders) : { ...(extraHeaders || {}) }; }
    function persistAuthToken(token) {
      if (window.PlaytalkApi && typeof window.PlaytalkApi.setAuthToken === 'function') {
        window.PlaytalkApi.setAuthToken(token || '');
        return;
      }
      try {
        if (token) {
          window.localStorage.setItem('playtalk_auth_token', token);
        } else {
          window.localStorage.removeItem('playtalk_auth_token');
        }
      } catch (_error) {}
    }
    function getReturnPath() {
      const raw = safeText(new URLSearchParams(window.location.search).get('return'));
      return raw && raw.startsWith('/') ? raw : '/flashcards';
    }
    function navigateTo(target, options) {
      if (window.PlaytalkNative && typeof window.PlaytalkNative.navigate === 'function') {
        window.PlaytalkNative.navigate(target, options || {});
        return;
      }
      window.location.href = target;
    }
    function setStatus(message, tone = '') {
      els.status.textContent = message || '';
      els.status.className = 'identity-status';
      if (tone) els.status.classList.add(`is-${tone}`);
    }
    function normalizeUser(user) {
      if (!user || typeof user !== 'object') return null;
      const id = Number(user.id) || 0;
      const username = safeText(user.username);
      if (!id || !username) return null;
      return {
        id,
        username,
        avatarImage: safeText(user.avatar_image || user.avatarImage)
      };
    }
    function renderProfile(user) {
      const username = safeText(user?.username) || 'Usuario';
      const avatar = safeText(user?.avatarImage);
      if (els.usernameLabel) els.usernameLabel.textContent = username;
      if (els.avatarImage) {
        els.avatarImage.src = avatar || '';
        els.avatarImage.style.display = avatar ? 'block' : 'none';
      }
      if (els.avatarFallback) {
        els.avatarFallback.textContent = username.charAt(0).toUpperCase() || 'P';
        els.avatarFallback.style.display = avatar ? 'none' : 'flex';
      }
    }
    async function fetchSessionUser() {
      const response = await fetch(buildApiUrl('/auth/session'), {
        cache: 'no-store',
        credentials: 'include',
        headers: buildAuthHeaders()
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload?.success) return null;
      return normalizeUser(payload.user);
    }
    function isValidPassword(password) {
      return typeof password === 'string' && password.trim().length >= 6;
    }
    function syncPasswordMode() {
      els.passwordInput.type = state.showingPassword ? 'text' : 'password';
      els.toggleBtn.textContent = state.showingPassword ? 'Ocultar senha' : 'Mostrar senha';
    }
    async function submitPassword() {
      const password = String(els.passwordInput.value || '');
      if (!isValidPassword(password)) {
        setStatus('Escolha uma senha com pelo menos 6 caracteres.', 'error');
        return;
      }
      state.busy = true;
      els.continueBtn.disabled = true;
      els.toggleBtn.disabled = true;
      setStatus('Salvando senha...');
      try {
        const response = await fetch(buildApiUrl('/auth/password'), {
          method: 'PATCH',
          credentials: 'include',
          headers: buildAuthHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ password })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload?.success) {
          throw new Error(payload?.message || 'Nao foi possivel salvar a senha.');
        }
        if (payload?.token) persistAuthToken(payload.token);
        navigateTo(getReturnPath());
      } catch (error) {
        setStatus(error?.message || 'Nao foi possivel salvar a senha.', 'error');
      } finally {
        state.busy = false;
        els.continueBtn.disabled = false;
        els.toggleBtn.disabled = false;
      }
    }

    els.toggleBtn.addEventListener('click', () => {
      state.showingPassword = !state.showingPassword;
      syncPasswordMode();
    });
    els.continueBtn.addEventListener('click', () => { void submitPassword(); });
    els.passwordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        void submitPassword();
      }
    });

    (async () => {
      const user = await fetchSessionUser().catch(() => null);
      renderProfile(user);
      syncPasswordMode();
    })();
  </script>
</body>
</html>
