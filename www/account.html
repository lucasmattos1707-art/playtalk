<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Conta</title>
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
      --footer-height: max(62px, 8vh);
      --footer-safe-bottom: env(safe-area-inset-bottom, 0px);
      --footer-total-height: calc(var(--footer-height) + var(--footer-safe-bottom));
    }

    * {
      box-sizing: border-box;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: lightblue;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle, #3498db 10%, transparent 20%),
        radial-gradient(circle, transparent 10%, #3498db 20%);
      background-size: 30px 30px;
      animation: moveBackground 8s linear infinite;
    }

    @keyframes moveBackground {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(20%, 20%);
      }
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      background: transparent;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 0 calc(var(--footer-total-height) + 20px);
    }

    .panel {
      padding: 26px 22px 22px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--line);
      background: rgba(9, 21, 38, 0.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .account-form {
      width: min(100%, 440px);
      margin: 0 auto;
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .account-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(180deg, #f9fafb 0%, #e5e7eb 100%);
      border: 6px solid #d1d5db;
      overflow: hidden;
      display: grid;
      place-items: center;
      cursor: pointer;
      position: relative;
    }

    .account-avatar img,
    .account-avatar span {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      object-fit: cover;
      font-size: 58px;
      font-weight: 800;
      color: #475569;
    }

    .account-field {
      width: 100%;
      display: grid;
      gap: 8px;
      color: #dbeafe;
      font-weight: 700;
    }

    .account-field input {
      width: 100%;
      min-height: 56px;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 0 16px;
      font-size: 18px;
    }

    .account-button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      font-size: 17px;
    }

    .account-button--primary {
      background: linear-gradient(180deg, #ffffff 0%, #dbeafe 100%);
      color: #10233d;
    }

    .account-button--secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .account-button--password {
      background: #12326b;
      color: #ffffff;
    }

    .account-status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      text-align: center;
    }

    .account-premium {
      width: 100%;
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .account-premium strong {
      font-size: 18px;
      color: #ffffff;
    }

    .account-premium span {
      color: #d8e6ff;
    }

    .account-button--premium {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #6d28d9 0%, #a855f7 55%, #7c3aed 100%);
      color: #ffffff;
      box-shadow: 0 18px 40px rgba(124, 58, 237, 0.28);
    }

    .account-button__crown {
      font-size: 20px;
      line-height: 1;
    }

    .account-status.is-success {
      color: #4ade80;
    }

    .account-status.is-error {
      color: #f87171;
    }

    .flashcards-footer-nav {
      position: fixed !important;
      left: 0;
      right: 0;
      bottom: 0;
      bottom: var(--footer-safe-bottom);
      height: var(--footer-height);
      background: #157efb;
      display: grid !important;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100vw - 16px);
        padding-top: 0;
      }

      .panel {
        padding: 22px 14px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>
  <main class="page">
    <section class="panel">
      <form class="account-form" id="accountForm">
        <label class="account-avatar" for="accountAvatarInput">
          <img id="accountAvatarPreview" src="Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do usuario">
          <span id="accountAvatarFallback">P</span>
          <input id="accountAvatarInput" type="file" accept="image/png,image/jpeg,image/webp" hidden>
        </label>
        <label class="account-field">
          <span>Nome do usuario</span>
          <input id="accountNameInput" type="text" maxlength="32" placeholder="Seu nome">
        </label>
        <label class="account-field" id="accountPasswordField" hidden>
          <span>Senha</span>
          <input id="accountPasswordInput" type="password" maxlength="64" placeholder="Defina uma senha">
        </label>
        <button class="account-button account-button--password" id="accountPasswordBtn" type="button" hidden>Trocar senha</button>
        <div class="account-premium">
          <strong id="accountPremiumLevel">Nivel de acesso: Free</strong>
          <span id="accountPremiumUntil">Sem premium ativo no momento.</span>
        </div>
        <button class="account-button account-button--premium" id="accountPremiumBtn" type="button">
          <span class="account-button__crown" id="accountPremiumIcon" aria-hidden="true">👑</span>
          <span id="accountPremiumLabel">Comprar premium!</span>
        </button>
        <button class="account-button account-button--secondary" id="accountLogoutBtn" type="button">Sair da conta</button>
        <p class="account-status" id="accountStatus" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.36a1 1 0 0 0 0-1.72l-10-6.36A1 1 0 0 0 8 5.14Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/allcards" aria-label="Flashcards">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.6 2.5c.33 2.34 2.12 3.25 3.48 4.86 1.34 1.59 2 3.22 2 5.35 0 4.3-2.96 8.79-7.58 8.79-3.36 0-5.58-2.4-5.58-5.34 0-2.21 1.12-3.85 2.97-5.78 1.38-1.44 2.94-3.14 4.71-7.88Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item" href="/users" aria-label="Usuarios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v2h2a2 2 0 0 1 2 2c0 3.32-2.47 6-5.57 6.4A5.99 5.99 0 0 1 13 17.83V20h4v2H7v-2h4v-2.17A5.99 5.99 0 0 1 8.57 13.4C5.47 13 3 10.32 3 7a2 2 0 0 1 2-2h2V3Zm-2 4c0 2.1 1.45 3.82 3.4 4.28A6 6 0 0 1 7 7V7H5Zm14 0h-2a6 6 0 0 1-1.4 4.28C17.55 10.82 19 9.1 19 7Z"/></svg>
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/account" aria-label="Perfil">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
    </a>
  </nav>

  <script src="js/api-config.js"></script>
  <script src="js/account-page.js"></script>
</body>
</html>
