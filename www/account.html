<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Conta</title>
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
      --footer-height: max(62px, 8vh);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(80, 170, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #081322 0%, #050b14 100%);
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 0 calc(var(--footer-height) + 20px);
    }

    .panel-head {
      padding: 26px 22px 18px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--line);
      border-bottom: 0;
      background: rgba(7, 18, 34, 0.96);
    }

    .title {
      margin: 0;
      text-align: center;
      font-family: "PlaytalkDisplay", Impact, sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.1em;
      color: #ffffff;
      text-transform: uppercase;
    }

    .panel {
      padding: 26px 22px 22px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--line);
      border-top: 0;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .account-form {
      width: min(100%, 440px);
      margin: 0 auto;
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .account-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(180deg, #f9fafb 0%, #e5e7eb 100%);
      border: 6px solid #d1d5db;
      overflow: hidden;
      display: grid;
      place-items: center;
      cursor: pointer;
      position: relative;
    }

    .account-avatar img,
    .account-avatar span {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      object-fit: cover;
      font-size: 58px;
      font-weight: 800;
      color: #475569;
    }

    .account-field {
      width: 100%;
      display: grid;
      gap: 8px;
      color: #dbeafe;
      font-weight: 700;
    }

    .account-field input {
      width: 100%;
      min-height: 56px;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 0 16px;
      font-size: 18px;
    }

    .account-button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      font-size: 17px;
    }

    .account-button--primary {
      background: linear-gradient(180deg, #ffffff 0%, #dbeafe 100%);
      color: #10233d;
    }

    .account-button--secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .account-status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      text-align: center;
    }

    .account-status.is-success {
      color: #4ade80;
    }

    .account-status.is-error {
      color: #f87171;
    }

    .flashcards-footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #157efb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: stretch;
      z-index: 40;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item img {
      width: 28px;
      height: 28px;
      display: block;
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100vw - 16px);
        padding-top: 0;
      }

      .panel-head {
        padding: 22px 14px 16px;
      }

      .panel {
        padding: 22px 14px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel-head">
      <h1 class="title">Conta</h1>
    </section>
    <section class="panel">
      <form class="account-form" id="accountForm">
        <label class="account-avatar" for="accountAvatarInput">
          <img id="accountAvatarPreview" src="Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do usuario">
          <span id="accountAvatarFallback">P</span>
          <input id="accountAvatarInput" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" hidden>
        </label>
        <label class="account-field">
          <span>Nome do usuario</span>
          <input id="accountNameInput" type="text" maxlength="32" placeholder="Seu nome">
        </label>
        <button class="account-button account-button--primary" id="accountSaveBtn" type="submit">Salvar perfil</button>
        <button class="account-button account-button--secondary" id="accountLogoutBtn" type="button">Sair da conta</button>
        <p class="account-status" id="accountStatus" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <nav class="flashcards-footer-nav" aria-label="Navegacao do flashcards">
    <a class="flashcards-footer-nav__item" href="/flashcards?view=play" aria-label="Jogar">
      <img src="svgnovo/play.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item" href="/flashcards?view=cards" aria-label="Flashcards">
      <img src="svgnovo/cards.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item" href="/users" aria-label="Usuarios">
      <img src="svgnovo/cup.svg" alt="">
    </a>
    <a class="flashcards-footer-nav__item is-active" href="/account" aria-label="Perfil">
      <img src="svgnovo/profile.svg" alt="">
    </a>
  </nav>

  <script src="js/apk-config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/account-page.js"></script>
</body>
</html>
