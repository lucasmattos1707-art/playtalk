<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluent LevelUp | Conta</title>
  <link rel="stylesheet" href="css/playtalk-shell.css">
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --playtalk-global-bg-desktop: url('/backgrounds/playtalk-global-desktop.webp');
      --playtalk-global-bg-mobile: url('/backgrounds/playtalk-global-mobile.webp');
      --playtalk-global-bg-image: var(--playtalk-global-bg-desktop);
      --playtalk-global-bg-overlay: linear-gradient(to top, rgba(4, 18, 38, 0.78) 0%, rgba(4, 18, 38, 0.34) 42%, rgba(4, 18, 38, 0.04) 100%);
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
      --native-top-offset: 0px;
      --footer-height: max(62px, 8vh);
      --footer-safe-bottom: env(safe-area-inset-bottom, 0px);
      --footer-total-height: calc(var(--footer-height) + var(--footer-safe-bottom));
    }

    * {
      box-sizing: border-box;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #041226 var(--playtalk-global-bg-image) center/cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--playtalk-global-bg-overlay);
    }

    @keyframes moveBackground {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(20%, 20%);
      }
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      overflow-x: hidden;
      background: transparent;
    }

    body.account-page--booting .account-form {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    body.is-native-runtime {
      --native-top-offset: 50px;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      max-width: 100%;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(var(--native-top-offset) + 8vh) 0 calc(var(--footer-total-height) + 20px);
      overflow-x: clip;
    }

    .panel {
      padding: 18px 10px 16px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid transparent;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .panel.is-guest {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .account-form {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      margin: 0 auto;
      display: grid;
      justify-items: center;
      gap: 18px;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .account-profile {
      width: min(100%, 440px);
      max-width: 100%;
      min-width: 0;
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .panel.is-guest .account-profile {
      transform: translateY(0);
      margin-bottom: 0;
      padding-top: 30px;
      gap: 10px;
    }

    .panel:not(.is-guest) .account-profile {
      gap: 0;
    }

    .account-avatar {
      width: 188px;
      height: 188px;
      border-radius: 50%;
      background: transparent;
      border: 0;
      overflow: visible;
      display: grid;
      place-items: center;
      cursor: pointer;
      position: relative;
      isolation: isolate;
      box-shadow: none;
      transition: transform 260ms ease;
    }

    .account-avatar::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(18, 20, 24, 0.14) 0%, rgba(16, 18, 22, 0.58) 54%, rgba(9, 10, 12, 0.94) 100%),
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.08), rgba(16, 18, 22, 0) 44%),
        linear-gradient(180deg, rgba(22, 24, 28, 0.92) 0%, rgba(8, 9, 11, 0.98) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .account-avatar__aura {
      position: absolute;
      inset: -28px;
      overflow: visible;
      pointer-events: none;
      z-index: 3;
    }

    .account-avatar.is-message {
      width: 100%;
      height: auto;
      min-height: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      cursor: default;
      padding: 8px 0;
      box-shadow: none;
      isolation: auto;
    }

    .account-avatar.is-message::before,
    .account-avatar.is-message .account-avatar__aura {
      display: none;
    }

    .account-avatar__aura svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      display: block;
    }

    .account-avatar__track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 12;
    }

    .account-avatar__arc {
      fill: none;
      stroke-width: 13;
      stroke-linecap: round;
      opacity: 0;
      transition: stroke 180ms ease, opacity 180ms ease, filter 180ms ease;
    }

    .account-avatar img,
    .account-avatar > span:not(.account-avatar__aura) {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      object-fit: cover;
      border-radius: inherit;
      clip-path: circle(50% at 50% 50%);
      font-size: 58px;
      font-weight: 800;
      color: #475569;
      position: relative;
      z-index: 1;
    }

    .account-avatar > span:not(.account-avatar__aura) {
      background: transparent;
    }

    #accountAvatarPreview,
    #accountAvatarFallback {
      width: 106%;
      height: 106%;
      transform: translateY(10px);
      transform-origin: center bottom;
    }

    .account-avatar.is-message > span:not(.account-avatar__aura) {
      height: auto;
      color: #ffffff;
      font-size: 32px;
      line-height: 1.1;
      text-align: center;
      white-space: pre-line;
    }

    .account-field {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: grid;
      gap: 8px;
      color: #dbeafe;
      font-weight: 700;
    }

    .account-field[hidden] {
      display: none !important;
    }

    .account-field input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 56px;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 0 16px;
      font-size: 18px;
    }

    .account-name-inline {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: grid;
      justify-items: center;
      gap: 10px;
      min-height: 28px;
    }

    .panel:not(.is-guest) .account-name-inline {
      display: none;
    }

    .account-name-prompt {
      display: none;
      width: 100%;
      min-height: 58px;
      padding: 0 18px;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(4, 42, 72, 0.96) 0%, rgba(7, 31, 78, 0.98) 100%);
      color: #dffcff;
      border: 1.5px solid rgba(112, 239, 255, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(194, 248, 255, 0.12),
        0 0 16px rgba(86, 225, 255, 0.42),
        0 0 34px rgba(36, 112, 255, 0.22);
      text-shadow: 0 0 14px rgba(114, 239, 255, 0.22);
    }

    .account-name-prompt-icon {
      width: 22px;
      height: 22px;
      display: inline-flex;
      color: #8cecff;
      filter:
        drop-shadow(0 0 8px rgba(140, 236, 255, 0.72))
        drop-shadow(0 0 18px rgba(65, 176, 255, 0.34));
    }

    .account-name-prompt-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .account-name-prompt-label {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .account-name-input {
      width: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      outline: none;
      background: transparent;
      color: #ffffff;
      text-align: center;
      font-size: 21px;
      font-weight: 800;
      line-height: 1.2;
      caret-color: #ffffff;
      transition: opacity 220ms ease;
      cursor: text;
    }

    .account-name-input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .panel.is-guest .account-name-prompt {
      display: inline-flex;
      width: auto;
      min-height: 0;
      padding: 0;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .panel.is-guest .account-name-inline {
      position: relative;
      width: min(85%, 336px);
      min-height: 58px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1.5px solid rgba(112, 239, 255, 0.95);
      background: linear-gradient(180deg, rgba(4, 42, 72, 0.96) 0%, rgba(7, 31, 78, 0.98) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(194, 248, 255, 0.12),
        0 0 16px rgba(86, 225, 255, 0.42),
        0 0 34px rgba(36, 112, 255, 0.22);
      text-shadow: 0 0 14px rgba(114, 239, 255, 0.22);
      cursor: text;
    }

    .panel.is-guest #accountPasswordField,
    .panel.is-guest .account-button--primary,
    .panel.is-guest .account-button--premium {
      margin-top: 0;
    }

    .panel.is-guest .account-name-inline,
    .panel.is-guest #accountPasswordField,
    .panel.is-guest .account-button--primary,
    .panel.is-guest .account-button--premium {
      margin-top: 0;
    }

    .panel.is-guest #accountPasswordField,
    .panel.is-guest .account-button--primary,
    .panel.is-guest .account-button--premium {
      width: min(85%, 336px);
    }

    .panel.is-guest .account-avatar {
      width: min(483px, 89vw);
      height: auto;
      min-height: 0;
      aspect-ratio: auto;
      margin-bottom: 4px;
    }

    .panel.is-guest .account-avatar::before,
    .panel.is-guest .account-avatar__aura,
    .panel.is-guest #accountAvatarFallback {
      display: none !important;
    }

    .panel.is-guest #accountAvatarPreview {
      width: 100%;
      height: auto;
      transform: none;
      clip-path: none;
      border-radius: 0;
      object-fit: contain;
    }

    .panel.is-guest .account-name-inline.is-active {
      box-shadow:
        inset 0 0 0 1px rgba(194, 248, 255, 0.18),
        0 0 18px rgba(125, 235, 255, 0.62),
        0 0 40px rgba(36, 112, 255, 0.34);
    }

    .panel.is-guest .account-name-input {
      position: absolute;
      inset: 0;
      width: 100%;
      min-height: 58px;
      padding: 0 18px;
      border-radius: 999px;
      border: 0;
      background: transparent;
      color: #e9feff;
      font-family: "TheBoldFont", "Soopafre", Arial, sans-serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.01em;
      box-shadow: none;
      caret-color: #ffffff;
      opacity: 0;
      pointer-events: none;
    }

    .panel.is-guest .account-name-input::placeholder {
      color: transparent;
    }

    .panel.is-guest .account-name-inline.is-typing .account-name-input,
    .panel.is-guest .account-name-inline.has-value .account-name-input {
      opacity: 1;
      pointer-events: auto;
    }

    .panel.is-guest .account-name-inline.is-typing .account-name-prompt,
    .panel.is-guest .account-name-inline.has-value .account-name-prompt {
      opacity: 0;
    }

    .account-name-input[readonly] {
      user-select: none;
    }

    .account-name-inline.is-editing .account-name-input {
      opacity: 0.5;
    }

    .account-button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      font-size: 17px;
    }

    .account-button--primary {
      background: linear-gradient(180deg, #ffffff 0%, #dbeafe 100%);
      color: #10233d;
    }

    .panel.is-guest .account-button--primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(6, 54, 24, 0.98) 0%, rgba(5, 36, 18, 0.98) 100%);
      color: #e9ffe9;
      border: 1.5px solid rgba(104, 255, 160, 0.92);
      box-shadow:
        inset 0 0 0 1px rgba(194, 255, 207, 0.1),
        0 0 16px rgba(74, 255, 136, 0.36),
        0 0 34px rgba(30, 178, 94, 0.24);
      font-family: "TheBoldFont", "Soopafre", Arial, sans-serif;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 0 12px rgba(114, 255, 163, 0.16);
    }

    .account-button--secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .account-button--password {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(5, 26, 58, 0.98) 0%, rgba(7, 33, 74, 0.98) 100%);
      color: #e8f9ff;
      border: 1.5px solid rgba(114, 239, 255, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(189, 247, 255, 0.12),
        0 0 16px rgba(86, 225, 255, 0.42),
        0 0 34px rgba(36, 112, 255, 0.22);
      text-shadow: 0 0 14px rgba(114, 239, 255, 0.22);
    }

    .account-status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      text-align: center;
      display: none !important;
    }

    .account-premium {
      width: min(90%, 420px);
      max-width: 100%;
      display: grid;
      gap: 12px;
      margin: 10px auto 0;
      padding: 16px 16px 14px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(24, 10, 42, 0.92), rgba(15, 8, 30, 0.96));
      border: 1.5px solid rgba(214, 137, 255, 0.48);
      box-shadow:
        inset 0 0 0 1px rgba(255, 224, 255, 0.06),
        0 0 18px rgba(198, 88, 255, 0.18),
        0 0 42px rgba(124, 58, 237, 0.14);
      text-align: center;
    }

    .account-premium strong {
      font-size: 18px;
      color: #ffffff;
    }

    .account-premium span {
      color: #d8e6ff;
    }

    .account-premium-action {
      display: flex;
      justify-content: center;
    }

    .account-premium-action-row {
      width: min(90%, 420px);
      margin: 10px auto 0;
      display: grid;
    }

    .account-premium-action-row[hidden] {
      display: none !important;
    }

    .account-premium[hidden] {
      display: none !important;
    }

    .account-metrics {
      width: min(980px, 100%);
      max-width: 100%;
      margin: 0 auto;
      padding: 2px 8px 28px;
      display: grid;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: visible;
    }

    .account-metrics[hidden] {
      display: none !important;
    }

    .account-stats-carousel {
      width: 100%;
      overflow: visible;
      position: relative;
    }

    .account-stats-pages {
      display: grid;
      width: 100%;
      position: relative;
      min-height: clamp(236px, 46vw, 340px);
      overflow: visible;
    }

    .account-stats-page {
      width: 100%;
      max-width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      align-items: start;
      justify-items: center;
      padding: 8px 0 16px;
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 320ms ease;
    }

    .account-stats-page.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .account-stats-page[data-layout="two"] {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .account-stats-item {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 8px;
      text-align: center;
      padding: 0 2px;
    }

    .account-stats-icon-shell {
      width: min(142px, 28vw);
      height: min(142px, 28vw);
      display: grid;
      place-items: center;
      justify-self: center;
      border-radius: 50%;
      background: transparent;
      border: 0 !important;
      box-shadow: none;
      opacity: 1;
    }

    .account-stats-icon {
      width: 78%;
      height: 78%;
      color: #8cecff;
      filter:
        drop-shadow(0 0 10px rgba(107, 230, 255, 0.95))
        drop-shadow(0 0 24px rgba(107, 230, 255, 0.52))
        drop-shadow(0 0 44px rgba(77, 132, 255, 0.34));
      transition: opacity 160ms ease;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .account-stats-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .account-stats-item[data-kind="speaking"] .account-stats-icon {
      color: #ffd667;
      filter:
        drop-shadow(0 0 10px rgba(255, 214, 103, 0.92))
        drop-shadow(0 0 24px rgba(255, 184, 36, 0.5))
        drop-shadow(0 0 42px rgba(255, 140, 32, 0.28));
    }

    .account-stats-item[data-kind="precision-general"] .account-stats-icon {
      color: #b84dff;
      filter:
        drop-shadow(0 0 10px rgba(184, 77, 255, 0.96))
        drop-shadow(0 0 24px rgba(157, 108, 255, 0.54))
        drop-shadow(0 0 42px rgba(108, 92, 255, 0.28));
    }

    .account-stats-item[data-kind="reading"] .account-stats-icon {
      color: #5affd6;
      filter:
        drop-shadow(0 0 10px rgba(90, 255, 214, 0.96))
        drop-shadow(0 0 24px rgba(45, 255, 190, 0.54))
        drop-shadow(0 0 42px rgba(66, 204, 255, 0.28));
    }

    .account-stats-item[data-kind="consistency"] .account-stats-icon,
    .account-stats-item[data-kind="days"] .account-stats-icon {
      color: #c78bff;
      filter:
        drop-shadow(0 0 10px rgba(201, 139, 255, 0.92))
        drop-shadow(0 0 24px rgba(157, 108, 255, 0.48))
        drop-shadow(0 0 42px rgba(108, 92, 255, 0.24));
    }

    .account-stats-item[data-kind="flashcards"] .account-stats-icon,
    .account-stats-item[data-kind="books"] .account-stats-icon {
      color: #93f0ff;
    }

    .account-logout-wrap {
      width: min(90%, 420px);
      margin: 4px auto 0;
      display: grid;
    }

    .account-logout-wrap[hidden] {
      display: none !important;
    }

    .account-button--logout {
      min-height: 48px;
      background: linear-gradient(180deg, rgba(5, 30, 55, 0.9), rgba(5, 19, 39, 0.94));
      color: #e8f9ff;
      border: 1.5px solid rgba(114, 239, 255, 0.48);
      box-shadow:
        inset 0 0 0 1px rgba(189, 247, 255, 0.08),
        0 0 16px rgba(86, 225, 255, 0.2);
    }

    .account-stats-label {
      margin: 0;
      min-height: 1.05em;
      color: rgba(225, 251, 255, 0.96);
      font-size: clamp(18px, 3.8vw, 28px);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
      text-shadow:
        0 0 16px rgba(95, 221, 255, 0.38),
        0 0 30px rgba(62, 141, 255, 0.22);
    }

    .account-stats-value {
      margin: 0;
      min-height: 1.12em;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: clamp(34px, 8vw, 64px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      text-align: center;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.28),
        0 0 32px rgba(106, 215, 255, 0.18);
      word-break: break-word;
    }

    .account-decimal-value {
      display: inline-flex;
      align-items: flex-start;
      justify-content: center;
      line-height: 1;
      white-space: nowrap;
    }

    .account-decimal-value__main {
      display: inline-block;
    }

    .account-decimal-value__fraction {
      display: inline-block;
      font-size: 0.88em;
      line-height: 1.08;
      padding-top: 0.12em;
    }

    .account-decimal-value__suffix {
      display: inline-block;
      font-size: 0.5em;
      line-height: 1;
      padding-top: 0.2em;
      margin-left: 0.12em;
    }

    @media (max-width: 760px) {
      .account-metrics {
        padding-bottom: 34px;
      }

      .account-stats-pages {
        min-height: clamp(250px, 58vw, 372px);
      }

      .account-stats-page {
        gap: 4px;
      }

      .account-stats-page[data-layout="two"] {
        gap: 6px;
      }

      .account-stats-icon-shell {
        width: min(110px, 28vw);
        height: min(110px, 28vw);
      }

      .account-stats-label {
        font-size: clamp(15px, 4.2vw, 20px);
      }

      .account-stats-value {
        font-size: clamp(28px, 7vw, 42px);
      }
    }

    .account-button--premium {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #40106f 0%, #6b21c8 48%, #9333ea 100%);
      color: #ffffff;
      border: 1.5px solid rgba(229, 166, 255, 0.98);
      box-shadow:
