<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayTalk | Conta</title>
  <link rel="stylesheet" href="css/playtalk-shell.css">
  <style>
    @font-face {
      font-family: "PlaytalkDisplay";
      src: url("/THEBOLDFONT-FREEVERSION.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --playtalk-global-bg-desktop: url('/backgrounds/playtalk-global-desktop.webp');
      --playtalk-global-bg-mobile: url('/backgrounds/playtalk-global-mobile.webp');
      --playtalk-global-bg-image: var(--playtalk-global-bg-desktop);
      --playtalk-global-bg-overlay: linear-gradient(to top, rgba(4, 18, 38, 1) 0%, rgba(4, 18, 38, 0.58) 38%, rgba(4, 18, 38, 0) 100%);
      --panel: rgba(9, 21, 38, 0.92);
      --line: rgba(140, 197, 255, 0.14);
      --text: #f4f8ff;
      --muted: #a5bdd8;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --radius: 30px;
      --native-top-offset: 0px;
      --footer-height: max(62px, 8vh);
      --footer-safe-bottom: env(safe-area-inset-bottom, 0px);
      --footer-total-height: calc(var(--footer-height) + var(--footer-safe-bottom));
    }

    @media (max-width: 800px) {
      :root {
        --playtalk-global-bg-image: var(--playtalk-global-bg-mobile);
      }
    }

    * {
      box-sizing: border-box;
    }

    .container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #041226 var(--playtalk-global-bg-image) center/cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--playtalk-global-bg-overlay);
    }

    @keyframes moveBackground {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(20%, 20%);
      }
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      overflow: auto;
      background: transparent;
    }

    body.is-native-runtime {
      --native-top-offset: 50px;
    }

    body > *:not(.container) {
      position: relative;
      z-index: 1;
    }

    .page {
      width: min(900px, calc(100vw - 28px));
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(var(--native-top-offset) + 8vh) 0 calc(var(--footer-total-height) + 20px);
    }

    .panel {
      padding: 18px 10px 16px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid transparent;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .panel.is-guest {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .account-form {
      width: 100%;
      margin: 0 auto;
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .account-profile {
      width: min(100%, 440px);
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .account-avatar {
      width: 188px;
      height: 188px;
      border-radius: 50%;
      background: transparent;
      border: 0;
      overflow: visible;
      display: grid;
      place-items: center;
      cursor: pointer;
      position: relative;
      isolation: isolate;
    }

    .account-avatar::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(6, 20, 44, 0) 0%, rgba(6, 20, 44, 0.08) 28%, rgba(5, 22, 50, 0.5) 56%, rgba(4, 24, 55, 0.92) 82%, rgba(4, 24, 55, 1) 100%),
        radial-gradient(circle at 50% 22%, rgba(64, 194, 255, 0.2), rgba(6, 20, 44, 0) 52%),
        linear-gradient(180deg, rgba(9, 22, 44, 0.82) 0%, rgba(4, 24, 55, 0.96) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .account-avatar::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: inherit;
      border: 2px solid rgba(129, 225, 255, 1);
      pointer-events: none;
      z-index: 3;
      opacity: 1;
      box-shadow:
        0 0 0 2px rgba(36, 112, 255, 0.52),
        0 0 20px rgba(68, 206, 255, 1),
        0 0 42px rgba(68, 206, 255, 0.92),
        0 0 72px rgba(32, 102, 255, 0.7),
        0 0 110px rgba(32, 102, 255, 0.48);
    }

    .account-avatar.is-message {
      width: 100%;
      height: auto;
      min-height: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      cursor: default;
      padding: 8px 0;
      box-shadow: none;
      isolation: auto;
    }

    .account-avatar.is-message::before,
    .account-avatar.is-message::after {
      display: none;
    }

    .account-avatar img,
    .account-avatar span {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      object-fit: cover;
      border-radius: inherit;
      clip-path: circle(50% at 50% 50%);
      font-size: 58px;
      font-weight: 800;
      color: #475569;
      position: relative;
      z-index: 1;
    }

    .account-avatar span {
      background: transparent;
    }

    .account-avatar.is-message span {
      height: auto;
      color: #ffffff;
      font-size: 32px;
      line-height: 1.1;
      text-align: center;
    }

    .account-field {
      width: 100%;
      display: grid;
      gap: 8px;
      color: #dbeafe;
      font-weight: 700;
    }

    .account-field[hidden] {
      display: none !important;
    }

    .account-field input {
      width: 100%;
      min-height: 56px;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 0 16px;
      font-size: 18px;
    }

    .account-name-inline {
      width: 100%;
      display: grid;
      justify-items: center;
      gap: 10px;
      min-height: 28px;
    }

    .account-name-prompt {
      display: none;
      width: 100%;
      min-height: 58px;
      padding: 0 18px;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(4, 42, 72, 0.96) 0%, rgba(7, 31, 78, 0.98) 100%);
      color: #dffcff;
      border: 1.5px solid rgba(112, 239, 255, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(194, 248, 255, 0.12),
        0 0 16px rgba(86, 225, 255, 0.42),
        0 0 34px rgba(36, 112, 255, 0.22);
      text-shadow: 0 0 14px rgba(114, 239, 255, 0.22);
    }

    .account-name-prompt-icon {
      width: 22px;
      height: 22px;
      display: inline-flex;
      color: #8cecff;
      filter:
        drop-shadow(0 0 8px rgba(140, 236, 255, 0.72))
        drop-shadow(0 0 18px rgba(65, 176, 255, 0.34));
    }

    .account-name-prompt-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .account-name-prompt-label {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .account-name-input {
      width: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      outline: none;
      background: transparent;
      color: #ffffff;
      text-align: center;
      font-size: 21px;
      font-weight: 800;
      line-height: 1.2;
      caret-color: #ffffff;
      transition: opacity 220ms ease;
      cursor: text;
    }

    .account-name-input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .panel.is-guest .account-name-prompt {
      display: inline-flex;
    }

    .panel.is-guest .account-name-input {
      border-radius: 999px;
      border: 1.5px solid rgba(112, 239, 255, 0.28);
      background: rgba(11, 34, 65, 0.72);
      color: #e9feff;
      font-family: "TheBoldFont", "Soopafre", Arial, sans-serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.01em;
      box-shadow:
        inset 0 0 0 1px rgba(194, 248, 255, 0.08),
        0 0 14px rgba(86, 225, 255, 0.18);
      caret-color: #9bf7ff;
    }

    .panel.is-guest .account-name-input::placeholder {
      color: rgba(233, 254, 255, 0.58);
    }

    .account-name-input[readonly] {
      user-select: none;
    }

    .account-name-inline.is-editing .account-name-input {
      opacity: 0.5;
    }

    .account-button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      font-size: 17px;
    }

    .account-button--primary {
      background: linear-gradient(180deg, #ffffff 0%, #dbeafe 100%);
      color: #10233d;
    }

    .panel.is-guest .account-button--primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(6, 54, 24, 0.98) 0%, rgba(5, 36, 18, 0.98) 100%);
      color: #e9ffe9;
      border: 1.5px solid rgba(104, 255, 160, 0.92);
      box-shadow:
        inset 0 0 0 1px rgba(194, 255, 207, 0.1),
        0 0 16px rgba(74, 255, 136, 0.36),
        0 0 34px rgba(30, 178, 94, 0.24);
      font-family: "TheBoldFont", "Soopafre", Arial, sans-serif;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 0 12px rgba(114, 255, 163, 0.16);
    }

    .account-button--secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .account-button--password {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(5, 26, 58, 0.98) 0%, rgba(7, 33, 74, 0.98) 100%);
      color: #e8f9ff;
      border: 1.5px solid rgba(114, 239, 255, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(189, 247, 255, 0.12),
        0 0 16px rgba(86, 225, 255, 0.42),
        0 0 34px rgba(36, 112, 255, 0.22);
      text-shadow: 0 0 14px rgba(114, 239, 255, 0.22);
    }

    .account-status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      text-align: center;
    }

    .account-premium {
      width: 100%;
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .account-premium strong {
      font-size: 18px;
      color: #ffffff;
    }

    .account-premium span {
      color: #d8e6ff;
    }

    .account-premium[hidden] {
      display: none !important;
    }

    .account-metrics {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding: 0 4px 10px;
      display: block;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .account-metrics[hidden] {
      display: none !important;
    }

    .account-stats-card {
      width: 100%;
      min-height: 0;
      padding: 12px 8px 10px;
      border-radius: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      contain: layout paint;
      isolation: isolate;
      display: grid;
      justify-items: stretch;
      align-content: center;
      gap: 8px;
    }

    .account-stats-icon-shell {
      width: min(176px, 44vw);
      height: min(176px, 44vw);
      display: grid;
      place-items: center;
      justify-self: center;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      opacity: 1;
    }

    .account-stats-icon {
      width: 82%;
      height: 82%;
      color: #8cecff;
      filter:
        drop-shadow(0 0 10px rgba(107, 230, 255, 0.95))
        drop-shadow(0 0 24px rgba(107, 230, 255, 0.52))
        drop-shadow(0 0 44px rgba(77, 132, 255, 0.34));
      transition: opacity 160ms ease;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .account-stats-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .account-stats-tag {
      margin: 0;
      min-height: 1.1em;
      color: rgba(225, 251, 255, 0.96);
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      text-shadow:
        0 0 16px rgba(95, 221, 255, 0.38),
        0 0 30px rgba(62, 141, 255, 0.22);
    }

    .account-stats-value {
      margin: 0;
      min-height: 1.15em;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: clamp(58px, 14vw, 118px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-align: center;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.28),
        0 0 32px rgba(106, 215, 255, 0.18);
      word-break: break-word;
    }

    .account-decimal-value {
      display: inline-flex;
      align-items: flex-start;
      justify-content: center;
      line-height: 1;
      white-space: nowrap;
    }

    .account-decimal-value__main {
      display: inline-block;
    }

    .account-decimal-value__fraction {
      display: inline-block;
      font-size: 0.88em;
      line-height: 1.08;
      padding-top: 0.12em;
    }

    .account-stats-hint {
      margin: 0;
      min-height: 18px;
      color: rgba(199, 221, 233, 0.82);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-align: center;
    }

    .account-button--premium {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #2d114d 0%, #461b73 52%, #5c2391 100%);
      color: #ffffff;
      border: 1.5px solid rgba(218, 136, 255, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(250, 212, 255, 0.12),
        0 0 18px rgba(204, 106, 255, 0.36),
        0 0 38px rgba(124, 58, 237, 0.28);
    }

    .panel.is-guest .account-button--premium {
      gap: 12px;
      background: linear-gradient(180deg, rgba(6, 54, 24, 0.98) 0%, rgba(5, 36, 18, 0.98) 100%);
      color: #e9ffe9;
      border: 1.5px solid rgba(104, 255, 160, 0.92);
      box-shadow:
        inset 0 0 0 1px rgba(194, 255, 207, 0.1),
        0 0 16px rgba(74, 255, 136, 0.36),
        0 0 34px rgba(30, 178, 94, 0.24);
      font-family: "TheBoldFont", "Soopafre", Arial, sans-serif;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 0 12px rgba(114, 255, 163, 0.16);
    }

    .account-button__crown {
      font-size: 20px;
      line-height: 1;
    }

    .account-button__lock {
      width: 22px;
      height: 22px;
      display: inline-block;
      color: #84edff;
      filter:
        drop-shadow(0 0 8px rgba(121, 241, 255, 0.95))
        drop-shadow(0 0 16px rgba(66, 205, 255, 0.56));
      flex: 0 0 auto;
    }

    .account-button__lock svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .account-button__label {
      display: inline-block;
    }

    .account-button__arrow {
      width: 20px;
      height: 20px;
      display: none;
      color: #98ffb3;
      filter:
        drop-shadow(0 0 8px rgba(152, 255, 179, 0.68))
        drop-shadow(0 0 18px rgba(74, 255, 136, 0.24));
    }

    .account-button__arrow svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel.is-guest .account-button__arrow {
      display: inline-flex;
    }

    .panel.is-guest .account-button__crown {
      display: none !important;
    }

    .panel.is-guest #accountPasswordField > span {
      display: none;
    }

    .account-status.is-success {
      color: #4ade80;
    }

    .account-status.is-error {
      color: #f87171;
    }

    .flashcards-footer-nav {
      position: fixed !important;
      left: 0;
      right: 0;
      bottom: 0;
      bottom: var(--footer-safe-bottom);
      height: var(--footer-height);
      background: #157efb;
      display: grid !important;
      grid-template-columns: repeat(5, 1fr);
      align-items: stretch;
      z-index: 200;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.12);
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .flashcards-footer-nav__item {
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.78;
      text-decoration: none;
    }

    .flashcards-footer-nav__item.is-active {
      background: rgba(255, 255, 255, 0.14);
      opacity: 1;
    }

    .flashcards-footer-nav__item svg {
      width: 28px;
      height: 28px;
      display: block;
      color: #ffffff;
    }

    .flashcards-footer-nav__item img {
      width: 31px;
      height: 31px;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 6px 14px rgba(7, 17, 35, 0.28));
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    .flashcards-footer-nav__item.is-active img {
      transform: translateY(-1px) scale(1.05);
      filter:
        drop-shadow(0 0 10px rgba(105, 214, 255, 0.55))
        drop-shadow(0 8px 16px rgba(7, 17, 35, 0.28));
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100vw - 16px);
        padding-top: calc(var(--native-top-offset) + 8vh);
      }

      .panel {
        padding: 14px 6px 12px;
      }

      .account-metrics {
        padding: 0 2px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container" aria-hidden="true"></div>
  <main class="page">
    <section class="panel">
      <form class="account-form" id="accountForm">
        <div class="account-profile">
          <label class="account-avatar" for="accountAvatarInput">
            <img id="accountAvatarPreview" src="Avatar/avatar-man-person-svgrepo-com.svg" alt="Avatar do usuario">
            <span id="accountAvatarFallback">P</span>
            <input id="accountAvatarInput" type="file" accept="image/png,image/jpeg,image/webp" hidden>
          </label>
          <div class="account-name-inline" id="accountNameInline">
            <span class="account-name-prompt" id="accountNamePrompt" aria-hidden="true">
              <span class="account-name-prompt-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.46-8 5.5 0 .83.67 1.5 1.5 1.5h13c.83 0 1.5-.67 1.5-1.5 0-3.04-3.58-5.5-8-5.5Z"/></svg>
              </span>
              <span class="account-name-prompt-label">Digite um nome de usuário</span>
            </span>
            <input class="account-name-input" id="accountNameInput" type="text" maxlength="32" placeholder="Seu nome">
          </div>
          <label class="account-field" id="accountPasswordField" hidden>
            <span>Senha</span>
            <input id="accountPasswordInput" type="password" maxlength="64" placeholder="Senha">
          </label>
        </div>
        <div class="account-metrics" id="accountMetrics" hidden>
          <div class="account-stats-card" id="accountStatsCard" aria-label="Estatisticas do usuario">
            <div class="account-stats-icon-shell" aria-hidden="true">
              <div class="account-stats-icon" id="accountStatsIcon">
                <svg viewBox="0 0 64 64" aria-hidden="true">
                  <path fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" d="M17 11v10m15-10v18m15-18v28M11 49h42"/>
                </svg>
              </div>
            </div>
            <p class="account-stats-tag" id="accountStatsLabel">Estatisticas</p>
            <p class="account-stats-value" id="accountStatsValue">...</p>
            <p class="account-stats-hint" id="accountStatsLine">Carregando...</p>
          </div>
        </div>
        <div class="account-premium">
          <strong id="accountPremiumLevel">Nivel de acesso: Free</strong>
          <span id="accountPremiumUntil">Sem premium ativo no momento.</span>
        </div>
        <button class="account-button account-button--password" id="accountPasswordBtn" type="button" hidden>
          <span class="account-button__lock" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" d="M7.5 10V7.75a4.5 4.5 0 0 1 9 0V10"/>
              <rect x="5" y="10" width="14" height="10" rx="3" ry="3" fill="none" stroke="currentColor" stroke-width="1.9"/>
              <path fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" d="M12 13.5v3"/>
            </svg>
          </span>
          <span class="account-button__label" id="accountPasswordBtnLabel">Trocar senha</span>
        </button>
        <button class="account-button account-button--premium" id="accountPremiumBtn" type="button">
          <span class="account-button__crown" id="accountPremiumIcon" aria-hidden="true">👑</span>
          <span id="accountPremiumLabel">Comprar premium!</span>
          <span class="account-button__arrow" id="accountPremiumArrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="m13.2 5.2l6 6.8l-6 6.8l-1.5-1.3l3.7-4.2H5v-2.6h10.4l-3.7-4.2z"/></svg>
          </span>
        </button>
        <button class="account-button account-button--secondary" id="accountLogoutBtn" type="button">Sair da conta</button>
