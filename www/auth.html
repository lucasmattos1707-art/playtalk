<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluent LevelUp | Entrar</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <img class="auth-logo" src="/arquivos-codex/welcome-gate/levelup.png" alt="Fluent LevelUp">

    <div class="auth-switch" role="tablist" aria-label="Modo de acesso">
      <button class="auth-switch__btn is-active" id="authModeLogin" type="button" data-auth-mode="login">Entrar</button>
      <button class="auth-switch__btn" id="authModeRegister" type="button" data-auth-mode="register">Cadastrar</button>
    </div>

    <form class="auth-form" id="authForm" autocomplete="on">
      <label for="authUsername">Nome de usuario</label>
      <input id="authUsername" name="username" type="text" autocomplete="username" minlength="3" maxlength="32" required>

      <label for="authPassword">Senha</label>
      <input id="authPassword" name="password" type="password" autocomplete="current-password" required>

      <button id="auth-submit" type="submit">Entrar e jogar</button>
    </form>

    <p class="auth-message" id="authMessage" aria-live="polite"></p>
  </main>

  <script src="js/android-config.js"></script>
  <script src="js/api-config.js"></script>
  <script>
    (function bootAuthPortal() {
      var state = { mode: 'login', submitting: false };
      var form = document.getElementById('authForm');
      var usernameInput = document.getElementById('authUsername');
      var passwordInput = document.getElementById('authPassword');
      var submitBtn = document.getElementById('auth-submit');
      var message = document.getElementById('authMessage');
      var loginBtn = document.getElementById('authModeLogin');
      var registerBtn = document.getElementById('authModeRegister');

      function buildApiUrl(path) {
        if (window.PlaytalkApi && typeof window.PlaytalkApi.url === 'function') {
          return window.PlaytalkApi.url(path);
        }
        if (window.PlaytalkApi && typeof window.PlaytalkApi.buildUrl === 'function') {
          return window.PlaytalkApi.buildUrl(path);
        }
        return path;
      }

      function isFetchNetworkError(error) {
        var rawMessage = error && typeof error.message === 'string' ? error.message.trim() : '';
        return /failed to fetch|networkerror|load failed/i.test(rawMessage);
      }

      function currentApiBaseUrl() {
        if (window.PlaytalkApi && typeof window.PlaytalkApi.baseUrl === 'string') {
          return String(window.PlaytalkApi.baseUrl || '').trim();
        }
        return String(window.PLAYTALK_API_BASE_URL || '').trim();
      }

      function buildAlternateApiBaseUrl(baseUrl) {
        try {
          var parsed = new URL(String(baseUrl || '').trim());
          var host = String(parsed.hostname || '').toLowerCase();
          if (host === 'www.fluentlevelup.com') {
            parsed.hostname = 'fluentlevelup.com';
            return parsed.origin;
          }
          if (host === 'fluentlevelup.com') {
            parsed.hostname = 'www.fluentlevelup.com';
            return parsed.origin;
          }
        } catch (_error) {
          // ignore
        }
        return '';
      }

      function applyResolvedApiBaseUrl(nextBaseUrl) {
        var normalized = String(nextBaseUrl || '').trim().replace(/\/+$/, '');
        if (!normalized) {
          return false;
        }
        if (window.PlaytalkApi && typeof window.PlaytalkApi.setBaseUrl === 'function') {
          return window.PlaytalkApi.setBaseUrl(normalized);
        }
        window.PLAYTALK_API_BASE_URL = normalized;
        return true;
      }

      function buildRedirectRetryUrl(response) {
        if (!response || typeof response.status !== 'number') {
          return '';
        }
        if (response.status !== 301 && response.status !== 302 && response.status !== 307 && response.status !== 308) {
          return '';
        }
        var locationHeader = '';
        try {
          locationHeader = String(response.headers && response.headers.get('location') || '').trim();
        } catch (_error) {
          locationHeader = '';
        }
        if (!locationHeader) {
          return '';
        }
        try {
          var resolvedUrl = new URL(locationHeader, currentApiBaseUrl() || undefined);
          applyResolvedApiBaseUrl(resolvedUrl.origin);
          return resolvedUrl.toString();
        } catch (_error) {
          return '';
        }
      }

      async function postAuthJson(endpoint, payloadBody) {
        var primaryUrl = buildApiUrl(endpoint);
        var requestOptions = {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadBody || {})
        };

        try {
          var primaryResponse = await fetch(primaryUrl, requestOptions);
          var redirectRetryUrl = buildRedirectRetryUrl(primaryResponse);
          if (redirectRetryUrl) {
            return await fetch(redirectRetryUrl, requestOptions);
          }
          return primaryResponse;
        } catch (primaryError) {
          if (!isNativeRuntime() || !isFetchNetworkError(primaryError)) {
            throw primaryError;
          }
          var fallbackBase = buildAlternateApiBaseUrl(currentApiBaseUrl());
          if (!fallbackBase) {
            throw primaryError;
          }
          applyResolvedApiBaseUrl(fallbackBase);
          var fallbackUrl = fallbackBase + endpoint;
          var fallbackResponse = await fetch(fallbackUrl, requestOptions);
          var fallbackRedirectRetryUrl = buildRedirectRetryUrl(fallbackResponse);
          if (fallbackRedirectRetryUrl) {
            return await fetch(fallbackRedirectRetryUrl, requestOptions);
          }
          return fallbackResponse;
        }
      }

      async function readResponsePayload(response) {
        var rawText = '';
        try {
          rawText = await response.text();
        } catch (_error) {
          return { payload: {}, rawText: '' };
        }
        if (!rawText) return { payload: {}, rawText: '' };
        try {
          return { payload: JSON.parse(rawText), rawText: rawText };
        } catch (_error) {
          return { payload: {}, rawText: rawText };
        }
      }

      function compactText(value, maxLength) {
        var normalized = String(value || '').replace(/\s+/g, ' ').trim();
        if (!normalized) return '';
        var size = Math.max(24, Number(maxLength) || 0);
        if (normalized.length <= size) {
          return normalized;
        }
        return normalized.slice(0, Math.max(0, size - 3)).trim() + '...';
      }

      function extractRawResponseSnippet(rawText) {
        var normalized = String(rawText || '').trim();
        if (!normalized) return '';
        if (normalized.charAt(0) === '<') {
          normalized = normalized
            .replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, ' ')
            .replace(/<style\b[^>]*>[\s\S]*?<\/style>/gi, ' ')
            .replace(/<[^>]+>/g, ' ');
        }
        return compactText(normalized, 220);
      }

      function buildServerAuthErrorMessage(response, parsed, endpoint) {
        var payload = parsed && parsed.payload ? parsed.payload : {};
        var rawText = parsed && typeof parsed.rawText === 'string' ? parsed.rawText : '';
        var baseUrl = currentApiBaseUrl() || 'base-url-indefinida';
        var targetUrl = baseUrl + endpoint;
        var statusCode = response && typeof response.status === 'number' ? response.status : 0;
        var redirectLocation = '';
        try {
          redirectLocation = compactText(response && response.headers && response.headers.get('location'), 220);
        } catch (_error) {
          redirectLocation = '';
        }
        var messageText = compactText(payload && payload.message, 220);
        var detailsText = compactText(payload && (payload.details || payload.error), 260);
        var rawSnippet = extractRawResponseSnippet(rawText);

        if ((statusCode === 301 || statusCode === 302 || statusCode === 307 || statusCode === 308) && redirectLocation) {
          return 'O servidor redirecionou esta tentativa para ' + redirectLocation + ' (HTTP ' + statusCode + ', ' + targetUrl + ')';
        }

        if (messageText && detailsText && detailsText !== messageText) {
          return messageText + ' Detalhes: ' + detailsText + ' (HTTP ' + statusCode + ', ' + targetUrl + ')';
        }
        if (messageText) {
          return messageText + ' (HTTP ' + statusCode + ', ' + targetUrl + ')';
        }
        if (detailsText) {
          return 'Falha ao falar com o servidor. ' + detailsText + ' (HTTP ' + statusCode + ', ' + targetUrl + ')';
        }
        if (rawSnippet) {
          return 'Falha ao falar com o servidor. Resposta recebida: ' + rawSnippet + ' (HTTP ' + statusCode + ', ' + targetUrl + ')';
        }
        return 'Falha ao falar com o servidor. O servidor nao enviou uma mensagem util. (HTTP ' + statusCode + ', ' + targetUrl + ')';
      }

      async function tryAlternateAuthRoute(endpoint, username, password) {
        var response = await postAuthJson(endpoint, { username: username, password: password });
        var parsed = await readResponsePayload(response);
        return {
          endpoint: endpoint,
          response: response,
          parsed: parsed,
          payload: parsed.payload || {}
        };
      }

      function safeReturnPath() {
        var params = new URLSearchParams(window.location.search || '');
        var rawReturn = String(params.get('return') || '').trim();
        if (!rawReturn || rawReturn.indexOf('//') === 0 || /^https?:/i.test(rawReturn)) {
          return '/play';
        }
        if (rawReturn.charAt(0) !== '/') {
          return '/play';
        }
        if (/^\/(?:entrar|auth\.html|login|register|logout)(?:[?#/]|$)/i.test(rawReturn)) {
          return '/play';
        }
        return rawReturn;
      }

      function isNativeRuntime() {
        var capacitor = window.Capacitor || null;
        try {
          if (capacitor && typeof capacitor.isNativePlatform === 'function') {
            return Boolean(capacitor.isNativePlatform());
          }
        } catch (_error) {
          // ignore
        }

        try {
          if (capacitor && typeof capacitor.getPlatform === 'function') {
            var platformFromGetter = String(capacitor.getPlatform() || '').toLowerCase();
            if (platformFromGetter === 'android' || platformFromGetter === 'ios') {
              return true;
            }
          }
        } catch (_error) {
          // ignore
        }

        try {
          var platformFromProp = String(capacitor && capacitor.platform || '').toLowerCase();
          if (platformFromProp === 'android' || platformFromProp === 'ios') {
            return true;
          }
        } catch (_error) {
          // ignore
        }

        var protocol = String(window.location && window.location.protocol || '').toLowerCase();
        var hostname = String(window.location && window.location.hostname || '').toLowerCase();
        return protocol === 'file:' || hostname === 'localhost' || hostname === '127.0.0.1' || hostname === 'app';
      }

      function resolveNativeReturnPath(path) {
        var normalized = String(path || '').trim() || '/play';
        if (!isNativeRuntime()) {
          return normalized;
        }
        if (/^\/play(?:[/?#]|$)/i.test(normalized)) {
          return '/play.html';
        }
        if (/^\/flashcards(?:[/?#]|$)/i.test(normalized)) {
          return '/play.html';
        }
        if (/^\/(?:entrar|auth|auth\.html)(?:[/?#]|$)/i.test(normalized)) {
          return '/auth.html?return=%2Fplay';
        }
        if (/^\/fluency-plan(?:[/?#]|$)/i.test(normalized)) {
          return normalized.replace(/^\/fluency-plan/i, '/fluency-plan.html');
        }
        if (/^\/avataradd(?:[/?#]|$)/i.test(normalized)) {
          return normalized.replace(/^\/avataradd/i, '/avataradd.html');
        }
        return normalized;
      }

      function redirectToTarget(target) {
        var normalized = String(target || '').trim() || '/play';
        if (window.PlaytalkNative && typeof window.PlaytalkNative.navigate === 'function') {
          window.PlaytalkNative.navigate(normalized, { replace: true });
          return;
        }
        window.location.replace(resolveNativeReturnPath(normalized));
      }

      function persistAuthToken(token) {
        if (window.PlaytalkApi && typeof window.PlaytalkApi.setAuthToken === 'function') {
          window.PlaytalkApi.setAuthToken(token || '');
          return;
        }
        try {
          if (token) {
            window.localStorage.setItem('playtalk_auth_token', token);
          } else {
            window.localStorage.removeItem('playtalk_auth_token');
          }
        } catch (_error) {
          // localStorage may be unavailable in private modes.
        }
      }

      function setMessage(text, type) {
        if (!message) return;
        message.textContent = text || '';
        message.classList.toggle('is-error', type === 'error');
        message.classList.toggle('is-success', type === 'success');
      }

      function buildUnexpectedAuthErrorMessage(error, endpoint) {
        var rawMessage = error && typeof error.message === 'string' ? error.message.trim() : '';
        var baseUrl = currentApiBaseUrl() || 'base-url-indefinida';
        var targetUrl = baseUrl + endpoint;
        if (!rawMessage) {
          return 'Erro inesperado ao falar com o servidor. Tentativa: ' + targetUrl;
        }
        if (/failed to fetch|networkerror|load failed/i.test(rawMessage)) {
          return 'Sem conexao com o servidor. Verifique a internet do aparelho ou a URL da API. Tentativa: ' + targetUrl;
        }
        if (/abort|timeout/i.test(rawMessage)) {
          return 'Tempo esgotado ao acessar o servidor. Tentativa: ' + targetUrl;
        }
        return rawMessage + ' Tentativa: ' + targetUrl;
      }

      function setMode(mode) {
        state.mode = mode === 'register' ? 'register' : 'login';
        var isRegister = state.mode === 'register';
        loginBtn.classList.toggle('is-active', !isRegister);
        registerBtn.classList.toggle('is-active', isRegister);
        passwordInput.autocomplete = isRegister ? 'new-password' : 'current-password';
        if (isRegister) {
          passwordInput.setAttribute('minlength', '8');
        } else {
          passwordInput.removeAttribute('minlength');
        }
        submitBtn.textContent = isRegister ? 'Criar conta e entrar' : 'Entrar e jogar';
        setMessage('');
      }

      async function checkExistingSession() {
        try {
          var headers = {};
          if (window.PlaytalkApi && typeof window.PlaytalkApi.buildAuthHeaders === 'function') {
            headers = window.PlaytalkApi.buildAuthHeaders(headers);
          }
          var response = await fetch(buildApiUrl('/auth/session'), {
            headers: headers,
            credentials: 'include',
            cache: 'no-store'
          });
          var payload = await response.json().catch(function () { return {}; });
          if (response.ok) {
            redirectToTarget(String(payload && payload.user && payload.user.next_onboarding_route || '').trim() || safeReturnPath());
          }
        } catch (_error) {
          // stay on portal
        }
      }

      async function submitAuth(event) {
        event.preventDefault();
        if (state.submitting) return;

        var username = String(usernameInput.value || '').trim();
        var password = String(passwordInput.value || '').trim();
        var isRegister = state.mode === 'register';
        if (username.length < 3 || !password) {
          setMessage('Preencha nome e senha para continuar.', 'error');
          return;
        }
        if (isRegister && (password.length < 8 || !/[A-Za-z]/.test(password) || !/\d/.test(password))) {
          setMessage('Use senha com 8+ caracteres, letras e numeros.', 'error');
          return;
        }

        state.submitting = true;
        submitBtn.disabled = true;
        setMessage(state.mode === 'register' ? 'Criando sua conta...' : 'Entrando...');

        try {
          var endpoint = state.mode === 'register' ? '/register' : '/login';
          var response = await postAuthJson(endpoint, { username: username, password: password });
          var parsed = await readResponsePayload(response);
          var payload = parsed.payload || {};

          if ((!response.ok || !payload.success) && isNativeRuntime()) {
            try {
              var fallbackAttempts = [];
              if (endpoint !== '/login') {
                fallbackAttempts.push('/login');
              }
              fallbackAttempts.push('/api/books/home-auth');

              for (var i = 0; i < fallbackAttempts.length; i += 1) {
                var fallback = await tryAlternateAuthRoute(fallbackAttempts[i], username, password);
                if (fallback.response.ok && fallback.payload && fallback.payload.success) {
                  response = fallback.response;
                  parsed = fallback.parsed;
                  payload = fallback.payload;
                  endpoint = fallback.endpoint;
                  break;
                }
                if (!response.ok && !payload.message && fallback.payload && fallback.payload.message) {
                  response = fallback.response;
                  parsed = fallback.parsed;
                  payload = fallback.payload;
                  endpoint = fallback.endpoint;
                }
              }
            } catch (_homeAuthError) {
              // keep original response error handling below
            }
          }

          if (!response.ok || !payload.success) {
            if (state.mode === 'register' && response.status === 409) {
              throw new Error('Esse usuario ja existe. Toque em Entrar e use sua senha.');
            }
            if (payload && payload.message) {
              throw new Error(buildServerAuthErrorMessage(response, parsed, endpoint));
            }
            throw new Error(buildServerAuthErrorMessage(response, parsed, endpoint));
          }
          persistAuthToken(payload.token || '');
          setMessage('Entrada liberada. Bora jogar.', 'success');
          redirectToTarget(String(payload?.user?.next_onboarding_route || '').trim() || safeReturnPath());
        } catch (error) {
          setMessage(buildUnexpectedAuthErrorMessage(error, state.mode === 'register' ? '/register' : '/login'), 'error');
        } finally {
          state.submitting = false;
          submitBtn.disabled = false;
        }
      }

      loginBtn.addEventListener('click', function () { setMode('login'); });
      registerBtn.addEventListener('click', function () { setMode('register'); });
      form.addEventListener('submit', submitAuth);
      setMode('login');
      void checkExistingSession();
    })();
  </script>
</body>
</html>
