<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Books | PlayTalk</title>
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <style>
    @font-face {
      font-family: "BooksReading";
      src: url("/001.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      color: #ffffff;
      font-family: "Aptos", "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 0;
      overflow: hidden;
      overflow-x: hidden;
      position: relative;
    }

    .books-stars {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .books-home-book-bg {
      position: fixed;
      inset: 0;
      background-position: center top;
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      transition: opacity 320ms ease, background-image 320ms ease;
      -webkit-mask-image: linear-gradient(180deg, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 50%);
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 50%);
    }

    .books-home-book-bg.is-visible {
      opacity: 1;
    }

    .books-stars__layer {
      position: absolute;
      top: 0;
      left: 0;
      background: transparent;
      box-shadow: var(--star-shadow);
      animation: books-star-rise var(--star-duration) linear infinite;
    }

    .books-stars__layer::after {
      content: "";
      position: absolute;
      top: 2000px;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      box-shadow: var(--star-shadow);
    }

    #stars {
      width: 1px;
      height: 1px;
      --star-duration: 50s;
    }

    #stars2 {
      width: 2px;
      height: 2px;
      --star-duration: 100s;
    }

    #stars3 {
      width: 3px;
      height: 3px;
      --star-duration: 150s;
    }

    @keyframes books-star-rise {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-2000px);
      }
    }

    .books-page {
      width: min(980px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px 14px 16px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      justify-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
      background: transparent;
    }

    .books-page.is-home-immersive {
      position: fixed;
      inset: 0;
      width: 100%;
      max-width: none;
      margin: 0;
      min-height: 100vh;
      grid-template-rows: 0 0 minmax(0, 1fr);
      padding: 0;
      gap: 0;
      z-index: 79;
    }

    .books-page.is-home-immersive .books-shelf {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      margin: 0;
      border-radius: 0;
    }

    .books-level-menu {
      width: min(900px, 100%);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 10px;
      backdrop-filter: blur(7px);
    }

    .books-level-menu.is-admin {
      grid-template-columns: auto 1fr auto auto auto;
    }

    .books-level-title {
      margin: 0;
      text-align: center;
      font-size: clamp(20px, 5vw, 30px);
      font-weight: 300;
      letter-spacing: 0.01em;
      transition: opacity 260ms ease, transform 380ms ease, filter 380ms ease;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.34);
    }

    .books-level-title.is-sliding {
      opacity: 0.7;
      filter: blur(1px);
      transform: translateX(16px);
    }

    .books-arrow-btn {
      width: auto;
      min-width: 34px;
      height: auto;
      border: 0;
      background: transparent;
      color: #ffffff;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 4px;
      transition: transform 120ms ease, opacity 120ms ease, color 120ms ease;
    }

    .books-arrow-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      color: #d7dbe4;
    }

    .books-arrow-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .books-arrow-btn svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .books-toggle-btn {
      min-height: 36px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    .books-toggle-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    .books-toggle-btn.is-on {
      background: rgba(29, 117, 210, 0.35);
      border-color: rgba(158, 210, 255, 0.7);
    }

    .books-create-btn {
      background: linear-gradient(160deg, rgba(43, 133, 77, 0.86), rgba(43, 173, 103, 0.9));
      border-color: rgba(162, 255, 202, 0.7);
      color: #f7fff8;
    }

    .books-create-btn:hover:not(:disabled) {
      background: linear-gradient(160deg, rgba(48, 150, 87, 0.9), rgba(49, 192, 114, 0.94));
    }

    .books-create-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .books-avatar {
      width: clamp(240px, 62vw, 340px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 6px solid #d1d5db;
      background: linear-gradient(180deg, #f9fafb 0%, #e5e7eb 100%);
      overflow: hidden;
      display: grid;
      place-items: center;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.4);
    }

    .books-avatar img,
    .books-avatar span {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      object-fit: cover;
      font-size: clamp(58px, 12vw, 84px);
      font-weight: 800;
      color: #475569;
    }

    .books-user-name {
      margin: 2px 0 8px;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
      font-size: clamp(20px, 5.5vw, 32px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: 0.01em;
      text-align: center;
      white-space: pre-line;
      max-width: min(460px, 92vw);
    }

    .books-status {
      margin: 0;
      min-height: 20px;
      text-align: center;
      font-size: 14px;
      color: #d2d2d2;
      width: min(900px, 100%);
    }

    .books-status.is-error {
      color: #ff8f8f;
    }

    .books-status.is-success {
      color: #9bf2bc;
    }

    .books-shelf {
      width: min(900px, 100%);
      --books-shelf-height: 100dvh;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      border-radius: 20px;
      position: relative;
      margin-top: 15px;
      touch-action: pan-y;
      perspective: 1300px;
    }

    .books-page.is-home-immersive .books-level-menu,
    .books-page.is-home-immersive .books-status {
      display: none !important;
      opacity: 0;
      filter: blur(12px);
      transform: translateY(-20px);
      pointer-events: none;
      transition: opacity 520ms ease, filter 520ms ease, transform 620ms ease;
    }

    .books-home {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 2;
    }

    .books-home.is-visible {
      display: flex;
    }

    .books-home.is-immersive {
      position: fixed;
      inset: 0;
      z-index: 80;
      padding: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(88, 137, 255, 0.14), transparent 34%),
        linear-gradient(180deg, rgba(5, 9, 17, 0.98) 0%, rgba(5, 8, 14, 0.96) 100%);
      backdrop-filter: blur(14px);
    }

    .books-home-stage {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      justify-items: center;
      align-content: stretch;
      gap: 0;
      position: relative;
      overflow: hidden;
    }

    .books-home-start {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 3;
      width: min(180px, 42vw);
      aspect-ratio: 1 / 1;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      cursor: pointer;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%);
      transition: opacity 420ms ease, transform 520ms ease, filter 420ms ease;
    }

    .books-home-start svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 16px 24px rgba(0, 0, 0, 0.42));
    }

    .books-home-start.is-hidden {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.92);
      filter: blur(8px);
      pointer-events: none;
    }

    .books-home-shell {
      grid-column: 1;
      grid-row: 1;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      display: none;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 0;
      align-self: stretch;
      justify-self: stretch;
      position: relative;
      background: transparent;
    }

    .books-home-shell.is-visible {
      display: grid;
      animation: books-home-shell-in 620ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .books-home-viewport {
      position: relative;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      border-radius: 0;
      touch-action: pan-y;
    }

    .books-home-viewport.is-book-resetting .books-home-screen {
      transition: none !important;
    }

    .books-home-screen {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: minmax(0, 55fr) minmax(0, 25fr);
      gap: clamp(12px, 2vh, 18px);
      transform: translateY(0%);
      opacity: 1;
      transition: transform 760ms cubic-bezier(0.22, 1, 0.36, 1), opacity 760ms ease;
      will-change: transform, opacity;
    }

    .books-home-screen--next {
      transform: translateY(100%);
      opacity: 0.98;
      pointer-events: none;
    }

    .books-home-viewport.is-book-transitioning .books-home-screen--current {
      transform: translateY(-100%);
      opacity: 0;
    }

    .books-home-viewport.is-book-transitioning .books-home-screen--next {
      transform: translateY(0%);
      opacity: 1;
    }

    .books-home-book-slot {
      min-height: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 20px;
    }

    .books-home-cover-wrap {
      width: auto;
      height: min(60vh, calc(100vh - 200px));
      max-height: 100%;
      aspect-ratio: 9 / 16;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1300px;
      margin-top: 30px;
    }

    .books-home-cover {
      width: 100%;
      height: 100%;
      border-radius: 0;
      background: linear-gradient(155deg, #2a5bcf, #28a7d5);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 0;
      box-shadow:
        0 34px 70px rgba(0, 0, 0, 0.54),
        18px 0 28px rgba(0, 0, 0, 0.16);
      transform: perspective(1400px) rotateY(-10deg) rotateX(4deg);
      position: relative;
      overflow: hidden;
    }

    .books-home-cover::after {
      content: "";
      position: absolute;
      top: 1.5%;
      bottom: 1.5%;
      right: -12px;
      width: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(0, 0, 0, 0.34));
      border-right: 2px solid rgba(255, 255, 255, 0.18);
      opacity: 0.9;
    }

    .books-home-cover::before {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: none;
      pointer-events: none;
    }

    .books-home-text-slot {
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding-top: 70px;
    }

    .books-home-text-panel {
      width: 100%;
      min-height: 13vh;
      height: 13vh;
      max-height: 13vh;
      border-radius: 0;
      padding: clamp(10px, 1.6vh, 14px);
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: pre-line;
      font-family: "BooksReading", "Georgia", serif;
      font-size: clamp(26px, 4.4vw, 39px);
      line-height: 1.14;
      letter-spacing: 0.01em;
      color: rgba(248, 249, 252, 0.98);
      transition: opacity 320ms ease, transform 320ms ease;
    }

    .books-home-text-panel.is-empty {
      opacity: 0.46;
      transform: translateY(6px);
    }

    .books-home-text-panel.is-fading {
      opacity: 0;
      transform: translateY(10px);
    }

    .books-home-footer {
      min-height: 0;
      display: grid;
      align-content: end;
      gap: 2px;
      padding: 0 20px 0;
      transform: none;
      width: 100%;
      margin-top: auto;
      background: transparent;
    }

    .player-books {
      min-height: calc(3vh + 14px);
      display: grid;
      grid-template-rows: auto 3vh;
      align-items: end;
      gap: 2px;
      padding: 2px 4px;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .player-books__time {
      justify-self: end;
      color: rgba(255, 255, 255, 0.9);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .player-books__progress {
      width: 100%;
      height: 100%;
      min-width: 0;
      padding: 0;
      border: 0;
    }

    .player-books__progress-track {
      width: 100%;
      height: 100%;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
      position: relative;
      border: 0;
      cursor: pointer;
      touch-action: none;
    }

    .player-books__progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #9fd2ff 0%, #ffffff 100%);
      transition: width 120ms linear;
    }

    .books-home-toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .books-home-control-btn {
      min-height: 58px;
      padding: 10px 13px;
      border-radius: 0;
      border: 0;
      background: transparent;
      color: #ffffff;
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: none;
      box-shadow: none;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    .books-home-control-btn:hover {
      transform: translateY(-1px);
    }

    .books-home-control-btn svg,
    .books-home-control-btn img {
      width: 18px;
      height: 18px;
      display: block;
    }

    .books-home-control-btn span {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .books-home-control-btn.is-on {
      opacity: 1;
    }

    @keyframes books-home-shell-in {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .books-grid {
      width: 100%;
      height: auto;
      overflow: visible;
      display: block;
      padding: 0;
      margin: 0;
      will-change: transform;
      transition: transform 460ms cubic-bezier(0.22, 1, 0.36, 1), opacity 360ms ease, filter 360ms ease;
      transform: translateX(0);
      opacity: 1;
      filter: blur(0);
    }

    .books-grid.is-level-sliding-out {
      opacity: 0.18;
      filter: blur(7px);
      transform: translateX(-44px);
    }

    .books-grid.is-level-sliding-out.is-reverse {
      transform: translateX(44px);
    }

    .books-grid.is-level-sliding-in {
      opacity: 0.42;
      filter: blur(4px);
      transform: translateX(44px);
    }

    .books-grid.is-level-sliding-in.is-reverse {
      transform: translateX(-44px);
    }

    .books-shelf-page {
      width: 100%;
      height: 100%;
      display: grid;
      justify-items: center;
      align-content: start;
      padding: 15px 0 0;
      overflow: hidden;
    }

    .books-card {
      width: min(378px, 81vw, calc(var(--books-shelf-height) * 9 / 16 * 0.88));
      aspect-ratio: 9 / 16;
      border: 0;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      text-align: left;
      cursor: pointer;
      padding: 0;
      background: transparent;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.34);
      transform-origin: center center;
      transition: transform 260ms ease, box-shadow 260ms ease;
    }

    .books-card.is-admin:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.38);
    }

    .books-card__background {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .books-card__overlay {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .books-card__title {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 14px;
      margin: 0;
      color: #ffffff;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.08;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
      word-break: break-word;
      display: none;
    }

    .books-card.is-appearing {
      animation: books-card-soft-flash 340ms ease;
    }

    @keyframes books-card-soft-flash {
      0% {
        filter: brightness(1) saturate(1);
      }
      42% {
        filter: brightness(1.14) saturate(1.06);
      }
      100% {
        filter: brightness(1) saturate(1);
      }
    }

    .books-card__admin-chip {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(4, 12, 26, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.38);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ffffff;
      text-transform: uppercase;
      display: none;
    }

    .books-card.is-admin .books-card__admin-chip {
      display: inline-flex;
    }

    .books-card__actions {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      display: none;
      grid-template-rows: repeat(3, 42px);
      gap: 8px;
      z-index: 2;
    }

    .books-card.is-admin .books-card__actions {
      display: grid;
    }

    .books-card__upload-btn,
    .books-card__magic-btn,
    .books-card__text-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.56);
      background: rgba(4, 12, 26, 0.78);
      color: #ffffff;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .books-card__upload-btn svg,
    .books-card__magic-btn svg,
    .books-card__text-btn svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .books-card__upload-btn:hover:not(:disabled),
    .books-card__magic-btn:hover:not(:disabled),
    .books-card__text-btn:hover:not(:disabled) {
      background: rgba(11, 27, 52, 0.9);
      transform: scale(1.03);
    }

    .books-card__upload-btn:disabled,
    .books-card__magic-btn:disabled,
    .books-card__text-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .books-card__processing {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 3;
      align-content: center;
      justify-items: center;
      gap: 10px;
      background: rgba(6, 12, 22, 0.58);
      backdrop-filter: blur(2px);
      pointer-events: none;
    }

    .books-card.is-processing .books-card__processing {
      display: grid;
    }

    .books-card__spinner {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      animation: books-spin 900ms linear infinite;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.34);
    }

    .books-card__processing-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.48);
    }

    .books-card.is-processing .books-card__actions {
      opacity: 0.45;
    }

    @keyframes books-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .books-empty {
      margin: 0;
      text-align: center;
      color: #b9b9b9;
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .books-empty[hidden] {
      display: none !important;
    }

    .books-shelf-loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 6;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(2px);
    }

    .books-shelf-loading[hidden] {
      display: none !important;
    }

    }

    .books-reader-finish.is-visible .books-reader-finish-book {
      animation: books-reader-finish-book-in 500ms cubic-bezier(0.2, 0.85, 0.32, 1) both;
    }

    @keyframes books-reader-finish-book-in {
      from {
        opacity: 0;
        transform: rotateY(-17deg) rotateX(10deg) translateY(18px) scale(0.84);
      }
      to {
        opacity: 1;
        transform: rotateY(-9deg) rotateX(5deg) translateY(0) scale(1);
      }
    }

    .books-reader-finish-cover {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .books-reader-finish-flash {
      position: absolute;
      inset: -34%;
      opacity: 0;
      pointer-events: none;
      background: linear-gradient(110deg, rgba(255, 255, 255, 0) 28%, rgba(255, 255, 255, 0.96) 50%, rgba(255, 255, 255, 0) 72%);
      transform: translateX(-135%) rotate(-8deg);
    }

    .books-reader-finish-flash.is-active {
      animation: books-reader-finish-flash 240ms ease-out;
    }

    @keyframes books-reader-finish-flash {
      from {
        opacity: 0;
        transform: translateX(-135%) rotate(-8deg);
      }
      22% {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translateX(135%) rotate(-8deg);
      }
    }

    .books-reader-finish-line {
      margin: 0;
      min-height: 34px;
      color: #ffffff;
      font-size: clamp(22px, 6vw, 34px);
      font-family: "BooksReading", "Aptos", "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif;
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 6px 20px rgba(0, 0, 0, 0.52);
      opacity: 0;
      transform: translateY(8px);
    }

    .books-reader-finish-line.is-visible {
      animation: books-reader-finish-line-in 260ms ease both;
    }

    @keyframes books-reader-finish-line-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body.books-reader-open {
      overflow: hidden;
    }

    .books-reader[data-reader-mode="free-read"] .books-reader-book-hero {
      display: flex;
      animation: books-reader-book-hero-in 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .books-reader[data-reader-mode="free-read"] .books-reader-profile {
      display: none;
    }

    .books-reader[data-reader-mode="free-read"] .books-reader-text-panel {
      min-height: 25vh;
    }

    .books-reader[data-reader-mode="free-read"] .books-reader-training {
      display: none !important;
    }

    @keyframes books-reader-book-hero-in {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #booksModeModal.is-visible .books-mode-cover {
      animation: books-mode-cover-in 620ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    #booksModeModal.is-visible .books-mode-actions .books-magic-btn {
      opacity: 0;
      animation: books-mode-button-in 540ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    #booksModeModal.is-visible .books-mode-actions .books-magic-btn:nth-child(1) {
      animation-delay: 120ms;
    }

    #booksModeModal.is-visible .books-mode-actions .books-magic-btn:nth-child(2) {
      animation-delay: 210ms;
    }

    @keyframes books-mode-cover-in {
      from {
        opacity: 0;
        transform: perspective(1300px) rotateY(-22deg) rotateX(10deg) translateX(-22px) translateY(18px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: perspective(1300px) rotateY(-16deg) rotateX(7deg) translateX(0) translateY(0) scale(1);
      }
    }

    @keyframes books-mode-button-in {
      from {
        opacity: 0;
        transform: translateY(26px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      .books-page {
        padding: 10px 10px 12px;
      }

      .books-shelf {
        margin-top: -5px;
      }

      .books-level-menu {
        border-radius: 12px;
        padding: 8px;
      }

      .books-level-title {
        font-size: clamp(18px, 5.2vw, 24px);
      }

      .books-card {
        width: min(360px, 80vw);
      }

      .books-home-shell {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 0;
      }

      .books-home-screen {
        grid-template-rows: minmax(0, 2fr) minmax(0, 1fr);
        gap: 0;
      }

      .books-home-cover-wrap {
        width: auto;
        height: 100%;
        max-height: 100%;
      }

      .books-home-text-panel {
        min-height: 13vh;
        height: 13vh;
        max-height: 13vh;
        font-size: clamp(24px, 6.1vw, 31px);
        padding: 10px 12px;
      }

      .books-home-footer {
        height: auto;
        grid-template-rows: minmax(0, calc(3vh + 14px)) minmax(0, 58px);
        align-content: stretch;
        gap: 2px;
        padding: 0 16px 0;
      }

      .player-books {
        min-height: 3vh;
        height: 3vh;
        padding: 2px 4px;
      }

      .books-home-toolbar {
        min-height: 0;
        height: 100%;
        align-items: stretch;
        gap: 6px;
      }

      .books-home-control-btn {
        min-height: 0;
        height: 100%;
      }

      .books-home-control-btn span {
        font-size: 12px;
      }

      .books-mode-actions .books-magic-btn {
        width: min(58vw, 250px);
      }

      .books-reader-book-hero {
        width: min(264px, 62vw);
        aspect-ratio: 9 / 16;
        min-height: 0;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="books-home-book-bg" id="booksHomeBookBackground" aria-hidden="true"></div>
  <div class="books-stars" aria-hidden="true">
    <div class="books-stars__layer" id="stars"></div>
    <div class="books-stars__layer" id="stars2"></div>
    <div class="books-stars__layer" id="stars3"></div>
  </div>
  <main class="books-page">
    <section class="books-level-menu" id="booksLevelMenu" aria-label="Selecao de nivel">
      <button class="books-arrow-btn" id="booksLevelPrevBtn" type="button" aria-label="Nivel anterior">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M15.41 6.59 14 5.17 7.17 12 14 18.83l1.41-1.42L10 12z"/></svg>
      </button>
      <h1 class="books-level-title" id="booksLevelTitle">Nivel 1</h1>
      <button class="books-arrow-btn" id="booksLevelNextBtn" type="button" aria-label="Proximo nivel">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="m8.59 16.59 1.41 1.42L16.83 12 10 5.17 8.59 6.59 14 12z"/></svg>
      </button>
      <button class="books-toggle-btn books-create-btn" id="booksCreateBookBtn" type="button" aria-label="Criar livro (admin)" hidden>Criar livro</button>
      <button class="books-toggle-btn" id="booksAdminUiToggleBtn" type="button" aria-label="Ativar ferramentas admin">Admin UI Off</button>
    </section>

    <p class="books-status" id="booksStatus" aria-live="polite"></p>

    <section class="books-shelf" id="booksShelfViewport" aria-label="Prateleira de livros">
      <div class="books-shelf-loading" id="booksShelfLoading" aria-live="polite">
        <span class="books-shelf-loading-spinner" aria-hidden="true"></span>
      </div>
      <section class="books-home" id="booksHomePanel" aria-label="Home books">
        <div class="books-home-stage">
          <button class="books-home-start" id="booksHomeStartBtn" type="button" aria-label="Iniciar home books">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M5 3.5A2.5 2.5 0 0 1 7.5 1H20v18.5H7.5A2.5 2.5 0 0 0 5 22zm2.5-.5A1.5 1.5 0 0 0 6 4.5v12A3.5 3.5 0 0 1 7.5 16H19V3zM8 6h8v2H8zm0 4h8v2H8z"/></svg>
          </button>
          <div class="books-home-shell" id="booksHomeShell" hidden>
            <div class="books-home-viewport" id="booksHomeViewport">
              <div class="books-home-screen books-home-screen--current" id="booksHomeCurrentScreen">
                <div class="books-home-book-slot">
                  <div class="books-home-cover-wrap">
                    <div class="books-home-cover" id="booksHomeCover"></div>
                  </div>
                </div>
                <div class="books-home-text-slot">
                  <div class="books-home-text-panel is-empty" id="booksHomeTextPanel"></div>
                </div>
              </div>
              <div class="books-home-screen books-home-screen--next" id="booksHomeNextScreen" aria-hidden="true">
                <div class="books-home-book-slot">
                  <div class="books-home-cover-wrap">
                    <div class="books-home-cover" id="booksHomeNextCover"></div>
                  </div>
                </div>
                <div class="books-home-text-slot">
                  <div class="books-home-text-panel is-empty" id="booksHomeNextTextPanel"></div>
                </div>
              </div>
            </div>
            <div class="books-home-footer" id="booksHomeControls">
              <div class="player-books">
                <div class="player-books__time" id="playerBooksProgressTime">0:00 / 0:00</div>
                <div class="player-books__progress">
                  <div class="player-books__progress-track" id="playerBooksProgressTrack" aria-label="Linha do tempo do livro" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
                    <div class="player-books__progress-fill" id="playerBooksProgressFill"></div>
                  </div>
                </div>
              </div>
              <div class="books-home-toolbar">
                <button class="books-home-control-btn" id="booksHomeRepeatBtn" type="button" aria-label="Intervalo entre repeticoes">
                  <span id="booksHomeRepeatLabel">1s</span>
                </button>
                <button class="books-home-control-btn" id="booksHomeMusicBtn" type="button" aria-label="Musica zen">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V8.72l6-1.64V14.5a4 4 0 1 0 2 3.46V4.5z"/></svg>
                </button>
                <button class="books-home-control-btn" id="booksHomeSpeedBtn" type="button" aria-label="Velocidade do audio">
                  <span id="booksHomeSpeedLabel">1.00x</span>
                </button>
                <button class="books-home-control-btn" id="booksHomeLanguageBtn" type="button" aria-label="Mostrar ou ocultar texto">
                  <img id="booksHomeLanguageIcon" src="/arquivos-codex/icones/portugues.svg" alt="Portugues">
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="books-grid" id="booksCardsGrid" aria-label="Livros por nivel"></section>
      <p class="books-empty" id="booksCardsEmpty" hidden>Nenhum arquivo neste nivel.</p>
    </section>
    <input id="booksCoverUploadInput" type="file" accept="image/png,image/jpeg,image/webp,image/avif,image/gif" hidden>
  </main>

  <section class="books-magic-modal" id="booksMagicModal" aria-label="Gerar capa e background com IA">
    <div class="books-magic-card">
      <h2 class="books-magic-title" id="booksMagicTitle">Gerar imagens do livro</h2>
      <label class="books-magic-field">
        <span class="books-magic-label">Como deve ser a capa (9:16)</span>
        <textarea class="books-magic-input" id="booksMagicCoverPromptInput" placeholder="Descreva a capa em detalhes..."></textarea>
      </label>
      <label class="books-magic-field">
        <span class="books-magic-label">Como deve ser o background (16:9)</span>
        <textarea class="books-magic-input" id="booksMagicBackgroundPromptInput" placeholder="Descreva o background em detalhes..."></textarea>
      </label>
      <div class="books-magic-actions">
        <button class="books-magic-btn" id="booksMagicCloseBtn" type="button">Cancelar</button>
        <button class="books-magic-btn is-primary" id="booksMagicGenerateBtn" type="button">Gerar e Salvar</button>
      </div>
    </div>
  </section>

  <section class="books-reader" id="booksReader" aria-label="Leitor do livro">
    <button class="books-reader-back" id="booksReaderBackBtn" type="button" aria-label="Voltar para livros">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 3.2 3 10v10.8h6.2v-6.4h5.6v6.4H21V10zm7.2 16H16v-6.4a1.2 1.2 0 0 0-1.2-1.2H9.2A1.2 1.2 0 0 0 8 12.8v6.4H4.8v-8.4L12 5.6l7.2 5.2z"/></svg>
    </button>
    <div class="books-reader-content" id="booksReaderContent">
      <div class="books-reader-book-hero" id="booksReaderBookHero" hidden>
        <div class="books-reader-book-cover" id="booksReaderBookCover"></div>
      </div>
      <div class="books-reader-profile" id="booksReaderProfile">
        <div class="books-reader-pron-ring" id="booksReaderPronRing">
          <div class="books-reader-pron-inner">
            <img class="books-reader-avatar-img" id="booksReaderAvatarImage" alt="Avatar do usuario" hidden>
            <span class="books-reader-avatar-fallback" id="booksReaderAvatarFallback">P</span>
          </div>
        </div>
        <p class="books-reader-user-name" id="booksReaderUserName">Jogador</p>
        <p class="books-reader-pron-percent" id="booksReaderPronPercent">0%</p>
      </div>
      <div class="books-reader-text-panel" id="booksReaderTextPanel">
        <p class="books-reader-english" id="booksReaderEnglish">Carregando...</p>
        <div class="books-reader-lang">
          <button class="books-reader-lang-btn is-active" id="booksReaderLangEnglishBtn" type="button" aria-label="Mostrar ingles">
            <img src="/arquivos-codex/icones/ingles.svg" alt="Ingles">
          </button>
          <button class="books-reader-lang-btn" id="booksReaderLangPortugueseBtn" type="button" aria-label="Mostrar portugues">
            <img src="/arquivos-codex/icones/portugues.svg" alt="Portugues">
          </button>
        </div>
        <div class="books-reader-training" id="booksReaderTraining" hidden>
          <button class="books-reader-mic-btn" id="booksReaderMicBtn" type="button" aria-label="Treinar pronuncia">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3m5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-2.08A7 7 0 0 0 19 12z"/></svg>
          </button>
          <p class="books-reader-training-status" id="booksReaderTrainingStatus"></p>
        </div>
      </div>
    </div>
    <div class="books-reader-progress" aria-hidden="true">
      <span class="books-reader-progress-fill" id="booksReaderProgressFill"></span>
    </div>
    <div class="books-reader-finish" id="booksReaderFinish" aria-live="polite" hidden>
      <div class="books-reader-finish-stage">
        <div class="books-reader-finish-book" id="booksReaderFinishBook">
          <span class="books-reader-finish-cover" id="booksReaderFinishCover"></span>
          <span class="books-reader-finish-flash" id="booksReaderFinishFlash"></span>
        </div>
        <p class="books-reader-finish-line" id="booksReaderFinishLine"></p>
      </div>
    </div>
  </section>

  <section class="books-magic-modal" id="booksModeModal" aria-label="Escolha o modo do livro">
    <div class="books-magic-card books-mode-card" id="booksModeCard">
      <button class="books-mode-close" id="booksModeCloseBtn" type="button" aria-label="Fechar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.42 1.42L10.59 13.4 4.29 19.71 2.88 18.3 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"/></svg>
      </button>
      <div class="books-mode-main" id="booksModeMain">
        <div class="books-mode-preview">
          <div class="books-mode-cover" id="booksModeCover"></div>
        </div>
        <div class="books-mode-actions">
          <button class="books-magic-btn" id="booksModeFreeReadBtn" type="button">
            <span class="books-mode-option">Leitura livre</span>
          </button>
          <button class="books-magic-btn is-primary" id="booksModePronounceBtn" type="button">
            <span class="books-mode-option">Treinar pronuncia</span>
          </button>
        </div>
      </div>
      <div class="books-mode-loading" id="booksModeLoading" aria-hidden="true">
        <span class="books-mode-loading-loop" aria-hidden="true"></span>
      </div>
    </div>
  </section>

  <section class="books-magic-modal" id="booksReaderAdminAudioModal" aria-label="Atualizar audio do card">
    <div class="books-magic-card books-admin-audio-card">
      <h2 class="books-magic-title">Atualizar audio do card</h2>
      <label class="books-magic-field">
        <span class="books-magic-label">Texto para narrar</span>
        <textarea class="books-magic-input" id="booksReaderAdminAudioTextInput" placeholder="Texto do audio"></textarea>
      </label>
      <label class="books-magic-field">
        <span class="books-magic-label">Voz</span>
        <select class="books-create-control-input" id="booksReaderAdminAudioVoiceSelect"></select>
      </label>
      <div class="books-magic-actions">
        <button class="books-magic-btn" id="booksReaderAdminAudioCloseBtn" type="button">Cancelar</button>
        <button class="books-magic-btn is-primary" id="booksReaderAdminAudioSubmitBtn" type="button">Enviar</button>
      </div>
    </div>
  </section>

  <section class="books-magic-modal" id="booksJsonModal" aria-label="Salvar JSON do livro">
    <div class="books-magic-card">
      <h2 class="books-magic-title" id="booksJsonTitle">Salvar JSON do livro</h2>
      <label class="books-magic-field">
        <span class="books-magic-label">Cole o conteudo do .json</span>
        <textarea class="books-magic-input" id="booksJsonInput" placeholder='{"nome":"Livro","nivel":1,"story_1":[{"en":"Hello","pt":"Ola"}]}'></textarea>
      </label>
      <div class="books-magic-actions">
        <button class="books-magic-btn" id="booksJsonCloseBtn" type="button">Cancelar</button>
        <button class="books-magic-btn is-primary" id="booksJsonSaveBtn" type="button">Salvar no Postgres</button>
      </div>
    </div>
  </section>

  <section class="books-magic-modal" id="booksCreateModal" aria-label="Criar livro por linhas">
    <div class="books-magic-card books-create-card">
      <h2 class="books-magic-title">Criar livro por linhas</h2>
      <div class="books-create-toolbar">
        <label class="books-create-control">
          <span class="books-create-control-label">Voz dos audios</span>
          <select class="books-create-control-input" id="booksCreateVoiceSelect">
            <option value="openai:fable">OpenAI - Fable</option>
            <option value="openai:alloy">OpenAI - Alloy</option>
            <option value="openai:sage">OpenAI - Sage</option>
            <option value="openai:nova">OpenAI - Nova</option>
            <option value="openai:verse">OpenAI - Verse</option>
            <option value="elevenlabs:harry">ElevenLabs - Harry</option>
            <option value="elevenlabs:burt-raynalds">ElevenLabs - Burt Raynalds</option>
          </select>
        </label>
        <label class="books-create-control">
          <span class="books-create-control-label">Tema para escrever</span>
          <input class="books-create-control-input" id="booksCreateIdeaInput" type="text" placeholder="Ex.: amizade no colegio, comedia leve">
        </label>
        <label class="books-create-control">
          <span class="books-create-control-label">Caracteres (0-1500)</span>
          <input class="books-create-control-input" id="booksCreateCharsInput" type="number" min="0" max="1500" value="900">
        </label>
        <button class="books-magic-btn books-create-write-btn" id="booksCreateWriteBtn" type="button">Escrever livro</button>
      </div>
      <div class="books-create-editor is-empty" id="booksCreateEditor">
        <pre class="books-create-preview" id="booksCreatePreview" aria-hidden="true"></pre>
        <textarea class="books-create-input" id="booksCreateInput" placeholder="Titulo do livro&#10;Nivel (1-10)&#10;story_1&#10;Prompt capa 9:16&#10;Prompt background 16:9&#10;Frase 1 em portugues&#10;Sentence 1 in english"></textarea>
      </div>
      <div class="books-magic-actions">
        <button class="books-magic-btn" id="booksCreateCloseBtn" type="button">Cancelar</button>
        <button class="books-magic-btn is-primary" id="booksCreateSubmitBtn" type="button">Criar livro</button>
      </div>
    </div>
  </section>

  <script src="js/android-config.js"></script>
  <script src="/config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/player-state.js"></script>
  <script src="js/android-shell.js"></script>
  <script src="js/books-page.js?v=20260403q"></script>
</body>
</html>
