<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Books | PlayTalk</title>
  <link rel="icon" type="image/svg+xml" href="SVG/logo.svg">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000000;
      color: #ffffff;
      font-family: "Open Sans", "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .books-page {
      width: min(1020px, 100%);
      margin: 0 auto;
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .books-level-menu {
      width: min(620px, 100%);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
    }

    .books-level-title {
      margin: 0;
      text-align: center;
      font-size: clamp(20px, 5vw, 30px);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .books-arrow-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    .books-arrow-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    .books-arrow-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .books-arrow-btn svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .books-avatar {
      width: clamp(130px, 32vw, 180px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 6px solid #d1d5db;
      background: linear-gradient(180deg, #f9fafb 0%, #e5e7eb 100%);
      overflow: hidden;
      display: grid;
      place-items: center;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.4);
    }

    .books-avatar img,
    .books-avatar span {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      object-fit: cover;
      font-size: clamp(42px, 9vw, 62px);
      font-weight: 800;
      color: #475569;
    }

    .books-status {
      margin: 0;
      min-height: 20px;
      text-align: center;
      font-size: 14px;
      color: #d2d2d2;
    }

    .books-status.is-error {
      color: #ff8f8f;
    }

    .books-status.is-success {
      color: #9bf2bc;
    }

    .books-grid {
      width: min(900px, 100%);
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .books-card {
      width: 100%;
      aspect-ratio: 9 / 16;
      border: 0;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      text-align: left;
      cursor: default;
      padding: 0;
      background: transparent;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.34);
    }

    .books-card.is-admin {
      cursor: pointer;
    }

    .books-card.is-admin:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.38);
    }

    .books-card__background {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .books-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(6, 8, 12, 0.85) 0%, rgba(6, 8, 12, 0.18) 60%, rgba(6, 8, 12, 0.1) 100%);
    }

    .books-card__title {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 14px;
      margin: 0;
      color: #ffffff;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.08;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
      word-break: break-word;
    }

    .books-card__admin-chip {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(4, 12, 26, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.38);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ffffff;
      text-transform: uppercase;
      display: none;
    }

    .books-card.is-admin .books-card__admin-chip {
      display: inline-flex;
    }

    .books-card__upload-btn {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.56);
      background: rgba(4, 12, 26, 0.78);
      color: #ffffff;
      display: none;
      place-items: center;
      cursor: pointer;
      z-index: 2;
    }

    .books-card__upload-btn svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .books-card__upload-btn:hover:not(:disabled) {
      background: rgba(11, 27, 52, 0.9);
      transform: translateY(-50%) scale(1.03);
    }

    .books-card__upload-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .books-card.is-admin .books-card__upload-btn {
      display: grid;
    }

    .books-empty {
      margin: 0;
      text-align: center;
      color: #b9b9b9;
    }

    @media (min-width: 900px) {
      .books-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="books-page">
    <section class="books-level-menu" aria-label="Selecao de nivel">
      <button class="books-arrow-btn" id="booksLevelPrevBtn" type="button" aria-label="Nivel anterior">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M15.41 6.59 14 5.17 7.17 12 14 18.83l1.41-1.42L10 12z"/></svg>
      </button>
      <h1 class="books-level-title" id="booksLevelTitle">Nivel 1</h1>
      <button class="books-arrow-btn" id="booksLevelNextBtn" type="button" aria-label="Proximo nivel">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="m8.59 16.59 1.41 1.42L16.83 12 10 5.17 8.59 6.59 14 12z"/></svg>
      </button>
    </section>

    <div class="books-avatar" aria-label="Avatar do usuario">
      <img id="booksAccountAvatarImage" alt="Avatar do usuario" hidden>
      <span id="booksAccountAvatarFallback">P</span>
    </div>

    <p class="books-status" id="booksStatus" aria-live="polite"></p>

    <section class="books-grid" id="booksCardsGrid" aria-label="Livros por nivel"></section>
    <p class="books-empty" id="booksCardsEmpty" hidden>Nenhum arquivo neste nivel.</p>
    <input id="booksCoverUploadInput" type="file" accept="image/png,image/jpeg,image/webp,image/avif,image/gif" hidden>
  </main>

  <script src="js/android-config.js"></script>
  <script src="/config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/player-state.js"></script>
  <script src="js/android-shell.js"></script>
  <script src="js/books-page.js"></script>
</body>
</html>
