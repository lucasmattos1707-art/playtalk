<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storage Debug | Fluent LevelUp</title>
  <meta name="description" content="Diagnostico detalhado da leitura do bucket R2.">
  <script src="js/api-config.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: rgba(8, 17, 31, 0.84);
      --border: rgba(128, 181, 255, 0.22);
      --text: #edf4ff;
      --muted: #9fb2d0;
      --success: #7bf0b5;
      --error: #ff8b8b;
      --loading: #ffd36b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Consolas, "Courier New", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(86, 173, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #0b1220 0%, #09111c 100%);
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 780px;
      font-family: "Open Sans", system-ui, sans-serif;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(115, 210, 255, 0.14);
      color: var(--text);
      padding: 12px 18px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      backdrop-filter: blur(16px);
      margin-bottom: 16px;
    }

    .status[data-tone="success"] { color: var(--success); }
    .status[data-tone="error"] { color: var(--error); }
    .status[data-tone="loading"] { color: var(--loading); }

    .summary {
      color: var(--muted);
      font-family: "Open Sans", system-ui, sans-serif;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-size: 13px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header">
      <div>
        <h1>Storage Debug</h1>
        <p>Essa tela mostra o retorno detalhado da tentativa de listar <strong>Niveis/</strong> no R2, incluindo status HTTP, corpo de erro e sinais da configuracao.</p>
      </div>
      <button id="storage-debug-refresh" type="button">Atualizar debug</button>
    </section>

    <section class="panel">
      <div id="storage-debug-status" class="status" data-tone="neutral">Preparando diagnostico...</div>
      <p id="storage-debug-summary" class="summary"></p>
    </section>

    <section class="panel">
      <pre id="storage-debug-output">{}</pre>
    </section>
  </main>

  <script src="js/storage-debug-page.js"></script>
</body>
</html>
