<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecionando para /play</title>
  <meta http-equiv="refresh" content="0; url=/play">
  <script>
    (function () {
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      window.location.replace('/play' + search + hash);
    })();
  </script>
</head>
<body>
  <p>Redirecionando para <a href="/play">/play</a>...</p>
</body>
</html>
