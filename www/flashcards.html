<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecionando para /play</title>
  <script>
    (function () {
      function isNativeLikeRuntime() {
        var protocol = String(window.location && window.location.protocol || '').toLowerCase();
        var hostname = String(window.location && window.location.hostname || '').toLowerCase();
        var port = String(window.location && window.location.port || '').trim();
        return protocol === 'file:' || ((hostname === 'localhost' || hostname === '127.0.0.1' || hostname === 'app') && !port);
      }

      var search = window.location.search || '';
      var hash = window.location.hash || '';
      var target = isNativeLikeRuntime() ? '/play.html' : '/play';
      var fallback = document.getElementById('flashcardsRedirectLink');
      if (fallback) {
        fallback.setAttribute('href', target);
      }
      window.location.replace(target + search + hash);
    })();
  </script>
</head>
<body>
  <p>Redirecionando para <a id="flashcardsRedirectLink" href="/play">/play</a>...</p>
</body>
</html>
