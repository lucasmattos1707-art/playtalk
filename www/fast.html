<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #c6f4ff 0%, #eafcff 45%, #ffffff 100%);
    }

    .play-button {
      display: inline-block;
      border: 0;
      border-radius: 999px;
      padding: 1rem 2.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      cursor: pointer;
      color: #ffffff;
      text-decoration: none;
      background: linear-gradient(135deg, #00a7d9, #00c977);
      box-shadow: 0 10px 30px rgba(0, 167, 217, 0.32);
    }

    .play-button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <a class="play-button" href="/flashcards?launch=tutorial" aria-label="Iniciar tutorial">play</a>
</body>
</html>
