<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Fluent LevelUp</title>
  <style>
    :root {
      --playtalk-global-bg-desktop: url('/api/r2-media/backgrounds/playtalk-global-desktop.webp');
      --playtalk-global-bg-mobile: url('/api/r2-media/backgrounds/playtalk-global-mobile.webp');
      --playtalk-global-bg-image: var(--playtalk-global-bg-desktop);
      --playtalk-global-bg-overlay: linear-gradient(to top, rgba(4, 18, 38, 0.92) 0%, rgba(4, 18, 38, 0.52) 48%, rgba(4, 18, 38, 0.12) 100%);
    }

    @media (max-width: 800px) {
      :root {
        --playtalk-global-bg-image: var(--playtalk-global-bg-mobile);
      }
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #041226;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background: #041226 var(--playtalk-global-bg-image) center/cover no-repeat;
    }

    body::after {
      background: var(--playtalk-global-bg-overlay);
    }
  </style>
  <script>
    (function redirectToFlashcards() {
      var LAST_ROUTE_STORAGE_KEY = 'playtalk_native_last_route_v1';
      var LAST_ROUTE_MAX_AGE_MS = 30000;
      var targetUrl = new URL('/flashcards.html', window.location.origin);
      targetUrl.searchParams.set('view', 'play');
      try {
        var protocol = String(window.location && window.location.protocol || '').toLowerCase();
        var hostname = String(window.location && window.location.hostname || '').toLowerCase();
        var port = String(window.location && window.location.port || '').trim();
        var isNativeRuntime = protocol === 'file:' || ((hostname === 'localhost' || hostname === '127.0.0.1') && !port);
        if (isNativeRuntime) {
          var rawSavedRoute = window.localStorage.getItem(LAST_ROUTE_STORAGE_KEY) || '';
          var savedRoute = rawSavedRoute ? JSON.parse(rawSavedRoute) : null;
          var savedHref = String(savedRoute && savedRoute.href || '').trim();
          var savedAt = Number(savedRoute && savedRoute.savedAt) || 0;
          var routeIsFresh = savedHref && savedAt > 0 && (Date.now() - savedAt) <= LAST_ROUTE_MAX_AGE_MS;
          var routeIsNotRoot = savedHref && savedHref !== '/' && savedHref !== '/index.html';
          if (routeIsFresh && routeIsNotRoot) {
            window.location.replace(savedHref);
            return;
          }
        }
      } catch (_error) {
        // ignore restore failures
      }
      window.location.replace(targetUrl.pathname + targetUrl.search + targetUrl.hash);
    })();
  </script>
</head>
<body></body>
</html>
