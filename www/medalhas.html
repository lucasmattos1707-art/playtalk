<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluent LevelUp | Medalhas</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    :root {
      --primary: #0b1f44;
      --muted: rgba(11, 31, 68, 0.6);
      --card-bg: rgba(255, 255, 255, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Open Sans', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: url('https://pub-1208463a3c774431bf7e0ddcbd3cf670.r2.dev/images/images/beautiful-starry-night-sky-paper-clouds-background_1017-62547.avif') center/cover no-repeat fixed;
      color: var(--primary);
      min-height: 100vh;
    }

    header {
      padding: 20px 16px 10px;
      text-align: center;
      background: var(--card-bg);
      backdrop-filter: blur(6px);
    }

    header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
    }

    header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .medal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      padding: 16px 16px 40px;
    }

    .medal-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(11, 31, 68, 0.08);
      border: 1px solid rgba(11, 31, 68, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .medal-card--clickable {
      cursor: pointer;
    }

    .medal-card--clickable:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(11, 31, 68, 0.18);
    }

    .medal-card img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      opacity: 0.3;
      transition: opacity 0.3s ease;
    }

    .medal-card--earned img {
      opacity: 1;
    }

    .medal-card span {
      display: block;
      margin-top: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .medal-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(5, 20, 40, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    .medal-modal.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .medal-modal__content {
      width: min(420px, 100%);
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 18px 40px rgba(5, 20, 40, 0.35);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .medal-modal__title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 800;
    }

    .medal-modal__time {
      margin: 0 0 16px;
      font-size: 15px;
      color: var(--muted);
    }

    .medal-modal__actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .medal-modal__btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .medal-modal__btn--primary {
      background: #1a66cc;
      color: #fff;
    }

    .medal-modal__btn--ghost {
      background: rgba(255, 255, 255, 0.75);
      color: var(--primary);
    }

    @media (max-width: 600px) {
      .medal-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Medalhas</h1>
    <p>Acompanhe as medalhas conquistadas em cada nível.</p>
  </header>

  <main class="medal-grid" id="medal-grid"></main>

  <div class="medal-modal" id="medal-modal" aria-hidden="true">
    <div class="medal-modal__content" role="dialog" aria-modal="true" aria-labelledby="medal-modal-title">
      <h2 class="medal-modal__title" id="medal-modal-title">Nível</h2>
      <p class="medal-modal__time" id="medal-modal-time"></p>
      <div class="medal-modal__actions">
        <button class="medal-modal__btn medal-modal__btn--primary" id="medal-modal-replay">Jogar de novo</button>
        <button class="medal-modal__btn medal-modal__btn--ghost" id="medal-modal-close">Fechar</button>
      </div>
    </div>
  </div>

  <script src="js/medalhas.js"></script>
</body>
</html>
